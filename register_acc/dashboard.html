<script>
function renderDashboard() {
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <h4 class="mb-4" style="color: #BA55D3"><i class="bi bi-bar-chart-fill"></i> ภาพรวมข้อมูล</h4>
    <div class="row g-3 mb-4" id="stat-cards"></div>
    <div class="card p-4 text-center mb-4 bg-white border-0 shadow-sm" id="avg-box"></div>
    <div class="row">
      <div class="col-md-6 mb-4"><div class="card p-3"><canvas id="chart1"></canvas></div></div>
      <div class="col-md-6 mb-4"><div class="card p-3"><canvas id="chart2"></canvas></div></div>
    </div>
  `;
  renderStats();
  renderCharts();
}

function renderStats() {
  const types = ["เงินงบประมาณ", "เงินบำรุง", "เงิน 30 บาท", "เงินอุดหนุน", "เงินอื่น"];
  let html = '';
  types.forEach(t => {
    const subset = allData.filter(d => d.moneyType === t);
    const paid = subset.filter(d => d.checkDate !== "");
    const totalAmt = subset.reduce((a, b) => a + (Number(b.amount) || 0), 0);
    const paidAmt = paid.reduce((a, b) => a + (Number(b.amount) || 0), 0);

    html += `
      <div class="col-md-4">
        <div class="card p-3 border-start border-4 shadow-sm" style="border-left-color: #BA55D3 !important">
          <small class="text-muted fw-bold">${t}</small>
          <div class="h5 mt-2 mb-0 text-primary">${paid.length} / ${subset.length} ฉบับ</div>
          <small class="text-success fw-bold">${paidAmt.toLocaleString()} / ${totalAmt.toLocaleString()} บาท</small>
        </div>
      </div>
    `;
  });
  document.getElementById('stat-cards').innerHTML = html;

  // ระยะเวลาเฉลี่ย
  let totalDays = 0, count = 0;
  allData.forEach(d => {
    if(d.tsIn && d.tsApprove) {
      const diff = (d.tsApprove - d.tsIn) / (1000 * 60 * 60 * 24);
      if(diff >= 0) { totalDays += diff; count++; }
    }
  });
  const avg = count > 0 ? (totalDays / count).toFixed(1) : 0;
  document.getElementById('avg-box').innerHTML = `<h5>🕒 ระยะเวลาเฉลี่ย (รับ - อนุมัติ): <span class="text-primary">${avg} วัน</span></h5>`;
}

function renderCharts() {
  const depts = ["ยา", "พัสดุ", "โภชนา", "ปกส", "บริหาร", "เลือด", "Lab", "X-Ray", "อื่นๆ"];
  
  new Chart(document.getElementById('chart1'), {
    type: 'bar',
    data: {
      labels: depts,
      datasets: [
        { label: 'จำนวนฎีกา', data: depts.map(n => allData.filter(d => (d.dept||'').includes(n)).length), backgroundColor: '#BA55D3' },
        { label: 'ยอดเงิน (แสนบาท)', data: depts.map(n => allData.filter(d => (d.dept||'').includes(n)).reduce((a,b)=>a+(Number(b.amount)||0),0)/100000), backgroundColor: '#E0B0FF' }
      ]
    },
    options: { plugins: { title: { display: true, text: 'สรุปรายหน่วยงาน' } } }
  });

  const mTypes = ["เงินงบประมาณ", "เงินบำรุง", "เงิน 30 บาท", "เงินอุดหนุน", "เงินอื่น"];
  new Chart(document.getElementById('chart2'), {
    type: 'bar',
    data: {
      labels: depts,
      datasets: mTypes.map((t, i) => ({
        label: t,
        data: depts.map(n => allData.filter(d => (d.dept||'').includes(n) && d.moneyType === t).length),
        backgroundColor: `rgba(186, 85, 211, ${1 - i*0.15})`
      }))
    },
    options: { plugins: { title: { display: true, text: 'แยกตามประเภทเงิน' } } }
  });
}
</script>
