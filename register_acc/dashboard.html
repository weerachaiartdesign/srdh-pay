<script>
function loadDashboard() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="row mb-4" id="moneySummaryCards"></div>
    <div class="alert alert-info" id="avgTimeBox"></div>
    <div class="row">
      <div class="col-md-6"><canvas id="deptChart"></canvas></div>
      <div class="col-md-6"><canvas id="deptMoneyTypeChart"></canvas></div>
    </div>
  `;
  
  renderSummaryCards();
  renderDeptCharts();
}

function renderSummaryCards() {
  const types = ["เงินงบประมาณ", "เงินบำรุง", "เงิน 30 บาท", "เงินอุดหนุน", "เงินอื่น"];
  let html = '';
  
  types.forEach(type => {
    const filtered = allData.filter(d => d.moneyType === type);
    const paid = filtered.filter(d => d.checkDate !== "");
    const totalAmount = filtered.reduce((s, d) => s + (Number(d.amount) || 0), 0);
    const paidAmount = paid.reduce((s, d) => s + (Number(d.amount) || 0), 0);
    
    html += `
      <div class="col-md-4 mb-2">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6>${type}</h6>
            <p>ฎีกา: ${paid.length}/${filtered.length} ฉบับ</p>
            <p>เงิน: ${paidAmount.toLocaleString()}/${totalAmount.toLocaleString()} บาท</p>
          </div>
        </div>
      </div>`;
  });
  document.getElementById('moneySummaryCards').innerHTML = html;
}

</script>
