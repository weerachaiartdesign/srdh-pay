<!DOCTYPE html>
<html lang="th">
<head>
  <!-- 
    ระบบ: ทะเบียนฎีกาและสถานะการเบี้ยจ่าย (Register Acc)
    เวอร์ชัน: 001-3
    รายละเอียด: ไฟล์โครงสร้างหลัก (Frontend Skeleton)
    ฟังก์ชัน: จัดการ Layout หลัก, Sidebar และเรียกใช้ทรัพยากรภายนอก
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบทะเบียนฎีกา - Register Acc v001-3</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- UI Frameworks -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="main.css">
  
  <!-- Third-party Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ส่วนควบคุมเมนูข้าง (Sidebar) -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-intersect fs-3"></i>
        <div>
          <div class="fw-bold" style="font-size: 1.1rem; line-height: 1;">ทะเบียนฎีกา</div>
          <small style="font-size: 0.65rem; font-weight: normal; opacity: 0.8;">Register Acc v001-3</small>
        </div>
      </div>
    </div>
    <nav class="nav flex-column mt-3">
      <div class="nav-link" id="btn-dash" onclick="changePage('dashboard')">
        <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
      </div>
      <div class="nav-link" id="btn-list" onclick="changePage('list')">
        <i class="bi bi-table"></i> <span>รายการทะเบียน</span>
      </div>
    </nav>
  </div>

  <!-- พื้นที่แสดงผลข้อมูล (Main View) -->
  <div class="main-content">
    <div id="view-container">
      <div class="text-center py-5" style="margin-top: 100px;">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
        <p class="mt-3 text-muted fw-light">กำลังเตรียมข้อมูลระบบทะเบียน...</p>
      </div>
    </div>
  </div>

  <!-- การโหลดไฟล์ JavaScript (ลำดับสำคัญมากเพื่อป้องกัน 'config is not defined') -->
  <!-- 1. โหลดค่าตั้งค่าก่อน -->
  <script src="api-config.js"></script>
  <!-- 2. โหลดคอมโพเนนต์ย่อย -->
  <script src="dashboard.js"></script>
  <script src="register-list.js"></script>
  <!-- 3. โหลดลอจิกหลักเป็นลำดับสุดท้าย -->
  <script src="index.js"></script>

</body>
</html>
