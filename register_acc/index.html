  <!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบทะเบียนฎีกา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #BA55D3; --bg: #f8f9fa; --sidebar: #ffffff; }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: #444; }
    .sidebar { width: 260px; height: 100vh; background: var(--sidebar); border-right: 1px solid rgba(0,0,0,0.05); position: fixed; z-index: 1000; }
    .sidebar-header { padding: 25px 20px; background: var(--primary); color: white; font-weight: 600; font-size: 1.3rem; }
    .nav-link { padding: 15px 20px; color: #666; text-decoration: none; cursor: pointer; display: flex; align-items: center; gap: 12px; border-left: 5px solid transparent; transition: all 0.2s; }
    .nav-link:hover { background: #fdf5ff; color: var(--primary); }
    .nav-link.active { background: #f5e6fa; color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
    .main-content { margin-left: 260px; padding: 40px; }
    .search-wrapper { position: relative; width: 100%; max-width: 400px; }
    .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; }
    .search-wrapper .form-control { padding-left: 40px; border-radius: 12px; border: 1px solid #ddd; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
    .text-purple { color: var(--primary); }
    .bg-purple { background-color: var(--primary); }
    .table thead th { font-weight: 500; border: none; padding: 15px; }
    .badge { font-weight: 400; font-size: 0.85rem; }
    @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header span, .nav-link span { display: none; } .main-content { margin-left: 70px; padding: 20px; } .search-wrapper { max-width: 100%; } }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-intersect fs-3"></i>
      <div>
        <div class="fw-bold" style="font-size: 1.1rem;">ทะเบียนฎีกา</div>
        <small style="font-size: 0.65rem; opacity: 0.8;">Register Acc</small>
      </div>
    </div>
  </div>
  <nav class="nav flex-column mt-3">
    <div class="nav-link" id="btn-dash" onclick="changePage('dashboard')">
      <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
    </div>
    <div class="nav-link" id="btn-list" onclick="changePage('list')">
      <i class="bi bi-table"></i> <span>รายการทะเบียน</span>
    </div>
  </nav>
</div>

<div class="main-content">
  <div id="view-container">
    <div class="text-center py-5" style="margin-top: 100px;">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
      <p class="mt-3 text-muted">กำลังเตรียมข้อมูลระบบทะเบียน...</p>
    </div>
  </div>
</div>

<script>
  let allData = [];

  window.onload = function() {
    google.script.run
      .withSuccessHandler(function(data) {
        if(data.error) {
          showError(data.error);
        } else {
          allData = data;
          changePage('dashboard');
        }
      })
      .withFailureHandler(function(error) {
        showError(error.message);
      })
      .getRegisterDataApi();
  };

  function showError(msg) {
    document.getElementById('view-container').innerHTML = `
      <div class="alert alert-danger m-4 shadow-sm border-0" style="border-radius:15px;">
        <h5 class="alert-heading text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> เกิดข้อผิดพลาด</h5>
        <p class="mb-2">ไม่สามารถโหลดข้อมูลจาก Google Sheets ได้: <br><code class="text-dark">${msg}</code></p>
        <hr>
        <button class="btn btn-danger btn-sm px-4" onclick="location.reload()" style="border-radius:8px;">
          <i class="bi bi-arrow-clockwise"></i> ลองใหม่อีกครั้ง
        </button>
      </div>`;
  }

  function changePage(page) {
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    
    if(page === 'dashboard') {
      document.getElementById('btn-dash').classList.add('active');
      renderDashboard();
    } else if(page === 'list') {
      document.getElementById('btn-list').classList.add('active');
      renderRegisterList();
    }
  }

  // Dashboard Functions
  function renderDashboard() {
    const container = document.getElementById('view-container');
    container.innerHTML = `
      <div class="container-fluid fade-in">
        <h4 class="mb-4 text-purple fw-bold"><i class="bi bi-pie-chart-fill"></i> ภาพรวมข้อมูลทะเบียน</h4>
        <div class="row g-3 mb-4" id="stat-cards"></div>
        <div class="card p-3 text-center mb-4 border-0 shadow-sm bg-white" style="border-radius:15px;">
          <h6 id="avg-time" class="mb-0 text-muted fw-normal">ประมวลผลข้อมูล...</h6>
        </div>
        <div class="row">
          <div class="col-lg-7 mb-4">
            <div class="card p-3 h-100 border-0 shadow-sm" style="border-radius:15px;">
              <canvas id="chart1"></canvas>
            </div>
          </div>
          <div class="col-lg-5 mb-4">
            <div class="card p-3 h-100 border-0 shadow-sm" style="border-radius:15px;">
              <canvas id="chart2"></canvas>
            </div>
          </div>
        </div>
      </div>
    `;
    
    drawDashboardContent();
  }

  function drawDashboardContent() {
    const mTypes = ["เงินงบประมาณ", "เงินบำรุง", "เงิน 30 บาท", "เงินอุดหนุน", "เงินอื่น"];
    let html = '';
    
    mTypes.forEach(t => {
      const sub = allData.filter(d => d.moneyType === t);
      const paid = sub.filter(d => d.status === "จ่ายแล้ว");
      const amt = sub.reduce((a, b) => a + (Number(b.amount) || 0), 0);
      
      html += `
        <div class="col-md-4 col-sm-6">
          <div class="card p-3 border-0 shadow-sm h-100 stat-card" style="border-left: 5px solid #BA55D3 !important; border-radius:12px;">
            <small class="text-muted text-uppercase fw-bold" style="font-size:0.7rem;">${t}</small>
            <div class="h4 my-1 fw-bold text-dark">${paid.length} / ${sub.length} <small class="fw-normal text-muted" style="font-size:0.8rem">ใบ</small></div>
            <div class="text-purple fw-bold mt-1" style="font-size:0.9rem">${amt.toLocaleString()} ฿</div>
          </div>
        </div>
      `;
    });
    document.getElementById('stat-cards').innerHTML = html;

    let totalDays = 0, count = 0;
    allData.forEach(d => {
      if(d.tsIn && d.tsApprove) {
        let diff = (d.tsApprove - d.tsIn) / 86400000;
        if(diff >= 0) { totalDays += diff; count++; }
      }
    });
    const avg = count > 0 ? (totalDays / count).toFixed(1) : 0;
    document.getElementById('avg-time').innerHTML = `🕒 ระยะเวลาเฉลี่ย (รับเรื่อง - อนุมัติ): <span class="text-purple fw-bold fs-5 ms-2">${avg} วัน</span>`;

    const depts = ["ยา", "พัสดุ", "โภชนา", "ปกส", "บริหาร", "เลือด", "Lab", "X-Ray"];
    const ctx1 = document.getElementById('chart1');
    if(ctx1) {
      new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: depts,
          datasets: [
            { label: 'จำนวน (ฉบับ)', data: depts.map(n => allData.filter(d => d.dept && d.dept.includes(n)).length), backgroundColor: '#BA55D3', borderRadius: 5 },
            { label: 'เงิน (แสนบาท)', data: depts.map(n => allData.filter(d => d.dept && d.dept.includes(n)).reduce((a,b)=>a+(Number(b.amount)||0),0)/100000), backgroundColor: '#E0B0FF', borderRadius: 5 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: true, plugins: { title: { display: true, text: 'สถิติแยกตามหน่วยงาน' } } }
      });
    }

    const statuses = ["รับเข้าระบบ", "ตรวจสอบ", "แก้ไข", "หน.ตรวจสอบ", "ส่งเสนอ", "อนุมัติจ่าย", "จ่ายแล้ว", "ยกเลิก"];
    const ctx2 = document.getElementById('chart2');
    if(ctx2) {
      new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: statuses,
          datasets: [{
            data: statuses.map(s => allData.filter(d => d.status === s).length),
            backgroundColor: ['#6c757d', '#007bff', '#dc3545', '#17a2b8', '#ffc107', '#fd7e14', '#28a745', '#343a40']
          }]
        },
        options: { cutout: '65%', responsive: true, maintainAspectRatio: true, plugins: { title: { display: true, text: 'สถานะงานปัจจุบัน' } } }
      });
    }
  }

  // Register List Functions
  function renderRegisterList() {
    const container = document.getElementById('view-container');
    container.innerHTML = `
      <div class="fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <h4 class="text-purple fw-bold mb-0"><i class="bi bi-list-ul"></i> รายการทะเบียนฎีกา</h4>
          <div class="search-wrapper">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" class="form-control" placeholder="ค้นหา เจ้าหนี้, เลขรับ, รายการ..." onkeyup="doSearch()">
          </div>
        </div>
        <div class="card shadow-sm border-0 overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="bg-purple text-white">
                <tr>
                  <th class="ps-3" style="min-width:120px">สถานะ</th>
                  <th>เจ้าหนี้ / บริษัท</th>
                  <th class="text-end">จำนวนเงิน</th>
                  <th>รายการ</th>
                  <th>หน่วยงาน / ประเภทเงิน</th>
                </tr>
              </thead>
              <tbody id="list-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    `;
    drawRegisterTable(allData);
  }

  function drawRegisterTable(data) {
    const body = document.getElementById('list-body');
    if(!body) return;
    
    if(data.length === 0) {
      body.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">ไม่พบข้อมูลที่ต้องการค้นหา</td></tr>`;
      return;
    }
    
    body.innerHTML = data.map(r => `
      <tr>
        <td class="ps-3">
          <span class="badge w-100 py-2" style="background:${getStatusColor(r.status)}; color:white;">${r.status}</span>
        </td>
        <td>
          <div class="fw-bold text-dark">${r.vendor || '-'}</div>
          <small class="text-muted">เลขรับ: ${r.receiveNo}</small>
        </td>
        <td class="text-end text-purple fw-bold">
          ${Number(r.amount || 0).toLocaleString()}
        </td>
        <td>
          <div class="text-truncate" style="max-width:250px" title="${r.item}">
            ${r.item || '-'}
          </div>
          <small class="text-muted">เลขเบิก/ฎีกา: ${r.withdrawNo || '-'}/${r.dikaNo || '-'}</small>
        </td>
        <td>
          <div><i class="bi bi-building"></i> ${r.dept || '-'}</div>
          <div class="small badge bg-light text-dark border mt-1">${r.moneyType || '-'}</div>
        </td>
      </tr>
    `).join('');
  }

  function getStatusColor(s) {
    const map = { 
      'จ่ายแล้ว': '#28a745', 'ยกเลิก': '#343a40', 'อนุมัติจ่าย': '#fd7e14', 
      'ส่งเสนอ': '#ffc107', 'หน.ตรวจสอบ': '#17a2b8', 'แก้ไข': '#dc3545',
      'ตรวจสอบ': '#007bff', 'รับเข้าระบบ': '#6c757d'
    };
    return map[s] || '#dee2e6';
  }

  window.doSearch = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allData.filter(d => 
      (d.vendor || '').toLowerCase().includes(q) ||
      (d.receiveNo || '').toString().includes(q) ||
      (d.item || '').toLowerCase().includes(q) ||
      (d.dikaNo || '').toLowerCase().includes(q) ||
      (d.dept || '').toLowerCase().includes(q)
    );
    drawRegisterTable(filtered);
  };
</script>
</body>
</html>
