<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- ดึงไฟล์ config แยกส่วน -->
    <script src="api-config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .table-wrapper { 
            overflow-x: auto; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }
        .loading-ring {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 id="appTitle" class="text-2xl font-bold text-gray-800">กำลังโหลด...</h1>
                <p class="text-gray-500">ระบบแสดงข้อมูลจากฐานข้อมูล Google Sheets (A-Y)</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="fetchData()" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-sync"></i> รีเฟรชข้อมูล
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
            <div class="relative">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="globalSearch" onkeyup="handleSearch()" placeholder="ค้นหาข้อมูลทุกคอลัมน์..." class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
        </div>

        <!-- Loading State -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="loading-ring mb-4"></div>
            <p class="text-gray-500 animate-pulse text-lg">กำลังเชื่อมต่อฐานข้อมูล...</p>
        </div>

        <!-- Table Content -->
        <div id="tableContainer" class="hidden">
            <div class="table-wrapper">
                <table class="w-full text-left">
                    <thead class="bg-gray-800 text-white">
                        <tr id="headerRow">
                            <!-- Headers injected here -->
                        </tr>
                    </thead>
                    <tbody id="bodyRows" class="divide-y divide-gray-200 text-gray-700 text-sm">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
            <div id="noResults" class="hidden py-12 text-center text-gray-400">
                <i class="fa-solid fa-folder-open text-4xl mb-3 block"></i>
                ไม่พบข้อมูลที่ต้องการ
            </div>
        </div>

        <!-- Error State -->
        <div id="errorBox" class="hidden bg-red-50 border border-red-200 text-red-700 px-6 py-4 rounded-xl flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation text-xl"></i>
            <div>
                <p class="font-bold">เกิดข้อผิดพลาด</p>
                <p id="errorText" class="text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        // เรียกใช้ค่าจาก api-config.js
        document.getElementById('appTitle').textContent = API_CONFIG.appName || "Register System";

        async function fetchData() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('tableContainer');
            const errorBox = document.getElementById('errorBox');
            const headerRow = document.getElementById('headerRow');
            const bodyRows = document.getElementById('bodyRows');

            // Reset UI
            loader.classList.remove('hidden');
            container.classList.add('hidden');
            errorBox.classList.add('hidden');
            headerRow.innerHTML = '';
            bodyRows.innerHTML = '';

            try {
                if (!API_CONFIG.scriptUrl || API_CONFIG.scriptUrl.includes("AKfycb...")) {
                    throw new Error("ยังไม่ได้กำหนดค่า scriptUrl ในไฟล์ api-config.js");
                }

                const response = await fetch(API_CONFIG.scriptUrl);
                const result = await response.json();

                if (result.success) {
                    // สร้าง Header
                    result.headers.forEach(header => {
                        const th = document.createElement('th');
                        th.className = "px-6 py-4 font-semibold whitespace-nowrap";
                        th.textContent = header;
                        headerRow.appendChild(th);
                    });

                    // สร้าง Data Rows
                    result.data.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-blue-50 transition-colors";
                        
                        result.headers.forEach(header => {
                            const td = document.createElement('td');
                            td.className = "px-6 py-4 whitespace-nowrap";
                            td.textContent = item[header] !== undefined ? item[header] : "";
                            tr.appendChild(td);
                        });
                        bodyRows.appendChild(tr);
                    });

                    container.classList.remove('hidden');
                } else {
                    throw new Error(result.error || "ไม่สามารถดึงข้อมูลได้");
                }
            } catch (err) {
                document.getElementById('errorText').textContent = err.message;
                errorBox.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function handleSearch() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const rows = document.querySelectorAll('#bodyRows tr');
            let matchCount = 0;

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                if (text.includes(query)) {
                    row.style.display = "";
                    matchCount++;
                } else {
                    row.style.display = "none";
                }
            });

            document.getElementById('noResults').classList.toggle('hidden', matchCount > 0);
        }

        // เริ่มโหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            
            // ตั้งเวลารีเฟรชอัตโนมัติถ้ามีการกำหนดค่าใน config
            if (API_CONFIG.refreshInterval > 0) {
                setInterval(fetchData, API_CONFIG.refreshInterval * 1000);
            }
        });
    </script>
</body>
</html>
