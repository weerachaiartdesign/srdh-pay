<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Database Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .table-container { overflow-x: auto; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">ระบบแสดงข้อมูลการลงทะเบียน</h1>
                <p class="text-slate-500">ดึงข้อมูลจาก Google Sheets (คอลัมน์ A-Y)</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-rotate"></i> รีเฟรชข้อมูล
            </button>
        </header>

        <!-- Search & Filter -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex items-center gap-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ค้นหาข้อมูลในตาราง..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- Content -->
        <div id="loading" class="hidden flex flex-col items-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-slate-600 italic">กำลังโหลดข้อมูลจาก Cloud...</p>
        </div>

        <div id="error" class="hidden bg-red-50 border-l-4 border-red-500 p-4 mb-6">
            <p class="text-red-700 font-bold">เกิดข้อผิดพลาด!</p>
            <p id="errorMessage" class="text-red-600 text-sm"></p>
        </div>

        <div class="table-container bg-white">
            <table class="w-full text-left border-collapse" id="dataTable">
                <thead class="bg-slate-800 text-white sticky top-0">
                    <tr id="tableHead">
                        <!-- Headers will be injected here -->
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-200">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
        
        <div id="noData" class="hidden text-center py-10 text-slate-400">
            ไม่พบข้อมูลที่ค้นหา
        </div>
    </div>

    <script>
        // *** สำคัญ: เปลี่ยน URL นี้เป็น Web App URL ของคุณที่ได้จาก Apps Script ***
        const API_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

        async function fetchData() {
            if (API_URL === "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") {
                showError("กรุณาใส่ Apps Script Web App URL ในตัวแปร API_URL ก่อนเริ่มใช้งาน");
                return;
            }

            const loader = document.getElementById('loading');
            const tableBody = document.getElementById('tableBody');
            const tableHead = document.getElementById('tableHead');
            const errorDiv = document.getElementById('error');
            
            loader.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            tableBody.innerHTML = '';
            tableHead.innerHTML = '';

            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.success) {
                    renderTable(result.headers, result.data);
                } else {
                    showError(result.error || "ไม่สามารถดึงข้อมูลได้");
                }
            } catch (err) {
                showError("การเชื่อมต่อล้มเหลว: " + err.message);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderTable(headers, data) {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');

            // Render Headers
            headers.forEach(h => {
                const th = document.createElement('th');
                th.className = "px-4 py-3 text-sm font-semibold uppercase tracking-wider whitespace-nowrap";
                th.textContent = h;
                tableHead.appendChild(th);
            });

            // Render Rows
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors";
                headers.forEach(h => {
                    const td = document.createElement('td');
                    td.className = "px-4 py-3 text-sm text-slate-700 whitespace-nowrap";
                    td.textContent = row[h] || '-';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            let hasResults = false;

            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                if (text.includes(filter)) {
                    row.style.display = "";
                    hasResults = true;
                } else {
                    row.style.display = "none";
                }
            });

            document.getElementById('noData').classList.toggle('hidden', hasResults);
        }

        function showError(msg) {
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = msg;
        }

        // Initial fetch
        window.onload = fetchData;
    </script>
</body>
</html>
