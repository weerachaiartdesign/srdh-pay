<!-- ระบบทะเบียนฎีกา - Main HTML (version 001-2) -->
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบทะเบียนฎีกา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header"><i class="bi bi-intersect"></i> ทะเบียนฎีกา</div>
    <nav class="nav flex-column mt-3">
      <div class="nav-link active" id="btn-dash" onclick="changePage('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</div>
      <div class="nav-link" id="btn-list" onclick="changePage('list')"><i class="bi bi-table"></i> รายการทะเบียน</div>
    </nav>
  </div>

  <div class="main-content">
    <div id="view-container">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3">กำลังประมวลผลข้อมูลภาษาไทย...</p>
      </div>
    </div>
  </div>

  <script src="api-config.js"></script>
  <script src="dashboard.js"></script>
  <script src="register-list.js"></script>
  <script>
    let allData = [];
    async function init() {
      try {
        const response = await fetch(CONFIG.API_URL);
        allData = await response.json();
        changePage('dashboard');
      } catch (e) {
        console.error("Fetch Error:", e);
        document.getElementById('view-container').innerHTML = `<div class="alert alert-danger">ไม่สามารถเชื่อมต่อ API ได้: ${e.message}</div>`;
      }
    }
    function changePage(page) {
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      if(page === 'dashboard') {
        document.getElementById('btn-dash').classList.add('active');
        renderDashboard();
      } else {
        document.getElementById('btn-list').classList.add('active');
        renderList();
      }
    }
    window.onload = init;
  </script>
</body>
</html>
