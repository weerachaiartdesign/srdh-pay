<script>
function loadRegisterList() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="mb-3">
      <input type="text" id="searchInput" class="form-control" placeholder="ค้นหาข้อมูล..." onkeyup="filterTable()">
    </div>
    <div class="table-responsive">
      <table class="table table-hover table-bordered" id="regTable">
        <thead class="table-light">
          <tr>
            <th>สถานะ</th><th>บริษัท</th><th>จำนวนเงิน</th><th>รายการ</th><th>ประเภทเงิน</th><th>หน่วยงาน</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  `;
  renderTable(allData);
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(row => `
    <tr>
      <td><span class="badge bg-secondary">${row.status}</span></td>
      <td>${row.vendor}</td>
      <td>${Number(row.amount).toLocaleString()}</td>
      <td>${row.item}</td>
      <td>${row.moneyType}</td>
      <td>${row.dept}</td>
    </tr>
  `).join('');
}

function filterTable() {
  const val = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allData.filter(d => 
    Object.values(d).some(v => String(v).toLowerCase().includes(val))
  );
  renderTable(filtered);
}
</script>
