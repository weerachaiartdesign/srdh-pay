<!-- 
  ไฟล์: assets-list.html
  หน้าที่: Template แสดงรายการทรัพย์สิน (ตารางสำหรับ Desktop และ การ์ดสำหรับ Mobile)
  ฟังก์ชันเด่น: รองรับการค้นหา (Filter) และเลือกจำนวนรายการที่แสดงต่อหน้า
-->

<!-- ส่วนตารางสำหรับ Desktop -->
<div class="hidden md:block p-8 animate-in">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white flex-wrap gap-3">
      <h3 class="font-bold text-slate-700 flex items-center gap-2">
          <span class="w-2 h-6 bg-emerald-600 rounded-full"></span>
          บัญชีรายการทรัพย์สิน
      </h3>
      <div class="flex items-center gap-3 flex-wrap">
        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-500">แสดง</label>
          <select id="rowSelectDesktop" onchange="filterTable()" 
                  class="px-2 py-1 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="All">ทั้งหมด</option>
          </select>
          <label class="text-xs text-slate-500">รายการ</label>
        </div>
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ค้นหาเลขครุภัณฑ์, รายการ, หน่วยงาน..." 
               class="px-4 py-2 border border-slate-200 rounded-lg text-sm w-80 focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
    </div>
    <div class="px-6 py-2 bg-slate-50/50 border-b border-slate-100 text-right">
      <span id="show-count" class="text-xs text-slate-400"></span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b border-slate-100">
          <tr>
            <th class="px-6 py-4">เลขครุภัณฑ์</th>
            <th class="px-6 py-4">รายการ</th>
            <th class="px-6 py-4">ยี่ห้อ/รุ่น/SN</th>
            <th class="px-6 py-4">หน่วยงาน/ผู้รับผิดชอบ</th>
            <th class="px-6 py-4 text-center">สถานะ</th>
            <th class="px-6 py-4 text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ส่วนการแสดงผลสำหรับ Mobile -->
<div class="block md:hidden p-4 pb-20 animate-in">
  <div class="mb-4 space-y-3">
    <div class="flex items-center justify-between bg-white p-3 rounded-xl shadow-sm">
      <label class="text-sm text-slate-600 font-medium">แสดงรายการ</label>
      <select id="rowSelectMobile" onchange="filterTable()" 
              class="px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="All">ทั้งหมด</option>
      </select>
    </div>
    <div>
      <input type="text" id="searchInputMobile" onkeyup="filterTable()" placeholder="ค้นหาทรัพย์สิน..." 
             class="w-full px-4 py-3 rounded-xl border border-slate-200 shadow-sm text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
    </div>
    <div class="text-right">
      <span id="show-count-m" class="text-xs text-slate-400"></span>
    </div>
  </div>
  <div id="mobile-list" class="space-y-4"></div>
</div>
