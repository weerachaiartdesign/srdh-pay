<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Srdh Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="api-config.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-100 to-purple-300 dark:from-gray-900 dark:to-purple-900 flex items-center justify-center min-h-screen">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-8 m-4">
        <div class="text-center mb-6">
            <img src="icons/register_acc-512.png" alt="Logo" class="h-20 mx-auto">
            <h2 class="text-2xl font-bold mt-2 text-purple-700 dark:text-purple-300">ทะเบียนฎีกาเบิกจ่ายเงิน</h2>
            <p class="text-gray-500 dark:text-gray-400">รพส. Srdh Pay</p>
        </div>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 dark:text-gray-300 mb-2">อีเมล</label>
                <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:border-gray-600" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 dark:text-gray-300 mb-2">รหัสผ่าน</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:border-gray-600">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded-lg transition">เข้าสู่ระบบ</button>
        </form>
        <div class="mt-4 text-center">
            <button id="guestBtn" class="text-purple-600 dark:text-purple-400 hover:underline">เข้าสู่ระบบแบบผู้เยี่ยมชม (Guest)</button>
        </div>
        <div id="guestEmailSection" class="mt-4 hidden">
            <input type="email" id="guestEmail" placeholder="กรอกอีเมลของคุณ" class="w-full px-4 py-2 border rounded-lg dark:bg-gray-700">
            <button id="guestLoginBtn" class="mt-2 w-full bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg">ยืนยัน</button>
        </div>
        <div id="message" class="mt-4 text-center text-red-500"></div>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const guestBtn = document.getElementById('guestBtn');
        const guestSection = document.getElementById('guestEmailSection');
        const guestLoginBtn = document.getElementById('guestLoginBtn');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            google.script.run.withSuccessHandler((result) => {
                if(result.success) {
                    localStorage.setItem('srdh_user', JSON.stringify(result));
                    window.location.href = 'main.html';
                } else {
                    messageDiv.innerText = result.message;
                }
            }).login(email, password);
        });
        guestBtn.addEventListener('click', () => {
            guestSection.classList.toggle('hidden');
        });
        guestLoginBtn.addEventListener('click', () => {
            const email = document.getElementById('guestEmail').value;
            if(!email) return;
            google.script.run.withSuccessHandler((result) => {
                if(result.success) {
                    localStorage.setItem('srdh_user', JSON.stringify(result));
                    window.location.href = 'main.html';
                } else {
                    messageDiv.innerText = result.message;
                }
            }).guestLogin(email);
        });
    </script>
</body>
</html>
