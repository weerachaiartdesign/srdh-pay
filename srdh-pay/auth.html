<!-- Version: 00121 -->
<!DOCTYPE html>
<html lang="th">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Srdh Pay - Login</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7C3AED" />
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
    
</head>
    
<body class="bg-gradient-to-br from-purple-100 via-violet-100 to-purple-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-3xl shadow-2xl p-10">
            <div class="flex justify-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-violet-500 rounded-3xl flex items-center justify-center text-white text-4xl font-bold shadow-inner">รพส</div>
            </div>
            
            <h1 class="text-3xl font-bold text-center text-purple-900 mb-2">ทะเบียนเบิกจ่ายเงิน</h1>
            <p class="text-center text-purple-500 mb-10">โรงพยาบาลสิรินธร</p>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-purple-700 mb-1">อีเมล</label>
                    <input type="email" id="email" required
                           class="w-full px-5 py-4 border border-purple-200 rounded-2xl focus:outline-none focus:border-purple-500 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-purple-700 mb-1">รหัสผ่าน</label>
                    <input type="password" id="password" required
                           class="w-full px-5 py-4 border border-purple-200 rounded-2xl focus:outline-none focus:border-purple-500 transition-all">
                </div>
                <button type="submit"
                        class="w-full bg-gradient-to-r from-purple-600 to-violet-600 text-white py-4 rounded-2xl font-semibold text-lg hover:from-purple-700 hover:to-violet-700 transition-all shadow-lg">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div class="my-8 flex items-center gap-4">
                <div class="flex-1 h-px bg-purple-200"></div>
                <span class="text-purple-400 text-sm">หรือ</span>
                <div class="flex-1 h-px bg-purple-200"></div>
            </div>

            <!-- Guest Login -->
            <button onclick="guestLogin()" 
                    class="w-full border-2 border-purple-300 hover:border-purple-400 text-purple-700 py-4 rounded-2xl font-medium flex items-center justify-center gap-3 transition-all">
                <i class="fas fa-user-secret"></i>
                เข้าใช้งานแบบผู้เยี่ยมชม
            </button>

            <p class="text-center text-xs text-purple-400 mt-10">Version 00121.6</p>
        </div>
    </div>

    <!-- CONFIG -->
    <script src="js/api-config.js"></script>
    
    <!-- CORE -->
    <script src="js/main.js"></script>
    
    <script>
     document.addEventListener('DOMContentLoaded', () => {
        // already login
        const user = localStorage.getItem('srdh_user');
        if (user) {
            try {
                JSON.parse(user);
                window.location.replace('dashboard.html');
            } catch (e) {
                localStorage.removeItem('srdh_user');
                localStorage.removeItem('srdh_last_login');
            }
        }
    
        // bind login form
        const loginForm =
            document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener(
                'submit',
                handleLogin
            );
        }
    });
    </script>
    
</body>
</html>
