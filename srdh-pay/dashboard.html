<!-- version : 00101 -->
<div class="max-w-7xl mx-auto animate-fade-in">
  <div class="flex items-center gap-2 mb-6">
    <h2 class="text-2xl font-bold text-gray-800">ภาพรวมการเบิกจ่าย</h2>
  </div>

  <!-- Summary Cards -->
  <div id="dash-summary-cards" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-6">
    <!-- Rendered by JS -->
  </div>

  <!-- Average Time & Progress -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 col-span-1 flex flex-col justify-center items-center text-center">
      <p class="text-gray-500 text-sm mb-2">ระยะเวลาการดำเนินการเฉลี่ย<br>(รับเรื่อง - อนุมัติ)</p>
      <div id="dash-avg-time" class="text-3xl font-bold text-[#9b59b6]">- วัน</div>
    </div>
    
    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 col-span-1 lg:col-span-2 flex flex-col justify-center">
      <div class="flex justify-between items-end mb-2">
        <span class="text-gray-600 font-medium">สถานะการเบิกจ่ายสำเร็จ (จ่ายแล้ว)</span>
        <span id="dash-progress-text" class="text-2xl font-bold text-green-500">0%</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden">
        <div id="dash-progress-bar" class="bg-green-400 h-4 rounded-full transition-all duration-1000" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 gap-6">
    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-semibold text-gray-700 mb-4">สถิติการเบิกจ่าย (จำนวนเงิน / จำนวนฎีกา)</h3>
      <div class="relative h-[300px] w-full">
        <canvas id="chart-overall"></canvas>
      </div>
    </div>
    
    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-lg font-semibold text-gray-700 mb-4">สถิติประเภทการเบิกจ่าย (แยกตามประเภทเงิน)</h3>
      <div class="relative h-[400px] w-full">
        <canvas id="chart-types"></canvas>
      </div>
    </div>
  </div>
</div>
