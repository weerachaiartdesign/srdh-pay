<!-- dashboard.html - (หน้า Dashboard) - version : 00108 -->

<div class="space-y-6">
    <!-- Summary Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="summaryCards"></div>
    
    <!-- Statistics Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
            <h3 class="font-bold text-lg">ระยะเวลาดำเนินการเฉลี่ย</h3>
            <p id="avgDays" class="text-3xl font-bold text-purple-600">0 วัน</p>
            <p class="text-sm text-gray-500">(รับเรื่อง - อนุมัติ)</p>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
            <h3 class="font-bold text-lg">สถานะการเบิกจ่ายสำเร็จ</h3>
            <div class="w-full bg-gray-200 rounded-full h-4 mt-2">
                <div id="successProgress" class="bg-green-500 h-4 rounded-full" style="width:0%"></div>
            </div>
            <p id="successPercent" class="text-right mt-1 font-semibold">0%</p>
        </div>
    </div>

    <!-- Charts -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
        <h3 class="font-bold text-lg mb-2">สถิติการเบิกจ่าย (แยกหน่วยงาน)</h3>
        <canvas id="deptChart" height="250"></canvas>
        <div id="deptTable" class="mt-4 text-sm overflow-x-auto"></div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
        <h3 class="font-bold text-lg mb-2">สถิติประเภทการเบิกจ่าย</h3>
        <canvas id="moneyTypeChart" height="250"></canvas>
        <div id="moneyTypeTable" class="mt-4 text-sm"></div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
        <h3 class="font-bold text-lg mb-2">จำนวนฎีกาแต่ละเดือน (เปรียบเทียบปีงบประมาณ)</h3>
        <canvas id="monthlyChart" height="250"></canvas>
        <div id="monthlyTable" class="mt-4 text-sm"></div>
    </div>
</div>

<script>
    let deptChart, moneyChart, monthlyChart;
    function initDashboard() {
        google.script.run.withSuccessHandler(renderDashboard).getDashboardData();
    }
    function renderDashboard(data) {
        // summary cards
        const cardsContainer = document.getElementById('summaryCards');
        cardsContainer.innerHTML = '';
        data.summary.forEach(s => {
            cardsContainer.innerHTML += `
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 border-l-8" style="border-color: ${getColorByType(s.type)}">
                    <div class="flex justify-between"><span class="font-bold">${s.type}</span><span class="text-sm">${s.approvedCount}/${s.totalCount} ฎีกา</span></div>
                    <div class="mt-2"><span class="text-gray-500">เบิกแล้ว</span> <span class="text-green-600 font-bold text-xl">${formatNumber(s.approvedAmount)}</span></div>
                    <div><span class="text-gray-500">รอตรวจสอบ</span> <span class="text-red-400">${formatNumber(s.pendingAmount)}</span></div>
                    <div><span class="text-gray-500">ขอเบิกทั้งสิ้น</span> <span class="font-bold">${formatNumber(s.totalAmount)}</span></div>
                </div>
            `;
        });
        document.getElementById('avgDays').innerText = data.avgDays + ' วัน';
        const percent = data.successPercent.toFixed(1);
        document.getElementById('successProgress').style.width = percent+'%';
        document.getElementById('successPercent').innerText = percent+'%';
        
        // แสดง dept chart
        const deptCtx = document.getElementById('deptChart').getContext('2d');
        if(deptChart) deptChart.destroy();
        const deptLabels = [...data.deptChartData.labels, 'หน่วยงานอื่น'];
        const deptValues = [...data.deptChartData.values, data.deptChartData.others];
        deptChart = new Chart(deptCtx, { type: 'bar', data: { labels: deptLabels, datasets: [{ label: 'จำนวนเงิน (บาท)', data: deptValues, backgroundColor: '#a855f7' }] } });
        // ตารางหน่วยงาน
        let deptHtml = '<table class="min-w-full"><thead><tr><th>หน่วยงาน</th><th>ยอดเงิน</th></tr></thead><tbody>';
        data.deptChartData.labels.forEach((l,i)=> deptHtml+=`<tr><td>${l}</td><td class="text-right">${formatNumber(data.deptChartData.values[i])}</td></tr>`);
        deptHtml += `<tr><td>อื่นๆ</td><td class="text-right">${formatNumber(data.deptChartData.others)}</td></tr></tbody></table>`;
        document.getElementById('deptTable').innerHTML = deptHtml;
        
        // monthly chart (จำลอง)
        const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
        if(monthlyChart) monthlyChart.destroy();
        monthlyChart = new Chart(monthlyCtx, { type: 'bar', data: { labels: data.monthlyData.labels, datasets: [{ label: 'ปีงบประมาณปัจจุบัน', data: data.monthlyData.currentYear, backgroundColor: '#f97316' }, { label: 'ปีก่อน', data: data.monthlyData.prevYear, backgroundColor: '#94a3b8' }] } });
    }
    function getColorByType(type) {
        const map = { 'เงินงบประมาณ':'#FFCCFF', 'เงินบำรุง':'#FFFF99', 'เงินประกันสุขภาพ':'#F8CBAD', 'เงินอื่น':'#808080' };
        return map[type] || '#cbd5e1';
    }
    function formatNumber(num) { return new Intl.NumberFormat().format(num); }
</script>
