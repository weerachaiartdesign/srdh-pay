        html,

        .card-hover {

        .skeleton {

            position: relative;

            overflow: hidden;

            background:
                #e5e7eb;
        }

        .skeleton::after {

            content: '';

            position: absolute;

            inset: 0;

            transform:

                linear-gradient(
                    90deg,
                    transparent,
                    rgba(255,255,255,0.5),

            animation:
                shimmer 1.2s infinite;
        }

        @keyframes shimmer {

        @media print {

            body * {

            #printSummary,
            #printSummary * {

                visibility: visible;
            }

            #printSummary {

                position: absolute;

                inset: 0;

    <!-- Script -->
    <script>

        'use strict';

        // ======================
        // STATE
        // ======================

        let moneyChart = null;

        let deptChart = null;

        const DASHBOARD_CACHE_KEY =
            'dashboard_cache_v1';

        const DASHBOARD_CACHE_TIME =
            5 * 60 * 1000;

        // ======================
        // INIT
        // ======================

        document.addEventListener(
            'DOMContentLoaded',
            initializeDashboard
        );

        async function initializeDashboard() {

            bindEvents();

            renderUserInfo();

            await loadDashboard();
        }

        // ======================
        // EVENTS
        // ======================

        function bindEvents() {

            document
                .getElementById(
                    'refreshButton'
                )
                .addEventListener(
                    'click',
                    async () => {

                        await loadDashboard(
                            true
                        );
                    }
                );

            document
                .getElementById(
                    'printButton'
                )
                .addEventListener(
                    'click',
                    () => {

                        window.print();
                    }
                );
        }

        // ======================
        // LOAD
        // ======================

        async function loadDashboard(
            forceRefresh = false
        ) {

            try {

                setDashboardStatus(
                    'Loading...',
                    'text-amber-500'
                );

                const cached =
                    getDashboardCache();

                if (
                    cached &&
                    !forceRefresh
                ) {

                    renderDashboard(
                        cached
                    );

                    setDashboardStatus(
                        'Loaded from cache',
                        'text-green-600'
                    );

                    return;
                }

                UI.showLoading();

                const result =
                    await DashboardAPI
                        .getDashboardData();

                if (
                    !result.success
                ) {

                    throw new Error(
                        result.message
                    );
                }

                saveDashboardCache(
                    result
                );

                renderDashboard(
                    result
                );

                setDashboardStatus(
                    'Updated',
                    'text-green-600'
                );

            } catch (error) {

                console.error(error);

                setDashboardStatus(
                    'Load failed',
                    'text-red-500'
                );

                UI.showToast(
                    error.message,
                    'error'
                );

            } finally {

                UI.hideLoading();
            }
        }

        // ======================
        // RENDER
        // ======================

        function renderDashboard(
            data
        ) {

            renderSummaryCards(
                data.summary
            );

            renderCharts(data);

            renderProgress(
                data.progress
            );

            renderAvgTime(
                data.avgTime
            );

            updateLastUpdate();
        }

        // ======================
        // SUMMARY
        // ======================

        function renderSummaryCards(
            summary
        ) {

            const container =
                document
                    .getElementById(
                        'summaryCards'
                    );

            container.innerHTML = '';

            Object.keys(summary)
                .forEach(type => {

                    const item =
                        summary[type];

                    const card =
                        document.createElement(
                            'div'
                        );

                    card.className =
                        `
                        bg-white
                        dark:bg-slate-900
                        rounded-2xl
                        shadow-sm
                        border
                        border-slate-200
                        dark:border-slate-800
                        p-5
                        card-hover
                        `;

                    card.innerHTML =
                        `
                        <div class="
                            flex
                            items-center
                            justify-between
                            mb-5
                        ">

                            <h3 class="
                                text-lg
                                font-semibold
                            ">
                                ${type}
                            </h3>

                            <span class="
                                text-sm
                                text-slate-400
                            ">
                                ${item.total} รายการ
                            </span>

                        </div>

                        <div class="
                            space-y-3
                        ">

                            <div>

                                <div class="
                                    text-sm
                                    text-slate-500
                                ">
                                    รวมทั้งหมด
                                </div>

                                <div class="
                                    text-2xl
                                    font-bold
                                ">
                                    ${Formatter.currency(
                                        item.totalAmount
                                    )}
                                </div>

                            </div>

                            <div class="
                                grid
                                grid-cols-2
                                gap-3
                                text-sm
                            ">

                                <div>

                                    <div class="
                                        text-slate-500
                                    ">
                                        อนุมัติ
                                    </div>

                                    <div class="
                                        font-semibold
                                        text-green-600
                                    ">
                                        ${Formatter.currency(
                                            item.approvedAmount
                                        )}
                                    </div>

                                </div>

                                <div>

                                    <div class="
                                        text-slate-500
                                    ">
                                        รอดำเนินการ
                                    </div>

                                    <div class="
                                        font-semibold
                                        text-amber-600
                                    ">
                                        ${Formatter.currency(
                                            item.waitingAmount
                                        )}
                                    </div>

                                </div>

                            </div>

                        </div>
                        `;

                    container.appendChild(
                        card
                    );
                });
        }

        // ======================
        // CHARTS
        // ======================

        function renderCharts(
            data
        ) {

            renderMoneyChart(
                data.summary
            );

            renderDeptChart(
                data.summary
            );
        }

        function renderMoneyChart(
            summary
        ) {

            const labels =
                Object.keys(summary);

            const values =
                labels.map(
                    key =>
                    summary[key]
                        .totalAmount
                );

            if (moneyChart) {

                moneyChart.destroy();
            }

            moneyChart =
                new Chart(
                    document
                        .getElementById(
                            'moneyChart'
                        ),
                    {
                        type: 'doughnut',

                        data: {

                            labels,

                            datasets: [

                                {
                                    data: values
                                }
                            ]
                        },

                        options: {

                            responsive: true,

                            maintainAspectRatio:
                                false
                        }
                    }
                );
        }

        function renderDeptChart(
            summary
        ) {

            const labels =
                Object.keys(summary);

            const values =
                labels.map(
                    key =>
                    summary[key]
                        .approvedAmount
                );

            if (deptChart) {

                deptChart.destroy();
            }

            deptChart =
                new Chart(
                    document
                        .getElementById(
                            'deptChart'
                        ),
                    {
                        type: 'bar',

                        data: {

                            labels,

                            datasets: [

                                {
                                    data: values
                                }
                            ]
                        },

                        options: {

                            responsive: true,

                            maintainAspectRatio:
                                false
                        }
                    }
                );
        }

        // ======================
        // KPI
        // ======================

        function renderProgress(
            progress
        ) {

            const value =
                Math.round(
                    progress || 0
                );

            document
                .getElementById(
                    'progressPercent'
                )
                .textContent =
                    `${value}%`;

            document
                .getElementById(
                    'progressBar'
                )
                .style.width =
                    `${value}%`;
        }

        function renderAvgTime(
            avgTime
        ) {

            document
                .getElementById(
                    'avgTime'
                )
                .textContent =
                    Math.round(
                        avgTime || 0
                    );
        }

        function renderUserInfo() {

            const user =
                SessionManager
                    .getUser();

            if (!user) {

                return;
            }

            document
                .getElementById(
                    'currentUserName'
                )
                .textContent =
                    user.username ||
                    '-';

            document
                .getElementById(
                    'currentUserRole'
                )
                .textContent =
                    user.role ||
                    '-';
        }

        // ======================
        // CACHE
        // ======================

        function saveDashboardCache(
            data
        ) {

            localStorage.setItem(
                DASHBOARD_CACHE_KEY,
                JSON.stringify({

                    timestamp:
                        Date.now(),

                    data
                })
            );
        }

        function getDashboardCache() {

            const raw =
                localStorage.getItem(
                    DASHBOARD_CACHE_KEY
                );

            if (!raw) {

                return null;
            }

            try {

                const parsed =
                    JSON.parse(raw);

                const expired =
                    (
                        Date.now() -
                        parsed.timestamp
                    ) >
                    DASHBOARD_CACHE_TIME;

                if (expired) {

                    localStorage.removeItem(
                        DASHBOARD_CACHE_KEY
                    );

                    return null;
                }

                return parsed.data;

            } catch {

                return null;
            }
        }

        // ======================
        // STATUS
        // ======================

        function setDashboardStatus(
            text,
            className
        ) {

            const element =
                document
                    .getElementById(
                        'dashboardStatus'
                    );

            element.className =
                `
                text-sm
                font-medium
                ${className}
                `;

            element.textContent =
                text;
        }

        function updateLastUpdate() {

            document
                .getElementById(
                    'lastUpdate'
                )
                .textContent =
                    Formatter.thaiDate(
                        new Date()
                    ) +
                    ' ' +
                    new Date()
                        .toLocaleTimeString(
                            'th-TH'
                        );
        }

    </script>
