<div class="max-w-7xl mx-auto">
  <div class="flex items-center gap-2 mb-6">
    <h2 class="text-2xl font-bold text-gray-800">ภาพรวมการเบิกจ่าย</h2>
  </div>
  <!-- Summary cards -->
  <div id="dash-summary-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6"></div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
    <div class="bg-white rounded-xl p-5 shadow-sm border flex flex-col justify-center items-center">
      <p class="text-gray-500 text-sm mb-2">ระยะเวลาการดำเนินการเฉลี่ย<br>(รับเรื่อง - อนุมัติ)</p>
      <div id="dash-avg-time" class="text-3xl font-bold text-purple-600">- วัน</div>
    </div>
    <div class="bg-white rounded-xl p-5 shadow-sm border flex flex-col justify-center lg:col-span-2">
      <div class="flex justify-between items-end mb-2">
        <span class="text-gray-600 font-medium">สถานะการเบิกจ่ายสำเร็จ (จ่ายแล้ว)</span>
        <span id="dash-progress-text" class="text-2xl font-bold text-green-500">0%</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-4">
        <div id="dash-progress-bar" class="bg-green-400 h-4 rounded-full transition-all" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-6">
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <h3 class="font-semibold mb-4">สถิติการเบิกจ่าย (จำนวนเงิน / จำนวนฎีกา)</h3>
      <canvas id="chart-overall" height="300"></canvas>
    </div>
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <h3 class="font-semibold mb-4">สถิติประเภทการเบิกจ่าย</h3>
      <canvas id="chart-types" height="350"></canvas>
    </div>
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <h3 class="font-semibold mb-4">จำนวนฎีกาแต่ละเดือน (เทียบปีงบประมาณ)</h3>
      <canvas id="chart-monthly" height="350"></canvas>
    </div>
  </div>
</div>
