<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ทะเบียนเบิกจ่ายเงิน รพส.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="apple-touch-icon" href="icons/register_acc-touch-icon.png">
</head>
<body class="bg-purple-50 text-gray-800" data-theme="light">
    <!-- Header ใช้ main.html แทน แต่เพื่อความสมบูรณ์ของไฟล์เดี่ยว -->
    <header class="bg-white border-b border-purple-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">รพส</div>
                    <div>
                        <h1 class="text-xl font-semibold text-purple-900">ทะเบียนเบิกจ่ายเงิน รพส.</h1>
                        <p class="text-xs text-purple-500">Srdh Pay - Dashboard</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-3 rounded-2xl hover:bg-purple-100">
                        <i id="theme-icon" class="fas fa-moon text-xl"></i>
                    </button>
                    <div onclick="logout()" class="cursor-pointer flex items-center gap-2 text-purple-700 hover:text-purple-900">
                        <i class="fas fa-sign-out-alt"></i>
                        <span class="hidden sm:inline">ออกจากระบบ</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-3xl font-bold text-purple-900 mb-8 flex items-center gap-3">
            <i class="fas fa-tachometer-alt"></i> ภาพรวมระบบ
        </h2>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10" id="summary-cards">
            <!-- Cards generated by JS -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Average Processing Time -->
            <div class="card p-6" id="avg-time-card">
                <h3 class="text-lg font-semibold text-purple-800 mb-4">ระยะเวลาการดำเนินการเฉลี่ย</h3>
                <div class="text-5xl font-bold text-emerald-600" id="avg-days">0</div>
                <p class="text-purple-600">วัน (รับเอกสาร → อนุมัติ)</p>
            </div>

            <!-- Progress -->
            <div class="card p-6 lg:col-span-2">
                <h3 class="text-lg font-semibold text-purple-800 mb-4">ความก้าวหน้าการเบิกจ่าย</h3>
                <div class="flex items-center gap-6">
                    <div class="flex-1">
                        <div class="h-4 bg-purple-100 rounded-full overflow-hidden">
                            <div id="progress-bar" class="progress-bar h-full w-0 transition-all"></div>
                        </div>
                    </div>
                    <div class="text-4xl font-bold text-purple-700" id="progress-percent">0%</div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
            <!-- Chart 1: By Department -->
            <div class="card p-6">
                <h3 class="text-lg font-semibold text-purple-800 mb-4">สถิติการเบิกจ่ายตามหน่วยงาน</h3>
                <canvas id="deptChart" height="120"></canvas>
            </div>

            <!-- Chart 2: By Money Type -->
            <div class="card p-6">
                <h3 class="text-lg font-semibold text-purple-800 mb-4">สถิติตามประเภทเงิน</h3>
                <canvas id="moneyTypeChart" height="120"></canvas>
            </div>
        </div>

        <!-- Monthly Trend -->
        <div class="card p-6 mt-6">
            <h3 class="text-lg font-semibold text-purple-800 mb-4">จำนวนฎีกาแต่ละเดือน (2 ปีงบประมาณ)</h3>
            <canvas id="monthlyChart" height="100"></canvas>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/approve.js"></script>

    <script>

// Version: 00122
// Dashboard Controller - Srdh Pay

let deptChart, moneyTypeChart, monthlyChart;

async function loadDashboard() {
    try {
        const data = await callGAS('getDashboardData');
        
        if (!data.success) {
            console.error(data.message);
            return;
        }

        renderSummaryCards(data.summary);
        renderAverageTime(data.avgTime);
        renderProgress(data.progress);
        renderDepartmentChart(data.deptData);
        renderMoneyTypeChart(data.moneyTypeData);
        renderMonthlyChart(data.monthlyData);

    } catch (error) {
        console.error("Dashboard load error:", error);
        alert("ไม่สามารถโหลดข้อมูล Dashboard ได้");
    }
}

// Render Summary Cards
function renderSummaryCards(summary) {
    const container = document.getElementById('summary-cards');
    container.innerHTML = '';

    const types = [
        { key: 'งบประมาณ', label: 'เงินงบประมาณ', color: 'purple' },
        { key: 'บำรุง', label: 'เงินบำรุง', color: 'amber' },
        { key: 'ประกันสุขภาพ', label: 'เงินประกันสุขภาพ', color: 'orange' },
        { key: 'อื่น', label: 'เงินอื่นๆ', color: 'slate' }
    ];

    types.forEach(type => {
        const s = summary[type.key] || { total: 0, approved: 0, waiting: 0 };
        
        const cardHTML = `
            <div class="card p-6 border-l-4 border-${type.color}-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-${type.color}-600">${type.label}</p>
                        <p class="text-3xl font-bold text-gray-800 mt-2">${s.approved.toLocaleString()} <span class="text-sm font-normal text-gray-500">ฎีกา</span></p>
                    </div>
                    <div class="text-4xl text-${type.color}-200">
                        <i class="fas fa-file-invoice-dollar"></i>
                    </div>
                </div>
                <div class="mt-6 space-y-3 text-sm">
                    <div class="flex justify-between">
                        <span class="text-emerald-600 font-medium">เบิกแล้ว</span>
                        <span class="font-semibold">${formatCurrency(s.approvedAmount)}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-red-500">รอตรวจสอบ</span>
                        <span>${formatCurrency(s.waitingAmount)}</span>
                    </div>
                    <div class="flex justify-between border-t pt-2">
                        <span class="font-medium">ขอเบิกทั้งสิ้น</span>
                        <span class="font-bold">${formatCurrency(s.totalAmount)}</span>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += cardHTML;
    });
}

function renderAverageTime(days) {
    document.getElementById('avg-days').textContent = Math.floor(days || 0);
}

function renderProgress(percent) {
    document.getElementById('progress-bar').style.width = `${percent}%`;
    document.getElementById('progress-percent').textContent = `${Math.round(percent)}%`;
}

// Charts
function renderDepartmentChart(data) {
    if (deptChart) deptChart.destroy();
    
    deptChart = new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: {
            labels: data.labels || [],
            datasets: [{
                label: 'จำนวนเงิน (บาท)',
                data: data.values || [],
                backgroundColor: '#7C3AED',
                borderRadius: 8,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });
}

function renderMoneyTypeChart(data) {
    if (moneyTypeChart) moneyTypeChart.destroy();
    
    moneyTypeChart = new Chart(document.getElementById('moneyTypeChart'), {
        type: 'doughnut',
        data: {
            labels: data.labels || [],
            datasets: [{
                data: data.values || [],
                backgroundColor: ['#7C3AED', '#C026D3', '#F59E0B', '#10B981', '#6366F1']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function renderMonthlyChart(data) {
    if (monthlyChart) monthlyChart.destroy();
    
    monthlyChart = new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: {
            labels: data.months || [],
            datasets: [
                {
                    label: 'ปีปัจจุบัน',
                    data: data.currentYear || [],
                    backgroundColor: '#7C3AED'
                },
                {
                    label: 'ปีก่อนหน้า',
                    data: data.previousYear || [],
                    backgroundColor: '#C4B5FD'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    checkDarkMode();
    loadDashboard();
});
    </script>

    <script src="js/import.js"></script>
    <script src="js/list.js"></script>
    <script src="js/report.js"></script>
    <script src="js/settings.js"></script>
    
</body>
</html>
