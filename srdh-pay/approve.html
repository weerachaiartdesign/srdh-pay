    <script>

        'use strict';

        // ============================================================
        // STATE
        // ============================================================

        let currentPage  = 1;
        let pageSize     = 20;
        let totalPages   = 1;
        let totalRows    = 0;
        let currentRows  = [];
        let selectedUuids = new Set();
        let currentAction = '';
        let masterData    = null;
        let searchTimeout = null;

        // ============================================================
        // INIT
        // ============================================================

        document.addEventListener('DOMContentLoaded', initializePage);

        async function initializePage() {

            try {

                if (!PermissionManager.canAccess('approve')) {
                    UI.showToast('ไม่มีสิทธิ์เข้าถึงหน้านี้', 'error');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
                    return;
                }

                bindEvents();
                restoreFilters();
                await loadMasterData();
                await loadData();

            } catch (error) {
                console.error(error);
                UI.showToast(error.message, 'error');
            }
        }

        // ============================================================
        // MASTER DATA
        // ============================================================

        async function loadMasterData() {
            try {
                const result = await RegisterAPI.getMasterData();
                masterData   = result.data || {};
                populateMoneyTypes(masterData.moneyTypes || []);
            } catch (e) {
                console.warn('loadMasterData:', e.message);
            }
        }

        function populateMoneyTypes(types) {
            const select = document.getElementById('moneyTypeFilter');
            if (!select) return;
            const first = select.options[0];
            select.innerHTML = '';
            select.appendChild(first);
            types.forEach(t => {
                const opt = document.createElement('option');
                opt.value = opt.textContent = t;
                select.appendChild(opt);
            });
        }

        // ============================================================
        // EVENTS
        // ============================================================

        function bindEvents() {

            _on('refreshButton',    'click',  () => loadData(true));
            _on('printButton',      'click',  () => window.print());
            _on('clearFilterButton','click',  clearFilters);
            _on('selectAll',        'change', toggleSelectAll);

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => { currentPage = 1; loadData(); }, 350);
                });
            }

            ['statusFilter', 'moneyTypeFilter', 'startDate', 'endDate'].forEach(id => {
                _on(id, 'change', () => { currentPage = 1; loadData(); });
            });

            _on('pageSize', 'change', () => {
                pageSize    = Number(document.getElementById('pageSize')?.value) || 20;
                currentPage = 1;
                loadData();
            });
        }

        // ============================================================
        // LOAD DATA (server-side filter + pagination)
        // ============================================================

        async function loadData(forceRefresh = false) {

            try {

                UI.showLoading();
                selectedUuids.clear();
                updateSelectAllCheckbox();

                const params = _buildParams();
                const result = await RegisterAPI.getList(params);

                currentRows = result.data || [];

                const pag  = result.pagination || {};
                currentPage = pag.page       || 1;
                pageSize    = pag.pageSize    || 20;
                totalPages  = pag.totalPages  || 1;
                totalRows   = pag.total       || 0;

                renderTable();
                renderPaginationInfo();
                Pagination.render(
                    document.getElementById('paginationContainer'),
                    currentPage, totalPages, goToPage
                );

            } catch (error) {
                console.error(error);
                UI.showToast(error.message, 'error');
            } finally {
                UI.hideLoading();
            }
        }

        function _buildParams() {

            const status    = document.getElementById('statusFilter')?.value    || '';
            const moneyType = document.getElementById('moneyTypeFilter')?.value || '';
            const keyword   = document.getElementById('searchInput')?.value.trim() || '';

            return {
                page     : currentPage,
                pageSize,
                keyword,
                status,
                moneyType,
                sortDir  : 'desc'
            };
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadData();
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================

        function renderTable() {

            const tbody = document.getElementById('tableBody');
            if (!tbody) return;

            if (!currentRows.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="px-6 py-12 text-center text-slate-500 text-sm">
                            ไม่พบข้อมูล
                        </td>
                    </tr>`;
                return;
            }

            const startNo = (currentPage - 1) * pageSize + 1;

            tbody.innerHTML = currentRows.map((row, i) => {

                const uuid    = row.uuid || '';
                const checked = selectedUuids.has(uuid);

                return `
                    <tr class="border-b border-slate-200 text-sm ${checked ? 'bg-violet-50' : 'hover:bg-slate-50'}">
                        <td class="px-4 py-3">
                            <input type="checkbox" ${checked ? 'checked' : ''}
                                onchange="toggleRowSelection('${escapeHtml(uuid)}')"
                                class="rounded">
                        </td>
                        <td class="px-4 py-3 text-slate-400 text-xs">${startNo + i}</td>
                        <td class="px-4 py-3 font-mono text-xs font-medium">${escapeHtml(row.registerNo || '-')}</td>
                        <td class="px-4 py-3 font-mono text-xs">${escapeHtml(Formatter.runningNo(row.receiveNo) || '-')}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-0.5 rounded text-xs bg-slate-100 text-slate-600">
                                ${escapeHtml(row.moneyType || '-')}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-xs text-slate-500">${escapeHtml(row.dept || '-')}</td>
                        <td class="px-4 py-3">${escapeHtml(row.vendor || '-')}</td>
                        <td class="px-4 py-3 text-right font-medium">${Formatter.currency(row.amount)}</td>
                        <td class="px-4 py-3">${StatusHelper.badge(row.status)}</td>
                        <td class="px-4 py-3">
                            ${_renderActionButtons(row)}
                        </td>
                    </tr>`;
            }).join('');
        }

        // ============================================================
        // ACTION BUTTONS (per row)
        // ============================================================

        function _renderActionButtons(row) {

            const user   = SessionManager.getUser();
            if (!user) return '';
            const role   = user.role;
            const status = row.status;

            const actionMap = {
                receive : { roles: ['admin','editor'],          label: 'รับเอกสาร',   status: 'รอดำเนินการ'  },
                pass    : { roles: ['admin','editor'],          label: 'ตรวจผ่าน',    status: 'รับเอกสาร'   },
                propose : { roles: ['admin','editor'],          label: 'เสนอ',         status: 'ตรวจผ่าน'   },
                approve : { roles: ['admin'],                   label: 'อนุมัติ',      status: 'เสนอ'       },
                pay     : { roles: ['admin','checker'],         label: 'จ่ายเช็ค',    status: 'อนุมัติ'    }
            };

            const buttons = Object.entries(actionMap)
                .filter(([action, cfg]) =>
                    cfg.roles.includes(role) && cfg.status === status
                )
                .map(([action, cfg]) => `
                    <button onclick="openActionModal('${action}', '${escapeHtml(row.uuid)}')"
                        class="px-2.5 py-1 rounded-lg bg-violet-600 hover:bg-violet-700 text-white text-xs mr-1">
                        ${cfg.label}
                    </button>`
                ).join('');

            return buttons || '';
        }

        // ============================================================
        // PAGINATION INFO
        // ============================================================

        function renderPaginationInfo() {
            const el    = document.getElementById('paginationInfo');
            if (!el) return;
            const start = totalRows === 0 ? 0 : (currentPage - 1) * pageSize + 1;
            const end   = Math.min(currentPage * pageSize, totalRows);
            el.textContent = `แสดง ${start}–${end} จาก ${totalRows.toLocaleString('th-TH')} รายการ`;
        }

        // ============================================================
        // SELECTION
        // ============================================================

        function toggleRowSelection(uuid) {

            if (selectedUuids.has(uuid)) {
                selectedUuids.delete(uuid);
            } else {
                if (selectedUuids.size >= 100) {
                    UI.showToast('เลือกได้สูงสุด 100 รายการ', 'warning');
                    return;
                }
                selectedUuids.add(uuid);
            }

            renderTable();
            updateSelectAllCheckbox();
        }

        function toggleSelectAll(event) {

            if (event.target.checked) {
                currentRows.slice(0, 100).forEach(row => {
                    if (row.uuid) selectedUuids.add(row.uuid);
                });
            } else {
                selectedUuids.clear();
            }

            renderTable();
        }

        function updateSelectAllCheckbox() {
            const chk = document.getElementById('selectAll');
            if (!chk) return;
            chk.checked       = selectedUuids.size > 0 && selectedUuids.size >= currentRows.length;
            chk.indeterminate = selectedUuids.size > 0 && selectedUuids.size < currentRows.length;
        }

        // ============================================================
        // ACTION MODAL
        // ============================================================

        function openActionModal(action, uuid = null) {

            // ถ้าส่ง uuid มา = single row action; ไม่ส่ง = batch จาก selectedUuids
            if (uuid) {
                selectedUuids.clear();
                selectedUuids.add(uuid);
                renderTable();
            }

            if (!selectedUuids.size) {
                UI.showToast('กรุณาเลือกรายการ', 'warning');
                return;
            }

            currentAction = action;

            const labels = {
                receive: 'รับเอกสาร', edit   : 'ส่งแก้ไข',
                returned: 'รับคืน',   pass   : 'ตรวจผ่าน',
                propose : 'เสนอ',     approve: 'อนุมัติ',
                pay     : 'จ่ายเช็ค', cancel : 'ยกเลิก'
            };

            _setEl('modalTitle',    labels[action] || action);
            _setEl('selectedCount', selectedUuids.size);

            // แสดง/ซ่อน fields ตาม action
            _toggleEl('checkerContainer', action === 'pay');
            _toggleEl('noteContainer',    action === 'cancel' || action === 'edit');

            document.getElementById('actionModal').classList.remove('hidden');
            document.getElementById('confirmActionButton').onclick = executeAction;
        }

        function openCancelModal() {
            openActionModal('cancel');
        }

        function closeModal() {
            document.getElementById('actionModal').classList.add('hidden');
            // reset fields
            const note    = document.getElementById('actionNote');
            const checker = document.getElementById('checkerInput');
            const date    = document.getElementById('actionDate');
            if (note)    note.value    = '';
            if (checker) checker.value = '';
            if (date)    date.value    = '';
        }

        // ============================================================
        // EXECUTE ACTION (batchUpdateStatus)
        // ============================================================

        async function executeAction() {

            try {

                UI.showLoading();

                const note    = document.getElementById('actionNote')?.value    || '';
                const checker = document.getElementById('checkerInput')?.value  || '';
                const date    = document.getElementById('actionDate')?.value    || '';

                if (!date) throw new Error('กรุณาระบุวันที่');

                if (currentAction === 'cancel' && !note)
                    throw new Error('กรุณาระบุเหตุผลการยกเลิก');

                if (currentAction === 'pay' && !checker)
                    throw new Error('กรุณาระบุผู้จ่ายเช็ค');

                const uuids = [...selectedUuids];

                const result = await RegisterAPI.batchUpdateStatus(
                    uuids,
                    currentAction,
                    note
                );

                const successCount = (result.results || [])
                    .filter(r => r.result?.success !== false).length;

                UI.showToast(`อัปเดตสถานะสำเร็จ ${successCount}/${uuids.length} รายการ`);

                selectedUuids.clear();
                closeModal();
                await loadData(true);

            } catch (error) {
                console.error(error);
                UI.showToast(error.message, 'error');
            } finally {
                UI.hideLoading();
            }
        }

        // ============================================================
        // FILTER STORAGE
        // ============================================================

        function saveFilters() {
            localStorage.setItem('srdh_approve_filters', JSON.stringify({
                status   : document.getElementById('statusFilter')?.value    || '',
                moneyType: document.getElementById('moneyTypeFilter')?.value || '',
                keyword  : document.getElementById('searchInput')?.value     || ''
            }));
        }

        function restoreFilters() {
            try {
                const raw = localStorage.getItem('srdh_approve_filters');
                if (!raw) return;
                const f = JSON.parse(raw);
                _setInputVal('statusFilter',    f.status);
                _setInputVal('moneyTypeFilter', f.moneyType);
                _setInputVal('searchInput',     f.keyword);
            } catch (e) { /* ignore */ }
        }

        function clearFilters() {
            ['searchInput','statusFilter','moneyTypeFilter','startDate','endDate'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            localStorage.removeItem('srdh_approve_filters');
            currentPage = 1;
            loadData();
        }

        // ============================================================
        // HELPERS
        // ============================================================

        function _setEl(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function _setInputVal(id, value) {
            const el = document.getElementById(id);
            if (el && value !== undefined) el.value = value;
        }

        function _toggleEl(id, show) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden', !show);
        }

        function _on(id, event, handler) {
            const el = document.getElementById(id);
            if (el) el.addEventListener(event, handler);
        }

    </script>

</body>

</html>
