    <script>

        'use strict';

        // ======================
        // STATE
        // ======================

        let allRows = [];

        let filteredRows = [];

        let selectedRows = new Set();

        let currentAction = '';

        let searchTimeout = null;

        // ======================
        // INIT
        // ======================

        document.addEventListener(
            'DOMContentLoaded',
            initializePage
        );

        async function initializePage() {

            try {

                Auth.requireRoles([
                    'admin',
                    'editor',
                    'checker'
                ]);

                bindEvents();

                initializePermissions();

                restoreFilters();

                await loadData();

                startAutoRefresh();

            } catch (error) {

                console.error(error);

                UI.showToast(
                    error.message,
                    'error'
                );
            }
        }

        // ======================
        // EVENTS
        // ======================

        function bindEvents() {

            document
                .getElementById(
                    'refreshButton'
                )
                .addEventListener(
                    'click',
                    loadData
                );

            document
                .getElementById(
                    'printButton'
                )
                .addEventListener(
                    'click',
                    () => window.print()
                );

            document
                .getElementById(
                    'searchInput'
                )
                .addEventListener(
                    'input',
                    handleSearch
                );

            [
                'statusFilter',
                'moneyTypeFilter',
                'startDate',
                'endDate'
            ].forEach(id => {

                document
                    .getElementById(id)
                    .addEventListener(
                        'change',
                        applyFilters
                    );
            });

            document
                .getElementById(
                    'clearFilterButton'
                )
                .addEventListener(
                    'click',
                    clearFilters
                );

            document
                .getElementById(
                    'selectAll'
                )
                .addEventListener(
                    'change',
                    toggleSelectAll
                );
        }

        // ======================
        // PERMISSIONS
        // ======================

        function initializePermissions() {

            const role =
                Auth.user.role;

            if (
                role === 'admin'
            ) {

                document
                    .querySelectorAll(
                        '.action-admin, .action-editor, .action-checker'
                    )
                    .forEach(element => {

                        element.classList.remove(
                            'hidden'
                        );
                    });

                return;
            }

            if (
                role === 'editor'
            ) {

                document
                    .querySelectorAll(
                        '.action-editor'
                    )
                    .forEach(element => {

                        element.classList.remove(
                            'hidden'
                        );
                    });
            }

            if (
                role === 'checker'
            ) {

                document
                    .querySelectorAll(
                        '.action-checker'
                    )
                    .forEach(element => {

                        element.classList.remove(
                            'hidden'
                        );
                    });
            }
        }

        // ======================
        // LOAD
        // ======================

        async function loadData() {

            try {

                UI.showLoading();

                const result =
                    await RegisterAPI
                        .getRegisterData();

                if (
                    !result.success
                ) {

                    throw new Error(
                        result.message
                    );
                }

                allRows =
                    result.data || [];

                applyFilters();

                populateMoneyTypes();

            } catch (error) {

                console.error(error);

                UI.showToast(
                    error.message,
                    'error'
                );

            } finally {

                UI.hideLoading();
            }
        }

        // ======================
        // FILTER
        // ======================

        function handleSearch() {

            clearTimeout(
                searchTimeout
            );

            searchTimeout =
                setTimeout(
                    applyFilters,
                    300
                );
        }

        function applyFilters() {

            saveFilters();

            const search =
                document
                    .getElementById(
                        'searchInput'
                    )
                    .value
                    .toLowerCase();

            const status =
                document
                    .getElementById(
                        'statusFilter'
                    )
                    .value;

            const moneyType =
                document
                    .getElementById(
                        'moneyTypeFilter'
                    )
                    .value;

            filteredRows =
                allRows.filter(
                    row => {

                        const rowStatus =
                            getRowStatus(
                                row
                            );

                        const searchable =
                            JSON.stringify(
                                row
                            ).toLowerCase();

                        if (
                            search &&
                            !searchable.includes(
                                search
                            )
                        ) {

                            return false;
                        }

                        if (
                            status &&
                            rowStatus !== status
                        ) {

                            return false;
                        }

                        if (
                            moneyType &&
                            row[0] !== moneyType
                        ) {

                            return false;
                        }

                        return true;
                    }
                );

            renderTable();
        }

        function clearFilters() {

            [
                'searchInput',
                'statusFilter',
                'moneyTypeFilter',
                'startDate',
                'endDate'
            ].forEach(id => {

                document.getElementById(
                    id
                ).value = '';
            });

            applyFilters();
        }

        // ======================
        // TABLE
        // ======================

        function renderTable() {

            const tbody =
                document.getElementById(
                    'tableBody'
                );

            tbody.innerHTML = '';

            if (
                !filteredRows.length
            ) {

                tbody.innerHTML =
                    `
                    <tr>
                        <td
                            colspan="10"
                            class="
                                px-6
                                py-12
                                text-center
                                text-slate-500
                            "
                        >
                            ไม่พบข้อมูล
                        </td>
                    </tr>
                    `;

                return;
            }

            filteredRows.forEach(
                row => {

                    const status =
                        getRowStatus(
                            row
                        );

                    const registerNo =
                        row[9] || '-';

                    const receiveNo =
                        row[10] || '-';

                    const uniqueId =
                        receiveNo;

                    const tr =
                        document.createElement(
                            'tr'
                        );

                    if (
                        selectedRows.has(
                            uniqueId
                        )
                    ) {

                        tr.classList.add(
                            'table-row-selected'
                        );
                    }

                    tr.innerHTML =
                        `
                        <td class="px-4 py-3">

                            <input
                                type="checkbox"
                                ${selectedRows.has(uniqueId) ? 'checked' : ''}
                                onchange="toggleRowSelection('${uniqueId}')"
                            />

                        </td>

                        <td class="px-4 py-3">
                            ${registerNo}
                        </td>

                        <td class="px-4 py-3">
                            ${receiveNo}
                        </td>

                        <td class="px-4 py-3">
                            ${row[0] || '-'}
                        </td>

                        <td class="px-4 py-3">
                            ${row[1] || '-'}
                        </td>

                        <td class="px-4 py-3">
                            ${row[4] || '-'}
                        </td>

                        <td class="px-4 py-3 text-right">
                            ${formatCurrency(row[5])}
                        </td>

                        <td class="px-4 py-3">

                            ${renderStatusBadge(status)}

                        </td>

                        <td class="px-4 py-3">

                            ${renderTimeline(row)}

                        </td>

                        <td class="px-4 py-3 text-xs text-slate-500">
                            ${formatDate(row[24])}
                        </td>
                        `;

                    tbody.appendChild(
                        tr
                    );
                }
            );
        }

        // ======================
        // STATUS
        // ======================

        function renderStatusBadge(
            status
        ) {

            const map = {

                'รับเอกสาร':
                    'status-receive',

                'ตรวจผ่าน':
                    'status-pass',

                'เสนอ':
                    'status-propose',

                'อนุมัติ':
                    'status-approve',

                'จ่ายแล้ว':
                    'status-pay',

                'ส่งแก้ไข':
                    'status-edit',

                'ยกเลิก':
                    'status-cancel'
            };

            return `
            <span class="
                px-3
                py-1
                rounded-full
                text-xs
                font-medium
                ${map[status] || ''}
            ">
                ${status}
            </span>
            `;
        }

        function renderTimeline(
            row
        ) {

            const timeline = [];

            if (row[16]) {

                timeline.push(
                    `
                    <div class="flex items-center gap-2">
                        <div class="timeline-dot bg-blue-500"></div>
                        <span>รับ</span>
                    </div>
                    `
                );
            }

            if (row[17]) {

                timeline.push(
                    `
                    <div class="flex items-center gap-2">
                        <div class="timeline-dot bg-amber-500"></div>
                        <span>แก้ไข</span>
                    </div>
                    `
                );
            }

            if (row[19]) {

                timeline.push(
                    `
                    <div class="flex items-center gap-2">
                        <div class="timeline-dot bg-emerald-500"></div>
                        <span>ผ่าน</span>
                    </div>
                    `
                );
            }

            if (row[20]) {

                timeline.push(
                    `
                    <div class="flex items-center gap-2">
                        <div class="timeline-dot bg-purple-500"></div>
                        <span>เสนอ</span>
                    </div>
                    `
                );
            }

            if (row[21]) {

                timeline.push(
                    `
                    <div class="flex items-center gap-2">
                        <div class="timeline-dot bg-sky-500"></div>
                        <span>อนุมัติ</span>
                    </div>
                    `
                );
            }

            if (row[22]) {

                timeline.push(
                    `
                    <div class="flex items-center gap-2">
                        <div class="timeline-dot bg-green-600"></div>
                        <span>จ่าย</span>
                    </div>
                    `
                );
            }

            return `
            <div class="
                flex
                flex-wrap
                gap-2
            ">
                ${timeline.join('')}
            </div>
            `;
        }

        // ======================
        // SELECT
        // ======================

        function toggleRowSelection(
            id
        ) {

            if (
                selectedRows.has(id)
            ) {

                selectedRows.delete(id);

            } else {

                if (
                    selectedRows.size >= 100
                ) {

                    UI.showToast(
                        'เลือกได้สูงสุด 100 รายการ',
                        'warning'
                    );

                    return;
                }

                selectedRows.add(id);
            }

            renderTable();
        }

        function toggleSelectAll(
            event
        ) {

            if (
                event.target.checked
            ) {

                filteredRows
                    .slice(0, 100)
                    .forEach(row => {

                        selectedRows.add(
                            row[10]
                        );
                    });

            } else {

                selectedRows.clear();
            }

            renderTable();
        }

        // ======================
        // ACTION
        // ======================

        function openActionModal(
            action
        ) {

            if (
                !selectedRows.size
            ) {

                UI.showToast(
                    'กรุณาเลือกรายการ',
                    'warning'
                );

                return;
            }

            currentAction =
                action;

            document
                .getElementById(
                    'modalTitle'
                )
                .textContent =
                getActionLabel(
                    action
                );

            document
                .getElementById(
                    'selectedCount'
                )
                .textContent =
                selectedRows.size;

            document
                .getElementById(
                    'checkerContainer'
                )
                .classList.toggle(
                    'hidden',
                    action !== 'pay'
                );

            document
                .getElementById(
                    'noteContainer'
                )
                .classList.toggle(
                    'hidden',
                    action !== 'edit'
                );

            document
                .getElementById(
                    'actionModal'
                )
                .classList.remove(
                    'hidden'
                );

            document
                .getElementById(
                    'confirmActionButton'
                )
                .onclick =
                executeAction;
        }

        function openCancelModal() {

            openActionModal(
                'cancel'
            );

            document
                .getElementById(
                    'noteContainer'
                )
                .classList.remove(
                    'hidden'
                );
        }

        function closeModal() {

            document
                .getElementById(
                    'actionModal'
                )
                .classList.add(
                    'hidden'
                );
        }

        async function executeAction() {

            try {

                UI.showLoading();

                const date =
                    document
                        .getElementById(
                            'actionDate'
                        )
                        .value;

                const note =
                    document
                        .getElementById(
                            'actionNote'
                        )
                        .value;

                const checker =
                    document
                        .getElementById(
                            'checkerInput'
                        )
                        .value;

                if (
                    !date
                ) {

                    throw new Error(
                        'กรุณาระบุวันที่'
                    );
                }

                if (
                    currentAction === 'cancel' &&
                    !note
                ) {

                    throw new Error(
                        'กรุณาระบุเหตุผลการยกเลิก'
                    );
                }

                if (
                    currentAction === 'pay' &&
                    !checker
                ) {

                    throw new Error(
                        'กรุณาระบุผู้จ่ายเช็ค'
                    );
                }

                const items =
                    allRows.filter(
                        row =>
                            selectedRows.has(
                                row[10]
                            )
                    );

                const result =
                    await RegisterAPI
                        .updateWorkflowStatus({

                            action:
                                currentAction,

                            items,

                            date,

                            note,

                            checker
                        });

                if (
                    !result.success
                ) {

                    throw new Error(
                        result.message
                    );
                }

                UI.showToast(
                    'อัพเดทสถานะสำเร็จ',
                    'success'
                );

                selectedRows.clear();

                closeModal();

                await loadData();

            } catch (error) {

                console.error(error);

                UI.showToast(
                    error.message,
                    'error'
                );

            } finally {

                UI.hideLoading();
            }
        }

        // ======================
        // STORAGE
        // ======================

        function saveFilters() {

            localStorage.setItem(
                'approve_filters',
                JSON.stringify({

                    search:
                        document.getElementById(
                            'searchInput'
                        ).value,

                    status:
                        document.getElementById(
                            'statusFilter'
                        ).value,

                    moneyType:
                        document.getElementById(
                            'moneyTypeFilter'
                        ).value
                })
            );
        }

        function restoreFilters() {

            const raw =
                localStorage.getItem(
                    'approve_filters'
                );

            if (!raw) {

                return;
            }

            try {

                const filters =
                    JSON.parse(raw);

                document.getElementById(
                    'searchInput'
                ).value =
                    filters.search || '';

                document.getElementById(
                    'statusFilter'
                ).value =
                    filters.status || '';

                document.getElementById(
                    'moneyTypeFilter'
                ).value =
                    filters.moneyType || '';

            } catch (error) {

                console.error(error);
            }
        }

        // ======================
        // REFRESH
        // ======================

        function startAutoRefresh() {

            setInterval(
                async () => {

                    await loadData();

                },
                300000
            );
        }

        // ======================
        // UTILS
        // ======================

        function populateMoneyTypes() {

            const select =
                document.getElementById(
                    'moneyTypeFilter'
                );

            const current =
                select.value;

            const values =
                [
                    ...new Set(
                        allRows.map(
                            row => row[0]
                        )
                    )
                ]
                    .filter(Boolean)
                    .sort();

            select.innerHTML =
                `
                <option value="">
                    ทั้งหมด
                </option>
                `;

            values.forEach(
                value => {

                    const option =
                        document.createElement(
                            'option'
                        );

                    option.value =
                        value;

                    option.textContent =
                        value;

                    select.appendChild(
                        option
                    );
                }
            );

            select.value =
                current;
        }

        function getActionLabel(
            action
        ) {

            const map = {

                receive:
                    'รับเอกสาร',

                edit:
                    'ส่งแก้ไข',

                return:
                    'รับคืน',

                pass:
                    'ตรวจผ่าน',

                propose:
                    'เสนอ',

                pay:
                    'จ่ายเช็ค',

                cancel:
                    'ยกเลิก'
            };

            return map[action] || action;
        }

    </script>

</body>

</html>
