<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายการ - Srdh Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="apple-touch-icon" href="icons/register_acc-touch-icon.png">
</head>
<body class="bg-purple-50 text-gray-800" data-theme="light">
    <!-- Header -->
    <header class="bg-white border-b border-purple-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">รพส</div>
                    <div>
                        <h1 class="text-xl font-semibold text-purple-900">บันทึกรายการเบิกจ่าย</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-3 rounded-2xl hover:bg-purple-100">
                        <i id="theme-icon" class="fas fa-moon text-xl"></i>
                    </button>
                    <button onclick="window.location.href='list.html'" 
                            class="px-5 py-2 text-purple-700 hover:bg-purple-100 rounded-2xl flex items-center gap-2">
                        <i class="fas fa-list"></i>
                        <span class="hidden md:inline">ทะเบียนฎีกา</span>
                    </button>
                    <div onclick="logout()" class="cursor-pointer text-purple-700 hover:text-red-600">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <h2 class="text-3xl font-bold text-purple-900 flex items-center gap-3">
                <i class="fas fa-check-circle"></i> บันทึกรายการ
            </h2>
            
            <div class="flex gap-3">
                <button onclick="performAction('receive')" 
                        class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl flex items-center gap-2 transition-all">
                    <i class="fas fa-inbox"></i> รับเอกสาร
                </button>
                <button onclick="performAction('edit')" 
                        class="px-6 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-2xl flex items-center gap-2 transition-all">
                    <i class="fas fa-edit"></i> ส่งแก้ไข
                </button>
                <button onclick="performAction('propose')" 
                        class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl flex items-center gap-2 transition-all">
                    <i class="fas fa-paper-plane"></i> ส่งเสนอ
                </button>
                <button onclick="performAction('pay')" 
                        class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center gap-2 transition-all">
                    <i class="fas fa-money-check"></i> จ่ายเช็ค
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-3xl p-6 shadow-sm mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="searchInput" placeholder="ค้นหา..." 
                       onkeyup="if(event.key==='Enter') filterApproveData()" 
                       class="px-5 py-4 border border-purple-200 rounded-2xl focus:outline-none focus:border-purple-500">
                
                <select id="filterMoneyType" onchange="filterApproveData()" class="px-5 py-4 border border-purple-200 rounded-2xl">
                    <option value="">ทุกประเภทเงิน</option>
                </select>
                
                <select id="filterDept" onchange="filterApproveData()" class="px-5 py-4 border border-purple-200 rounded-2xl">
                    <option value="">ทุกหน่วยงาน</option>
                </select>
                
                <select id="filterStatus" onchange="filterApproveData()" class="px-5 py-4 border border-purple-200 rounded-2xl">
                    <option value="">ทุกสถานะ</option>
                </select>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-3xl shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-purple-100">
                        <tr>
                            <th class="w-12 px-4 py-5">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
                            </th>
                            <th class="px-6 py-5 text-left text-purple-800 font-semibold">ลำดับ / วันที่รับ</th>
                            <th class="px-6 py-5 text-left text-purple-800 font-semibold">สถานะ</th>
                            <th class="px-6 py-5 text-left text-purple-800 font-semibold">ชื่อเจ้าหนี้</th>
                            <th class="px-6 py-5 text-left text-purple-800 font-semibold">รายการ</th>
                            <th class="px-6 py-5 text-right text-purple-800 font-semibold">จำนวนเงิน</th>
                            <th class="px-6 py-5 text-left text-purple-800 font-semibold">ประเภทเงิน</th>
                        </tr>
                    </thead>
                    <tbody id="approve-table-body" class="divide-y divide-purple-100"></tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center mt-6 px-4">
            <div id="selected-count" class="text-sm text-purple-600">เลือก 0 รายการ</div>
            <div id="approve-pagination" class="flex gap-2"></div>
        </div>
    </div>

    <!-- Date Picker Popup -->
    <div id="dateModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
            <h3 class="text-xl font-semibold mb-6 text-purple-900" id="modal-title">เลือกวันที่</h3>
            <input type="date" id="action-date" class="w-full px-5 py-4 border border-purple-200 rounded-2xl text-lg">
            <div class="flex gap-4 mt-8">
                <button onclick="closeDateModal()" 
                        class="flex-1 py-4 border border-gray-300 rounded-2xl">ยกเลิก</button>
                <button onclick="confirmAction()" 
                        class="flex-1 btn-primary py-4 rounded-2xl text-white">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/main.js"></script>

    <script>

// Version: 00122
// Approve Page Controller - หน้าบันทึกรายการ (สำหรับ Checker & Admin)

let approveData = [];
let filteredApproveData = [];
let selectedItems = new Set();
let currentAction = null;

// โหลดข้อมูล
async function loadApproveData() {
    try {
        const result = await callGAS('getRegisterData');
        if (result.success) {
            approveData = result.data || [];
            filteredApproveData = [...approveData];
            renderApproveTable();
            populateApproveFilters();
        }
    } catch (error) {
        console.error("Load approve data error:", error);
    }
}

function populateApproveFilters() {
    // Similar to list.js - populate dropdowns
    const moneySelect = document.getElementById('filterMoneyType');
    const deptSelect = document.getElementById('filterDept');
    
    const moneyTypes = new Set(approveData.map(row => row[0]).filter(Boolean));
    const depts = new Set(approveData.map(row => row[1]).filter(Boolean));
    
    moneyTypes.forEach(type => {
        const opt = document.createElement('option');
        opt.value = type; opt.textContent = type;
        moneySelect.appendChild(opt);
    });
    
    depts.forEach(dept => {
        const opt = document.createElement('option');
        opt.value = dept; opt.textContent = dept;
        deptSelect.appendChild(opt);
    });
}

function renderApproveTable() {
    const tbody = document.getElementById('approve-table-body');
    tbody.innerHTML = '';

    filteredApproveData.forEach((row, index) => {
        const status = getStatus(row);
        const isChecked = selectedItems.has(index);
        
        const tr = document.createElement('tr');
        tr.className = `table-row hover:bg-purple-50 ${isChecked ? 'bg-purple-50' : ''}`;
        tr.innerHTML = `
            <td class="px-4 py-5">
                <input type="checkbox" ${isChecked ? 'checked' : ''} 
                       onchange="toggleSelect(${index}, this)">
            </td>
            <td class="px-6 py-5">
                <div class="text-sm">${formatThaiDate(row[16])}</div>
                <div class="font-medium">เลขรับ: ${row[10] || '-'}</div>
            </td>
            <td class="px-6 py-5">
                <span class="px-4 py-1.5 rounded-2xl text-xs font-medium ${getStatusClass(status)}">${status}</span>
            </td>
            <td class="px-6 py-5 font-semibold">${row[4] || '-'}</td>
            <td class="px-6 py-5 max-w-md truncate">${row[6] || '-'}</td>
            <td class="px-6 py-5 text-right font-bold">${formatCurrency(row[5])}</td>
            <td class="px-6 py-5">
                <span class="money-type-${(row[0] || '').replace(/ /g,'')} px-4 py-1 rounded-2xl text-xs">${row[0] || '-'}</span>
            </td>
        `;
        tbody.appendChild(tr);
    });

    updateSelectedCount();
}

function toggleSelect(index, checkbox) {
    if (checkbox.checked) {
        selectedItems.add(index);
    } else {
        selectedItems.delete(index);
    }
    updateSelectedCount();
}

function toggleSelectAll(checkbox) {
    selectedItems.clear();
    if (checkbox.checked) {
        filteredApproveData.forEach((_, i) => selectedItems.add(i));
    }
    renderApproveTable();
}

function updateSelectedCount() {
    document.getElementById('selected-count').textContent = `เลือก ${selectedItems.size} รายการ`;
}

// ปุ่ม Action
function performAction(action) {
    if (selectedItems.size === 0) {
        alert("กรุณาเลือกรายการอย่างน้อย 1 รายการ");
        return;
    }
    
    currentAction = action;
    
    const titles = {
        'receive': 'รับเอกสาร',
        'edit': 'ส่งแก้ไข',
        'propose': 'ส่งเสนอ',
        'pay': 'จ่ายเช็ค'
    };
    
    document.getElementById('modal-title').textContent = titles[action];
    document.getElementById('dateModal').classList.remove('hidden');
}

function closeDateModal() {
    document.getElementById('dateModal').classList.add('hidden');
}

async function confirmAction() {
    const date = document.getElementById('action-date').value;
    if (!date) {
        alert("กรุณาเลือกวันที่");
        return;
    }

    const selectedRows = Array.from(selectedItems).map(i => filteredApproveData[i]);

    try {
        const result = await callGAS('updateStatus', {
            action: currentAction,
            items: selectedRows,
            date: date,
            user: currentUser
        });

        if (result.success) {
            alert(`ดำเนินการ "${currentAction}" สำเร็จ`);
            selectedItems.clear();
            closeDateModal();
            loadApproveData(); // Refresh
        }
    } catch (error) {
        alert("เกิดข้อผิดพลาดในการบันทึก");
    }
}

// Filter
function filterApproveData() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const money = document.getElementById('filterMoneyType').value;
    const dept = document.getElementById('filterDept').value;
    const statusFilter = document.getElementById('filterStatus').value;

    filteredApproveData = approveData.filter(row => {
        let match = true;
        if (term) {
            match = row.some(cell => cell && String(cell).toLowerCase().includes(term));
        }
        if (money && row[0] !== money) match = false;
        if (dept && row[1] !== dept) match = false;
        if (statusFilter && getStatus(row) !== statusFilter) match = false;
        return match;
    });

    renderApproveTable();
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    checkDarkMode();
    loadApproveData();
});
    </script>
    
</body>
</html>
