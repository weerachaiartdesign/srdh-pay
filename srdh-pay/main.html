<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนเบิกจ่ายเงิน รพส. (Srdh Pay)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <!-- Favicon -->
    <link rel="icon" href="icons/register_acc-152.png">
</head>
<body class="bg-purple-50 text-gray-800">
    <!-- HEADER -->
    <header class="bg-white border-b border-purple-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl shadow-inner">รพส</div>
                    <div>
                        <h1 class="text-xl font-semibold text-purple-800">ทะเบียนเบิกจ่ายเงิน</h1>
                        <p class="text-xs text-purple-500 -mt-1">โรงพยาบาลสิริน (Srdh Pay)</p>
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="dashboard.html" class="nav-link flex items-center gap-2 text-purple-700 hover:text-purple-900 transition-colors active">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="list.html" class="nav-link flex items-center gap-2 text-purple-700 hover:text-purple-900 transition-colors">
                        <i class="fas fa-list"></i>
                        <span>ทะเบียนฎีกา</span>
                    </a>
                    <a href="import.html" class="nav-link flex items-center gap-2 text-purple-700 hover:text-purple-900 transition-colors">
                        <i class="fas fa-file-import"></i>
                        <span>นำเข้า</span>
                    </a>
                    <a href="approve.html" class="nav-link flex items-center gap-2 text-purple-700 hover:text-purple-900 transition-colors">
                        <i class="fas fa-check-circle"></i>
                        <span>บันทึก</span>
                    </a>
                    <a href="report.html" class="nav-link flex items-center gap-2 text-purple-700 hover:text-purple-900 transition-colors">
                        <i class="fas fa-chart-bar"></i>
                        <span>รายงาน</span>
                    </a>
                </nav>

                <div class="flex items-center gap-4">
                    <!-- Dark Mode Toggle -->
                    <button onclick="toggleDarkMode()" class="p-2 rounded-xl hover:bg-purple-100 transition-colors text-purple-600">
                        <i id="theme-icon" class="fas fa-moon text-xl"></i>
                    </button>

                    <!-- User Menu -->
                    <div class="relative group">
                        <button onclick="toggleUserMenu()" class="flex items-center gap-3 px-4 py-2 rounded-2xl hover:bg-purple-50 transition-all">
                            <div id="user-avatar" class="w-8 h-8 bg-purple-200 rounded-full flex items-center justify-center text-purple-700 font-medium">AD</div>
                            <div class="text-left hidden sm:block">
                                <p id="user-name" class="text-sm font-medium text-purple-800">ผู้ใช้งาน</p>
                                <p id="user-role" class="text-xs text-purple-500">Admin</p>
                            </div>
                            <i class="fas fa-chevron-down text-purple-400 text-sm"></i>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-64 bg-white rounded-3xl shadow-xl border border-purple-100 py-2 z-50">
                            <div class="px-6 py-4 border-b border-purple-100">
                                <p id="menu-user-name" class="font-semibold">ชื่อ-สกุล</p>
                                <p id="menu-user-position" class="text-sm text-purple-500"></p>
                            </div>
                            <a href="settings.html" class="flex items-center gap-3 px-6 py-3 hover:bg-purple-50 text-purple-700">
                                <i class="fas fa-cog"></i>
                                <span>ตั้งค่าผู้ใช้งาน</span>
                            </a>
                            <button onclick="logout()" class="w-full flex items-center gap-3 px-6 py-3 hover:bg-red-50 text-red-600">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>ออกจากระบบ</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- SIDEBAR (Mobile) -->
    <div class="md:hidden bg-white border-b">
        <div class="flex overflow-x-auto py-2 px-4 gap-6 text-sm whitespace-nowrap">
            <!-- Mobile nav items here -->
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Content will be loaded here based on page -->
        <div id="page-content">
            <!-- Default to dashboard or redirect based on JS -->
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            initAuth();
            checkDarkMode();
        });
    </script>
</body>
</html>
