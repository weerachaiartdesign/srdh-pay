<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทะเบียนฎีกาเบิกจ่ายเงิน รพส.</title>

  <!-- manifest.json -->     
  <link rel="manifest" href="manifest.json">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
       
</head>
  
<body class="flex h-screen overflow-hidden">

  <div id="app-view" class="view-section w-full h-full flex flex-col md:flex-row overflow-hidden hidden">
  
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white shadow-lg flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-40 h-full">
      <div class="p-5 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="bg-purple-100 p-2 rounded-lg text-purple-600">
             <i class="ph ph-wallet text-2xl"></i>
          </div>
          <div>
            <h1 class="font-bold text-gray-800 leading-tight">Srdh Pay</h1>
            <p class="text-[10px] text-gray-400 font-semibold">ทะเบียนฎีกาเบิกจ่าย</p>
          </div>
        </div>
        <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-purple-600"><i class="ph ph-x text-2xl"></i></button>
      </div>
      <nav class="flex-1 py-4 overflow-y-auto" id="main-nav">
        <!-- เมนูจะถูกสร้างอัตโนมัติตามสิทธิ์ (Role) ผ่าน JavaScript -->
      </nav>
      <div class="p-4 border-t border-gray-100 text-xs text-center text-gray-400">
        Version 00105
      </div>
    </aside>

    <!-- พื้นที่แสดงเนื้อหาหลัก -->
    <div class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
      <!-- Header -->
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 lg:px-8 z-30">
        <div class="flex items-center gap-4">
          <button onclick="toggleSidebar()" class="text-gray-600 hover:text-purple-600 text-2xl transition"><i class="ph ph-list"></i></button>
          <h2 id="header-title" class="text-xl font-bold text-gray-800 hidden md:block">แดชบอร์ด</h2>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right hidden sm:block">
            <div id="user-name" class="text-sm font-bold text-gray-800">-</div>
            <div id="user-role" class="text-xs text-purple-600 font-semibold uppercase tracking-wide">-</div>
          </div>
          <div class="relative">
            <button onclick="toggleProfileMenu()" class="w-10 h-10 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-xl shadow-sm border border-purple-200 hover:bg-purple-200 transition">
              <i class="ph-fill ph-user"></i>
            </button>
            <!-- เมนูตั้งค่าโปรไฟล์ (Dropdown) -->
            <div id="profile-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-100 py-2 z-50">
              <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-purple-600 transition" id="btn-profile-settings"><i class="ph ph-gear mr-2"></i>ตั้งค่าผู้ใช้งาน</button>
              <div class="border-t border-gray-100 my-1"></div>
              <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"><i class="ph ph-sign-out mr-2"></i>ออกจากระบบ</button>
            </div>
          </div>
        </div>
      </header>

      <!-- ส่วนเนื้อหาที่สามารถเลื่อนได้ -->
      <main class="flex-1 overflow-y-auto p-4 md:p-6 relative bg-[#fcf9fc]" id="main-content">
        <!-- ตัวโหลดข้อมูล (Loader Overlay) -->
        <div id="app-loader" class="absolute inset-0 bg-white/80 z-40 flex flex-col items-center justify-center hidden">
          <div class="loader mb-4"></div>
          <p class="text-purple-600 font-medium">กำลังโหลดและคำนวณข้อมูล...</p>
        </div>
      </main>
    </div>

  <!-- Scripts -->
  <script src="js/api-config.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/list.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
