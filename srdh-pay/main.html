<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทะเบียนฎีกาเบิกจ่ายเงิน รพส.</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="flex h-screen overflow-hidden font-sarabun">
  <!-- Auth view (login) -->
  <div id="auth-view" class="w-full h-full absolute inset-0 z-50 flex items-center justify-center bg-purple-50 hidden"></div>

  <!-- App view -->
  <div id="app-view" class="w-full h-full flex flex-col md:flex-row overflow-hidden hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-white shadow-lg flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-40 h-full">
      <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="icons/register_acc-512.png" alt="Logo" class="w-10 h-10 rounded-lg">
          <div>
            <h1 class="font-bold text-gray-800 leading-tight">Srdh Pay</h1>
            <p class="text-[10px] text-gray-400">ระบบเบิกจ่าย</p>
          </div>
        </div>
        <button onclick="toggleSidebar()" class="md:hidden text-gray-500"><i class="ph ph-x text-xl"></i></button>
      </div>
      <nav class="flex-1 py-4 overflow-y-auto" id="main-nav"></nav>
      <div class="p-4 border-t border-gray-100 text-xs text-center text-gray-400">Version 00105</div>
    </aside>

    <!-- Main content area -->
    <div class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-4">
          <button onclick="toggleSidebar()" class="text-gray-600 hover:text-purple-600 text-2xl"><i class="ph ph-list"></i></button>
          <h2 id="header-title" class="text-lg font-bold text-gray-800 hidden md:block">แดชบอร์ด</h2>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right hidden sm:block">
            <div id="user-name" class="text-sm font-bold text-gray-800">-</div>
            <div id="user-role" class="text-xs text-gray-500">-</div>
          </div>
          <div class="relative">
            <button onclick="toggleProfileMenu()" class="w-10 h-10 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-xl shadow-sm border border-purple-200">
              <i class="ph-fill ph-user"></i>
            </button>
            <div id="profile-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-100 py-2 z-50">
              <button id="btn-profile-settings" onclick="showProfileSettings()" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-purple-50"><i class="ph ph-gear mr-2"></i>ตั้งค่าผู้ใช้งาน</button>
              <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="ph ph-sign-out mr-2"></i>ออกจากระบบ</button>
            </div>
          </div>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto p-4 md:p-6 relative bg-[#fcf9fc]" id="main-content">
        <div id="app-loader" class="absolute inset-0 bg-white/80 z-40 flex flex-col items-center justify-center hidden">
          <div class="loader mb-4"></div>
          <p class="text-purple-600 font-medium">กำลังโหลดข้อมูล...</p>
        </div>
        <!-- Page containers -->
        <div id="page-dashboard" class="page-view active hidden"></div>
        <div id="page-list" class="page-view hidden"></div>
        <div id="page-import" class="page-view hidden"></div>
        <div id="page-approve" class="page-view hidden"></div>
        <div id="page-settings" class="page-view hidden"></div>
        <div id="page-printout" class="page-view hidden"></div>
      </main>
    </div>
  </div>

  <!-- Modal detail (shared) -->
  <div id="modal-detail" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col">
      <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
        <h3 class="font-bold text-lg text-gray-800">รายละเอียดฎีกาเบิกจ่าย</h3>
        <button onclick="closeModal()" class="text-gray-500 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
      </div>
      <div class="p-6 overflow-y-auto flex-1" id="modal-detail-body"></div>
      <div class="p-4 border-t bg-gray-50 rounded-b-xl flex justify-end gap-2" id="modal-detail-actions"></div>
    </div>
  </div>

  <script src="js/api-config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/list.js"></script>
  <script src="js/import.js"></script>
  <script src="js/approve.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/printout.js"></script>
</body>
</html>
