<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นำเข้าข้อมูล - Srdh Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="apple-touch-icon" href="icons/register_acc-touch-icon.png">
</head>
<body class="bg-purple-50 text-gray-800" data-theme="light">
    <!-- Header -->
    <header class="bg-white border-b border-purple-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">รพส</div>
                    <div>
                        <h1 class="text-xl font-semibold text-purple-900">นำเข้าข้อมูลลงทะเบียน</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-3 rounded-2xl hover:bg-purple-100">
                        <i id="theme-icon" class="fas fa-moon text-xl"></i>
                    </button>
                    <button onclick="window.location.href='list.html'" 
                            class="px-5 py-2 text-purple-700 hover:bg-purple-100 rounded-2xl flex items-center gap-2">
                        <i class="fas fa-list"></i>
                        <span class="hidden md:inline">ทะเบียนฎีกา</span>
                    </button>
                    <div onclick="logout()" class="cursor-pointer text-purple-700 hover:text-red-600">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-purple-900 flex items-center gap-3">
                <i class="fas fa-file-import"></i> นำเข้าข้อมูลเบิกจ่าย
            </h2>
            
            <div class="flex items-center gap-4">
                <div id="batch-info" class="hidden bg-white px-6 py-3 rounded-3xl shadow-sm">
                    <span class="text-purple-600">เลขที่ลงทะเบียน:</span>
                    <span id="batch-id" class="font-bold text-xl text-purple-800 ml-2"></span>
                </div>
                
                <button onclick="registerBatch()" id="register-btn"
                        class="px-8 py-4 bg-gray-400 text-white rounded-3xl font-semibold flex items-center gap-2 cursor-not-allowed">
                    <i class="fas fa-save"></i>
                    ลงทะเบียน
                </button>
                
                <button onclick="printRegistrationForm()" 
                        class="px-6 py-4 border border-purple-300 hover:bg-purple-50 rounded-3xl flex items-center gap-2">
                    <i class="fas fa-print"></i>
                    พิมพ์ใบลงทะเบียน
                </button>
            </div>
        </div>

        <!-- Current Batch Items -->
        <div class="bg-white rounded-3xl p-6 shadow-sm mb-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold text-purple-800">รายการที่กำลังลงทะเบียน (<span id="item-count">0</span>/15)</h3>
                <button onclick="addNewItem()" 
                        class="btn-primary px-6 py-3 rounded-2xl text-white flex items-center gap-2">
                    <i class="fas fa-plus"></i> เพิ่มรายการใหม่
                </button>
            </div>

            <div id="batch-items" class="space-y-4">
                <!-- Dynamic items added by JS -->
            </div>
        </div>

        <!-- Add Item Form (Popup) -->
        <div id="addItemModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
            <div class="bg-white rounded-3xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-auto">
                <div class="p-6 border-b flex justify-between sticky top-0 bg-white rounded-t-3xl">
                    <h3 class="text-2xl font-semibold text-purple-900">เพิ่มรายการใหม่</h3>
                    <button onclick="closeAddModal()" class="text-4xl leading-none text-purple-300 hover:text-red-500">×</button>
                </div>
                
                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-purple-700 mb-2">วันที่ลงทะเบียน</label>
                            <input type="date" id="reg-date" class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-purple-700 mb-2">หน่วยงาน</label>
                            <input type="text" id="dept" readonly 
                                   class="w-full px-5 py-4 border border-purple-200 rounded-2xl bg-gray-100">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-purple-700 mb-2">ผู้ส่งเอกสาร</label>
                        <input type="text" id="sender" readonly 
                               class="w-full px-5 py-4 border border-purple-200 rounded-2xl bg-gray-100">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-purple-700 mb-2">ประเภทเงิน</label>
                            <select id="money-type" class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-purple-700 mb-2">เลขที่ใบกัน</label>
                            <input type="text" id="reserve-no" class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-purple-700 mb-2">จำนวนเงินกัน</label>
                            <input type="number" id="reserve-amount" class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-purple-700 mb-2">จำนวนเงินขอเบิก</label>
                            <input type="number" id="amount" class="w-full px-5 py-4 border border-purple-200 rounded-2xl" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-purple-700 mb-2">ชื่อเจ้าหนี้ / บริษัท</label>
                        <select id="vendor-select" class="w-full px-5 py-4 border border-purple-200 rounded-2xl mb-3">
                            <!-- Populated by JS -->
                        </select>
                        <input type="text" id="vendor-new" placeholder="หรือกรอกชื่อใหม่..." 
                               class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-purple-700 mb-2">รายการ</label>
                        <textarea id="description" rows="3" 
                                  class="w-full px-5 py-4 border border-purple-200 rounded-2xl"></textarea>
                    </div>
                </div>

                <div class="p-6 border-t flex gap-4">
                    <button onclick="closeAddModal()" 
                            class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">ยกเลิก</button>
                    <button onclick="saveItemToBatch()" 
                            class="flex-1 btn-primary py-4 rounded-2xl text-white font-semibold">บันทึกรายการ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>

    <script>

// Version: 00122
// Import Page Controller - การนำเข้าข้อมูลและลงทะเบียน

let currentBatch = [];
let currentBatchId = null;
let userDept = "";
let userName = "";

// โหลดข้อมูลเริ่มต้น
async function loadImportPage() {
    if (!currentUser) return;
    
    userDept = currentUser.dept || "อื่นๆ";
    userName = currentUser.username || currentUser.email;
    
    document.getElementById('dept').value = userDept;
    document.getElementById('sender').value = userName;
    
    await loadMoneyTypes();
    await loadVendors();
    
    // ตั้งค่าวันที่ปัจจุบัน
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('reg-date').value = today;
}

// โหลดประเภทเงิน
async function loadMoneyTypes() {
    try {
        const result = await callGAS('getSettings', { sheet: 'moneytype' });
        const select = document.getElementById('money-type');
        if (result.success) {
            result.data.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.textContent = item;
                select.appendChild(opt);
            });
        }
    } catch (e) {}
}

// โหลดรายชื่อเจ้าหนี้
async function loadVendors() {
    try {
        const result = await callGAS('getSettings', { sheet: 'vendor' });
        const select = document.getElementById('vendor-select');
        if (result.success) {
            result.data.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                select.appendChild(opt);
            });
        }
    } catch (e) {}
}

// เพิ่มรายการใหม่ (เปิด Modal)
function addNewItem() {
    if (currentBatch.length >= 15) {
        alert("เพิ่มได้สูงสุด 15 รายการต่อการลงทะเบียนหนึ่งครั้ง");
        return;
    }
    document.getElementById('addItemModal').classList.remove('hidden');
}

// ปิด Modal
function closeAddModal() {
    document.getElementById('addItemModal').classList.add('hidden');
}

// บันทึกรายการลง Batch
function saveItemToBatch() {
    const item = {
        moneyType: document.getElementById('money-type').value,
        reserveNo: document.getElementById('reserve-no').value,
        reserveAmount: parseFloat(document.getElementById('reserve-amount').value) || 0,
        amount: parseFloat(document.getElementById('amount').value) || 0,
        vendor: document.getElementById('vendor-new').value || document.getElementById('vendor-select').value,
        description: document.getElementById('description').value,
        regDate: document.getElementById('reg-date').value,
        dept: userDept,
        sender: userName
    };

    if (!item.amount || !item.vendor || !item.description) {
        alert("กรุณากรอกข้อมูลที่จำเป็น (จำนวนเงิน, ชื่อเจ้าหนี้, รายการ)");
        return;
    }

    currentBatch.push(item);
    renderBatchItems();
    closeAddModal();
    
    // เปิดปุ่มลงทะเบียน
    document.getElementById('register-btn').classList.remove('bg-gray-400', 'cursor-not-allowed');
    document.getElementById('register-btn').classList.add('bg-gradient-to-r', 'from-purple-600', 'to-violet-600');
}

// แสดงรายการใน Batch
function renderBatchItems() {
    const container = document.getElementById('batch-items');
    container.innerHTML = '';
    
    currentBatch.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = "flex items-center justify-between bg-purple-50 p-5 rounded-2xl";
        div.innerHTML = `
            <div class="flex-1">
                <div class="font-medium">${item.vendor}</div>
                <div class="text-sm text-gray-600 line-clamp-1">${item.description}</div>
            </div>
            <div class="text-right">
                <div class="font-bold text-lg">${formatCurrency(item.amount)}</div>
                <button onclick="removeFromBatch(${index})" 
                        class="text-red-500 hover:text-red-700 text-sm mt-1">ลบ</button>
            </div>
        `;
        container.appendChild(div);
    });
    
    document.getElementById('item-count').textContent = currentBatch.length;
}

// ลบรายการจาก Batch
function removeFromBatch(index) {
    if (confirm("ลบรายการนี้?")) {
        currentBatch.splice(index, 1);
        renderBatchItems();
    }
}

// ลงทะเบียน Batch
async function registerBatch() {
    if (currentBatch.length === 0) {
        alert("กรุณาเพิ่มรายการอย่างน้อย 1 รายการ");
        return;
    }

    if (!confirm("ยืนยันการลงทะเบียนทั้งหมด?")) return;

    try {
        const result = await callGAS('registerBatch', {
            items: currentBatch,
            user: currentUser
        });

        if (result.success) {
            currentBatchId = result.batchId;
            document.getElementById('batch-id').textContent = currentBatchId;
            document.getElementById('batch-info').classList.remove('hidden');
            
            alert(`ลงทะเบียนสำเร็จ! เลขที่: ${currentBatchId}`);
            
            // รีเซ็ต Batch
            currentBatch = [];
            renderBatchItems();
        } else {
            alert(result.message || "ลงทะเบียนไม่สำเร็จ");
        }
    } catch (error) {
        console.error(error);
        alert("เกิดข้อผิดพลาดในการลงทะเบียน");
    }
}

// พิมพ์ใบลงทะเบียน
function printRegistrationForm() {
    if (!currentBatchId && currentBatch.length === 0) {
        alert("ยังไม่มีข้อมูลที่ลงทะเบียน");
        return;
    }
    alert("กำลังเปิดหน้าพิมพ์ใบลงทะเบียน (PDF) - ฟังก์ชันจะเชื่อมต่อกับ GAS ในขั้นตอนถัดไป");
    // TODO: Implement print with window.print() + hidden iframe
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    checkDarkMode();
    loadImportPage();
});
    </script>
    
</body>
</html>
