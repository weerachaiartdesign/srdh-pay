<script>
// ==================== GLOBAL STATE ====================
let currentUser = null;
let currentTheme = localStorage.getItem('theme') || 'light';
let stagingItems = []; // สำหรับหน้านำเข้า
let chartsInstance = {};
let allRegisterData = []; // cache ล่าสุดจาก server

// ==================== API HELPER ====================
async function apiCall(action, data = {}) {
    try {
        const res = await fetch(CONFIG.API_URL, {
            method: 'POST',
            mode: 'cors',
            cache: 'no-cache',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ...data, action })
        });
        return await res.json();
    } catch (error) {
        return { success: false, message: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์: ' + error.message };
    }
}

// ==================== AUTH ====================
async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const resp = await apiCall('login', { email, password: pass });
    if (resp.success) {
        loginSuccess(resp);
    } else {
        document.getElementById('login-error').textContent = resp.message || 'เข้าสู่ระบบล้มเหลว';
        document.getElementById('login-error').classList.remove('hidden');
    }
}

async function loginGuest() {
    const email = prompt('กรุณากรอกอีเมลของคุณ:');
    if (!email) return;
    const resp = await apiCall('guestLogin', { email });
    if (resp.success) {
        loginSuccess({ ...resp, role: 'guest', username: 'ผู้เยี่ยมชม', dept: '', position: '-' });
    } else {
        alert(resp.message || 'เกิดข้อผิดพลาด');
    }
}

function loginSuccess(user) {
    currentUser = user;
    sessionStorage.setItem('srdh_user', JSON.stringify(user));
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('app-layout').classList.remove('hidden');
    document.getElementById('user-name-display').textContent = user.username;
    document.getElementById('user-role-display').textContent = `${user.role} - ${user.dept || ''}`;
    document.getElementById('user-avatar-initial').textContent = user.username.charAt(0);
    document.getElementById('header-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=645097&color=fff`;
    buildNavigation(user.role);
    showView('dashboard');
}

function checkAuthSession() {
    const saved = sessionStorage.getItem('srdh_user');
    if (saved) loginSuccess(JSON.parse(saved));
}

async function logout() {
    if (confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
        await apiCall('guestLogin', { email: currentUser.email, action: 'guestLogin' }); // log logout
        sessionStorage.removeItem('srdh_user');
        currentUser = null;
        location.reload();
    }
}

// ==================== NAVIGATION ====================
function buildNavigation(role) {
    const nav = document.getElementById('sidebar-nav');
    const items = [
        { id:'dashboard', icon:'fa-chart-pie', text:'แดชบอร์ด', roles:['admin','editor','checker','staff','guest'] },
        { id:'registry', icon:'fa-table-list', text:'ทะเบียนฎีกา', roles:['admin','editor','checker','staff','guest'] },
        { id:'import', icon:'fa-file-import', text:'นำเข้าข้อมูล', roles:['admin','staff'] },
        { id:'actions', icon:'fa-tasks', text:'บันทึกสถานะ/จ่าย', roles:['admin','checker'] },
        { id:'reports', icon:'fa-file-pdf', text:'รายงาน', roles:['admin','editor'] },
        { id:'settings', icon:'fa-cog', text:'ตั้งค่าระบบ', roles:['admin'] }
    ];
    nav.innerHTML = items.filter(it => it.roles.includes(role)).map(it => `
        <a href="#" onclick="showView('${it.id}')" id="nav-${it.id}" class="nav-item flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 hover:bg-midnight-50 hover:text-midnight-700 dark:hover:bg-midnight-900/50 dark:hover:text-white mb-1">
            <i class="fa-solid ${it.icon} text-gray-400 mr-3 w-5 text-center"></i>${it.text}
        </a>
    `).join('');
}

function showView(viewId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('bg-midnight-50','text-midnight-700','dark:bg-midnight-900/50','dark:text-white'));
    const viewEl = document.getElementById(`view-${viewId}`);
    if (viewEl) viewEl.classList.remove('hidden');
    const navEl = document.getElementById(`nav-${viewId}`);
    if (navEl) navEl.classList.add('bg-midnight-50','text-midnight-700','dark:bg-midnight-900/50','dark:text-white');
    const titles = { dashboard:'แดชบอร์ด', registry:'ทะเบียนฎีกา', import:'นำเข้าข้อมูล', actions:'บันทึกรายการ', settings:'ตั้งค่าระบบ', reports:'รายงาน' };
    document.getElementById('page-title').textContent = titles[viewId] || 'Srdh Pay';
    if (viewId === 'dashboard') renderDashboard();
    else if (viewId === 'registry') renderRegistry();
    else if (viewId === 'import') initImport();
    else if (viewId === 'actions') renderActions();
    else if (viewId === 'settings') renderSettings();
    else if (viewId === 'reports') renderReports();
}

// ==================== DASHBOARD ====================
async function renderDashboard() {
    const container = document.getElementById('view-dashboard');
    container.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i> กำลังโหลด...</div>';
    const dashResp = await apiCall('getDashboardData');
    if (!dashResp.success) {
        container.innerHTML = `<p class="text-red-500">${dashResp.message}</p>`;
        return;
    }
    const dash = dashResp.data;
    const moneyConf = {
        'เงินงบประมาณ': '#FFCCFF', 'เงินบำรุง': '#FFFF99', 'เงินประกันสุขภาพ': '#F8CBAD', 'เงินอื่น': '#808080'
    };

    const cardsHtml = dash.summary.map(d => {
        const color = moneyConf[d.type] || '#808080';
        const txtColor = (d.type === 'เงินอื่น') ? 'text-white' : 'text-black';
        return `
        <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm p-4 border border-gray-100 dark:border-gray-800 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-2 h-full" style="background-color:${color}"></div>
            <div class="flex justify-between items-start mb-2">
                <h4 class="text-sm font-bold text-gray-700 dark:text-gray-200">${d.type}</h4>
                <span class="text-xs bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">${d.approvedCount}/${d.totalCount} ฎีกา</span>
            </div>
            <p class="text-xs text-gray-500">เบิกแล้ว</p>
            <p class="text-xl font-bold text-green-600 dark:text-green-400">฿${d.approvedAmount.toLocaleString('th-TH', {minimumFractionDigits:2})}</p>
            <div class="flex justify-between text-xs mt-3 pt-3 border-t border-gray-100 dark:border-gray-700">
                <div><span class="text-gray-400 block">รอตรวจสอบ</span><span class="text-red-400 font-medium">฿${d.pendingAmount.toLocaleString()}</span></div>
                <div class="text-right"><span class="text-gray-400 block">ทั้งสิ้น</span><span class="text-gray-700 dark:text-gray-300 font-medium">฿${d.totalAmount.toLocaleString()}</span></div>
            </div>
        </div>`;
    }).join('');

    container.innerHTML = `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">${cardsHtml}</div>
        <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm p-5 mb-6 border border-gray-100 dark:border-gray-800">
            <p class="text-lg font-semibold">ระยะเวลาเฉลี่ย รับเรื่อง-อนุมัติ <span class="text-midnight-600">${dash.avgDays} วัน</span></p>
            <div class="mt-2 text-sm text-gray-500">อัตราความสำเร็จ: ${dash.successPercent.toFixed(1)}%</div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm p-5"><h3 class="text-lg font-semibold mb-4">ยอดเงินแยกตามหน่วยงาน</h3><canvas id="chart-dept" height="200"></canvas></div>
            <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm p-5"><h3 class="text-lg font-semibold mb-4">จำนวนฎีกาแต่ละเดือน</h3><canvas id="chart-month" height="200"></canvas></div>
        </div>
    `;
    setTimeout(() => renderDashboardCharts(dash), 100);
}

function renderDashboardCharts(dash) {
    Chart.defaults.color = currentTheme === 'dark' ? '#9ca3af' : '#6b7280';
    if (chartsInstance.dept) chartsInstance.dept.destroy();
    const deptCtx = document.getElementById('chart-dept');
    chartsInstance.dept = new Chart(deptCtx, {
        type: 'bar',
        data: { labels: dash.deptChartData.labels.concat(['อื่นๆ']), datasets: [{ data: dash.deptChartData.values.concat(dash.deptChartData.others), backgroundColor: '#645097' }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
    if (chartsInstance.month) chartsInstance.month.destroy();
    const monthCtx = document.getElementById('chart-month');
    chartsInstance.month = new Chart(monthCtx, {
        type: 'line',
        data: { labels: dash.monthlyData.labels, datasets: [
            { label: 'ปีนี้', data: dash.monthlyData.currentYear, borderColor: '#645097' },
            { label: 'ปีก่อน', data: dash.monthlyData.prevYear, borderColor: '#94a3b8' }
        ]},
        options: { responsive: true }
    });
}

// ==================== REGISTRY ====================
async function renderRegistry() {
    const container = document.getElementById('view-registry');
    container.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลด...</div>';
    // ดึงข้อมูลจาก server (ครั้งแรกเอาทั้งหมด)
    const resp = await apiCall('getRegisterData', { filters: {} });
    if (!resp.success) { container.innerHTML = `<p class="text-red-500">${resp.message}</p>`; return; }
    allRegisterData = resp.data;
    container.innerHTML = await registryHTML();
    document.getElementById('reg-search').addEventListener('input', applyRegistryFilters);
    document.getElementById('filter-money').addEventListener('change', applyRegistryFilters);
    document.getElementById('filter-status').addEventListener('change', applyRegistryFilters);
    applyRegistryFilters();
}

function registryHTML() {
    return `
        <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm border overflow-hidden">
            <div class="p-4 border-b flex flex-wrap gap-2 items-center">
                <input id="reg-search" placeholder="ค้นหา..." class="flex-1 min-w-[200px] border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-50 dark:bg-gray-800">
                <select id="filter-money" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-800">
                    <option value="">ทุกประเภทเงิน</option>
                    <option>เงินงบประมาณ</option><option>เงินบำรุง</option><option>เงินประกันสุขภาพ</option>
                    <option>เงินอุดหนุน</option><option>เงินแพทยศาสตร์</option><option>เงินอื่น</option>
                </select>
                <select id="filter-status" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-800">
                    <option value="">ทุกสถานะ</option>
                    <option>รอเอกสาร</option><option>รับเข้าระบบ</option><option>ตรวจสอบ</option><option>ส่งแก้ไข</option>
                    <option>ผ่านการตรวจ</option><option>ส่งเสนอ</option><option>อนุมัติจ่าย</option><option>จ่ายแล้ว</option><option>ยกเลิก</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 uppercase">
                        <tr>
                            <th class="p-3">ลำดับ/วันที่</th><th class="p-3">สถานะ</th><th class="p-3">ใบขอเบิก/ฎีกา</th>
                            <th class="p-3">เจ้าหนี้</th><th class="p-3">รายการ</th><th class="p-3 text-right">จำนวนเงิน</th><th class="p-3">ประเภท/หน่วยงาน</th>
                        </tr>
                    </thead>
                    <tbody id="registry-tbody"></tbody>
                </table>
            </div>
        </div>
    `;
}

function applyRegistryFilters() {
    const search = document.getElementById('reg-search')?.value.toLowerCase() || '';
    const money = document.getElementById('filter-money')?.value || '';
    const status = document.getElementById('filter-status')?.value || '';
    let filtered = allRegisterData.filter(r => {
        if (money && r['ประเภทเงิน'] !== money) return false;
        if (status && getStatusText(r) !== status) return false;
        if (search) {
            const txt = `${r['เลขที่รับ']} ${r['ชื่อเจ้าหนี้/ชื่อบริษัท']} ${r['รายการ']} ${r['หน่วยงาน']}`.toLowerCase();
            if (!txt.includes(search)) return false;
        }
        return true;
    });
    const tbody = document.getElementById('registry-tbody');
    if (!tbody) return;
    tbody.innerHTML = filtered.slice(0, 100).map(r => {
        const st = getStatusText(r);
        const color = getMoneyColor(r['ประเภทเงิน']);
        const txtColor = (r['ประเภทเงิน'] === 'เงินอื่น') ? 'text-white' : 'text-black';
        return `<tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800/50 cursor-pointer" onclick="alert('ดูรายละเอียด ${r['เลขที่รับ']||'-'}')">
            <td class="p-3"><div class="text-xs">${formatDate(r['วันที่รับเอกสาร'])}</div><div class="font-medium">${r['เลขที่รับ']||'-'}</div></td>
            <td class="p-3">${st}</td>
            <td class="p-3">${r['เลขที่ใบขอเบิก']||'-'}/${r['เลขที่ฎีกา']||'-'}</td>
            <td class="p-3 font-semibold">${r['ชื่อเจ้าหนี้/ชื่อบริษัท']||'-'}</td>
            <td class="p-3 truncate max-w-xs">${r['รายการ']||'-'}</td>
            <td class="p-3 text-right">${(r['จำนวนเงินขอเบิก']||0).toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
            <td class="p-3"><span class="px-2 py-0.5 rounded text-xs" style="background:${color};color:${txtColor}">${r['ประเภทเงิน']}</span><div class="text-xs mt-1">${r['หน่วยงาน']}</div></td>
        </tr>`;
    }).join('');
}

function getStatusText(row) {
    if (row['วันที่ยกเลิก']) return 'ยกเลิก';
    if (row['วันที่จ่ายเช็ค']) return 'จ่ายแล้ว';
    if (row['วันที่อนุมัติ']) return 'อนุมัติจ่าย';
    if (row['วันที่เสนอ']) return 'ส่งเสนอ';
    if (row['วันที่ตรวจผ่าน']) return 'ผ่านการตรวจ';
    if (row['วันที่รับคืน']) return 'ตรวจสอบ';
    if (row['วันที่แก้ไข']) return 'ส่งแก้ไข';
    if (row['ผู้ตรวจ']) return 'ตรวจสอบ';
    if (row['วันที่รับเอกสาร']) return 'รับเข้าระบบ';
    if (row['วันที่ลงทะเบียน']) return 'รอเอกสาร';
    return 'ไม่ระบุ';
}

function getMoneyColor(type) {
    const map = { 'เงินงบประมาณ':'#FFCCFF','เงินบำรุง':'#FFFF99','เงินประกันสุขภาพ':'#F8CBAD','เงินอุดหนุน':'#FF9999','เงินแพทยศาสตร์':'#FFF2CC','เงินอื่น':'#808080' };
    return map[type] || '#808080';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    let d = new Date(dateStr);
    if (isNaN(d.getTime())) d = new Date(dateStr.split('/').reverse().join('/')); // fallback
    return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()+543}`;
}

// ==================== IMPORT ====================
function initImport() {
    const container = document.getElementById('view-import');
    container.innerHTML = importHTML();
    renderStaging();
}

function importHTML() {
    return `
        <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm p-5">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div><label class="text-xs">วันที่ลงทะเบียน</label><input id="imp-date" type="date" class="w-full border rounded px-2 py-1.5 bg-gray-50 dark:bg-gray-800" readonly></div>
                <div><label class="text-xs">หน่วยงาน</label><input id="imp-dept" class="w-full border rounded px-2 py-1.5 bg-gray-50 dark:bg-gray-800" readonly></div>
                <div><label class="text-xs">ผู้ส่ง</label><input id="imp-sender" class="w-full border rounded px-2 py-1.5 bg-gray-50 dark:bg-gray-800" readonly></div>
            </div>
            <form onsubmit="addImportItem(event)" class="bg-gray-50 dark:bg-gray-800/50 p-4 rounded">
                <h4 class="font-semibold mb-3">เพิ่มรายละเอียด (สูงสุด 15)</h4>
                <div class="grid grid-cols-1 md:grid-cols-6 gap-3">
                    <div><label class="text-xs">ประเภทเงิน *</label><select id="item-money" required class="w-full border rounded px-2 py-1.5 bg-white dark:bg-gray-700"></select></div>
                    <div><label class="text-xs">เจ้าหนี้ *</label><input id="item-vendor" required class="w-full border rounded px-2 py-1.5 bg-white dark:bg-gray-700" list="vendor-list"><datalist id="vendor-list"></datalist></div>
                    <div><label class="text-xs">รายการ *</label><input id="item-detail" required class="w-full border rounded px-2 py-1.5 bg-white dark:bg-gray-700"></div>
                    <div><label class="text-xs">จำนวนเงิน *</label><input id="item-amount" type="number" step="0.01" min="0.01" required class="w-full border rounded px-2 py-1.5 bg-white dark:bg-gray-700 font-bold text-green-600"></div>
                    <div class="md:col-span-2 flex items-end"><button type="submit" class="bg-midnight-600 text-white px-4 py-2 rounded hover:bg-midnight-700"><i class="fa-solid fa-plus"></i></button></div>
                </div>
            </form>
            <div class="mt-4">
                <h4 class="font-semibold">รายการรอลงทะเบียน (<span id="staging-count">0</span>/15)</h4>
                <div class="overflow-x-auto border rounded">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100 dark:bg-gray-800"><tr><th>#</th><th>ประเภท</th><th>เจ้าหนี้</th><th>รายการ</th><th class="text-right">จำนวน</th><th></th></tr></thead>
                        <tbody id="staging-tbody"><tr><td colspan="6" class="p-4 text-center text-gray-400">ไม่มีรายการ</td></tr></tbody>
                    </table>
                </div>
            </div>
            <div class="flex justify-end mt-4 space-x-2">
                <button id="btn-save-import" disabled onclick="saveImportBatch()" class="bg-midnight-600 text-white px-6 py-2 rounded hover:bg-midnight-700 disabled:opacity-50"><i class="fa-solid fa-save mr-1"></i> ลงทะเบียน</button>
            </div>
        </div>
    `;
    document.getElementById('imp-date').valueAsDate = new Date();
    document.getElementById('imp-dept').value = currentUser.dept;
    document.getElementById('imp-sender').value = currentUser.username;
    loadImportOptions();
}

async function loadImportOptions() {
    const resp = await apiCall('getSettings');
    if (resp.success) {
        const s = resp.data;
        document.getElementById('item-money').innerHTML = s.moneyTypes.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('vendor-list').innerHTML = s.vendors.map(v => `<option value="${v}">`).join('');
    }
}

function addImportItem(e) {
    e.preventDefault();
    if (stagingItems.length >= 15) { alert('สูงสุด 15 รายการ'); return; }
    stagingItems.push({
        moneyType: document.getElementById('item-money').value,
        vendor: document.getElementById('item-vendor').value,
        detail: document.getElementById('item-detail').value,
        amount: parseFloat(document.getElementById('item-amount').value),
        registerDate: document.getElementById('imp-date').value,
        sender: document.getElementById('imp-sender').value,
        dept: document.getElementById('imp-dept').value,
        invoice: '', period: '', reservedAmount: '', reserveNo: ''
    });
    renderStaging();
    e.target.reset();
}

function removeStagingItem(index) {
    stagingItems.splice(index, 1);
    renderStaging();
}

function renderStaging() {
    document.getElementById('staging-count').textContent = stagingItems.length;
    const tbody = document.getElementById('staging-tbody');
    if (stagingItems.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-400">ไม่มีรายการ</td></tr>';
        document.getElementById('btn-save-import').disabled = true;
        return;
    }
    document.getElementById('btn-save-import').disabled = false;
    tbody.innerHTML = stagingItems.map((item, i) => `
        <tr class="border-b dark:border-gray-700">
            <td class="p-2">${i+1}</td>
            <td class="p-2">${item.moneyType}</td>
            <td class="p-2">${item.vendor}</td>
            <td class="p-2 truncate max-w-[200px]">${item.detail}</td>
            <td class="p-2 text-right">${item.amount.toLocaleString()}</td>
            <td class="p-2"><button onclick="removeStagingItem(${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button></td>
        </tr>
    `).join('');
}

async function saveImportBatch() {
    if (!confirm('ยืนยันการลงทะเบียน?')) return;
    const batchId = 'B' + Date.now().toString().slice(-6);
    const resp = await apiCall('batchInsertRegister', {
        records: stagingItems,
        batchId,
        userEmail: currentUser.email,
        userDept: currentUser.dept
    });
    if (resp.success) {
        alert(`ลงทะเบียนสำเร็จ เลขที่ ${batchId}`);
        stagingItems = [];
        renderStaging();
        showView('registry');
    } else {
        alert('เกิดข้อผิดพลาด: ' + resp.message);
    }
}

// ==================== ACTIONS (checker) ====================
async function renderActions() {
    const container = document.getElementById('view-actions');
    container.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลด...</div>';
    const resp = await apiCall('getRegisterData', { filters: {} });
    if (!resp.success) { container.innerHTML = `<p class="text-red-500">${resp.message}</p>`; return; }
    allRegisterData = resp.data.filter(r => getStatusText(r) !== 'จ่ายแล้ว' && getStatusText(r) !== 'ยกเลิก');
    container.innerHTML = actionsHTML();
    document.getElementById('action-tbody').innerHTML = allRegisterData.slice(0, 50).map(r => {
        return `<tr class="border-b dark:border-gray-700">
            <td class="p-3"><input type="checkbox" class="row-check" value="${r._rowIndex}"></td>
            <td class="p-3">${r['เลขที่รับ']||'-'}</td>
            <td class="p-3">${getStatusText(r)}</td>
            <td class="p-3">${r['หน่วยงาน']}</td>
            <td class="p-3">${r['ชื่อเจ้าหนี้/ชื่อบริษัท']||'-'}</td>
            <td class="p-3 text-right">${(r['จำนวนเงินขอเบิก']||0).toLocaleString()}</td>
        </tr>`;
    }).join('');
}

function actionsHTML() {
    return `
        <div class="bg-white dark:bg-darkcard rounded-xl shadow-sm border">
            <div class="p-4 bg-gray-50 dark:bg-gray-800/50 flex flex-wrap gap-2">
                <button onclick="doAction('receive')" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">รับเอกสาร</button>
                <button onclick="doAction('edit')" class="bg-yellow-500 text-white px-3 py-1.5 rounded text-sm">ส่งแก้ไข</button>
                <button onclick="doAction('propose')" class="bg-purple-600 text-white px-3 py-1.5 rounded text-sm">ส่งเสนอ</button>
                <button onclick="doAction('pay')" class="bg-green-600 text-white px-3 py-1.5 rounded text-sm">จ่ายเช็ค</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300">
                        <tr><th class="p-3"><input type="checkbox" id="check-all" onchange="toggleAllChecks()"></th><th class="p-3">เลขรับ</th><th class="p-3">สถานะ</th><th class="p-3">หน่วยงาน</th><th class="p-3">เจ้าหนี้</th><th class="p-3 text-right">จำนวนเงิน</th></tr>
                    </thead>
                    <tbody id="action-tbody"></tbody>
                </table>
            </div>
        </div>
    `;
}

async function doAction(type) {
    const checked = [...document.querySelectorAll('.row-check:checked')].map(cb => parseInt(cb.value));
    if (checked.length === 0) { alert('กรุณาเลือกอย่างน้อย 1 รายการ'); return; }
    const dateStr = prompt('ระบุวันที่ (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
    if (!dateStr) return;
    if (type === 'receive') {
        const resp = await apiCall('updateReceiveInfo', { rowsIndices: checked, receiveDate: dateStr, userEmail: currentUser.email });
        if (resp.success) { alert('ดำเนินการเรียบร้อย'); showView('actions'); }
        else alert('ผิดพลาด: ' + resp.message);
    } else {
        // ใช้ updateFields สำหรับแก้ไข, เสนอ, จ่าย โดย map ช่องให้ถูกต้อง
        const fieldMap = { edit: 'R', propose: 'U', pay: 'W' };
        const col = fieldMap[type];
        const updates = { [col]: dateStr };
        const resp = await apiCall('updateFields', { rowsIndices: checked, updates, userEmail: currentUser.email });
        if (resp.success) { alert('ดำเนินการเรียบร้อย'); showView('actions'); }
        else alert('ผิดพลาด: ' + resp.message);
    }
}

function toggleAllChecks() {
    const checkAll = document.getElementById('check-all').checked;
    document.querySelectorAll('.row-check').forEach(cb => cb.checked = checkAll);
}

}

}

// ==================== THEME & UTILS ====================
function toggleDarkMode() {
    const html = document.documentElement;
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    currentTheme = isDark ? 'dark' : 'light';
    if (!document.getElementById('view-dashboard').classList.contains('hidden')) renderDashboardCharts();
}
function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }
function toggleMobileMenu() { document.querySelector('aside').classList.toggle('hidden'); }
window.addEventListener('click', e => { if (!document.getElementById('header-avatar').contains(e.target)) document.getElementById('user-menu').classList.add('hidden'); });
(function() {
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
})();
checkAuthSession();
</script>
