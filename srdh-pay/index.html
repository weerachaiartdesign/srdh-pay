<!-- Version: 00121 -->
<!DOCTYPE html>
<html lang="th">

<head>

    <!-- ========================================= -->
    <!-- META -->
    <!-- ========================================= -->

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate" />

    <meta
        http-equiv="Pragma"
        content="no-cache" />

    <meta
        http-equiv="Expires"
        content="0" />

    <meta
        name="theme-color"
        content="#7C3AED" />

    <meta
        name="description"
        content="ระบบทะเบียนเบิกจ่ายเงิน โรงพยาบาลสิรินธร" />

    <!-- ========================================= -->
    <!-- TITLE -->
    <!-- ========================================= -->

    <title>Srdh Pay</title>

    <!-- ========================================= -->
    <!-- PWA -->
    <!-- ========================================= -->

    <link
        rel="manifest"
        href="manifest.json" />

    <link
        rel="icon"
        type="image/png"
        href="icons/register_acc-192.png" />

    <link
        rel="apple-touch-icon"
        href="icons/register_acc-touch-icon.png" />

    <!-- ========================================= -->
    <!-- CSS -->
    <!-- ========================================= -->

    <link
        rel="stylesheet"
        href="css/style.css" />

    <!-- ========================================= -->
    <!-- FONT -->
    <!-- ========================================= -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com" />

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin />

    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <!-- ========================================= -->
    <!-- INLINE STYLE -->
    <!-- ========================================= -->

    <style>

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Prompt', sans-serif;
            background:
                linear-gradient(
                    135deg,
                    #F3E8FF 0%,
                    #FFFFFF 50%,
                    #EDE9FE 100%
                );
            overflow: hidden;
        }
        .loading-container {
            text-align: center;
        }
        .logo {
            width: 110px;
            height: 110px;
            border-radius: 30px;
            box-shadow:
                0 20px 40px rgba(124, 58, 237, 0.20);
            animation:
                float 2.5s ease-in-out infinite;
        }
        .title {
            margin-top: 28px;
            font-size: 2rem;
            font-weight: 700;
            color: #5B21B6;
        }
        .subtitle {
            margin-top: 10px;
            font-size: 1rem;
            color: #6B7280;
        }
        .loader {
            margin: 30px auto 0;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 5px solid #E9D5FF;
            border-top-color: #7C3AED;
            animation:
                spin 1s linear infinite;
        }
        .version {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #9CA3AF;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

    </style>

</head>

<body>

    <!-- ========================================= -->
    <!-- LOADING SCREEN -->
    <!-- ========================================= -->

    <div class="loading-container">
        <img
            src="icons/register_acc-192.png"
            alt="Srdh Pay"
            class="logo"
        />

        <div class="title">
            Srdh Pay
        </div>

        <div class="subtitle">
            ระบบทะเบียนเบิกจ่ายเงิน
        </div>
        <div class="loader"></div>
        <div class="version">
            Version 00121
        </div>
    </div>

    <!-- ========================================= -->
    <!-- CONFIG -->
    <!-- ========================================= -->

    <script src="js/api-config.js"></script>

    <!-- ========================================= -->
    <!-- AUTH ROUTER -->
    <!-- ========================================= -->

    <script>

        // =========================================
        // SAFE REDIRECT
        // =========================================

        function safeRedirect(path) {

            try {
                window.location.replace(path);
            } catch (error) {
                console.error(
                    'Redirect error:',
                    error
                );
                window.location.href = path;
            }
        }

        // =========================================
        // CLEAR BROKEN SESSION
        // =========================================

        function clearBrokenSession() {

            localStorage.removeItem('srdh_user');
            localStorage.removeItem(
                'srdh_last_login'
            );
        }
        // =========================================
        // CHECK SESSION
        // =========================================

        async function checkSession() {
            try {

                const user =
                    localStorage.getItem(
                        'srdh_user'
                    );
                const lastLogin =
                    localStorage.getItem(
                        'srdh_last_login'
                    );

                // =================================
                // NO SESSION
                // =================================
                if (!user || !lastLogin) {
                    clearBrokenSession();
                    setTimeout(() => {
                        safeRedirect(
                            'js/auth.html'
                        );
                    }, 800);
                    return;
                }

                // =================================
                // VALIDATE JSON
                // =================================
                let parsedUser = null;
                try {
                    parsedUser =
                        JSON.parse(user);
                } catch (error) {
                    console.error(
                        'Invalid session JSON:',
                        error
                    );
                    clearBrokenSession();
                    setTimeout(() => {
                        safeRedirect(
                            'js/auth.html'
                        );
                    }, 800);
                    return;
                }

                // =================================
                // CHECK REQUIRED DATA
                // =================================
                if (
                    !parsedUser ||
                    !parsedUser.email
                ) {
                    clearBrokenSession();
                    setTimeout(() => {
                        safeRedirect(
                            'js/auth.html'
                        );
                    }, 800);
                    return;
                }

                // =================================
                // SESSION TIMEOUT
                // =================================
                const minutesPassed =
                    (
                        Date.now() -
                        parseInt(lastLogin, 10)
                    ) / 60000;
                if (
                    minutesPassed >
                    CONFIG.SESSION_TIMEOUT
                ) {
                    console.warn(
                        'Session expired'
                    );
                    clearBrokenSession();
                    setTimeout(() => {
                        safeRedirect(
                            'js/auth.html'
                        );
                    }, 800);
                    return;
                }

                // =================================
                // REFRESH SESSION
                // =================================
                localStorage.setItem(
                    'srdh_last_login',
                    Date.now().toString()
                );

                // =================================
                // REDIRECT TO DASHBOARD
                // =================================
                setTimeout(() => {
                    safeRedirect(
                        'js/dashboard.html'
                    );
                }, 1200);
            } catch (error) {
                console.error(
                    'Session check error:',
                    error
                );
                clearBrokenSession();
                setTimeout(() => {
                    safeRedirect(
                        'js/auth.html'
                    );
                }, 1000);
            }
        }

        // =========================================
        // START
        // =========================================

        document.addEventListener(
            'DOMContentLoaded',
            () => {
                checkSession();
            }
        );
    </script>

</body>

</html>
