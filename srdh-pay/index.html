<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdh Pay - ระบบทะเบียนฎีกาเบิกจ่ายเงิน</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- API Configuration -->
    <script src="api-config.js"></script>

    <!-- Custom CSS (เหมือนเดิม) -->
    <!-- ... -->
</head>
<body class="bg-gray-50 ..."> <!-- เหมือนเดิม แต่ปรับ JS ให้ใช้ API -->

<script>
    // ===================== ค่าคงที่และข้อมูลจำลอง (ใช้เมื่อออฟไลน์) =====================
    const MOCK_USERS = [...]; // คงเดิม
    const MOCK_VENDORS = [...]; // คงเดิม
    const MOCK_DEPTS = [...]; // คงเดิม
    let MOCK_DATA = []; // ใช้เมื่อ API ไม่ตอบ
    let autoIncId = 1;
    // ... generateFakeData() เหมือนเดิม

    // --- ฟังก์ชันเรียก API หลัก ---
    async function callApi(action, body = {}) {
        try {
            const res = await fetch(CONFIG.API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, ...body })
            });
            return await res.json();
        } catch (err) {
            console.warn('API error, falling back to mock:', err);
            return null;
        }
    }

    // ========== ระบบ Auth ==========
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        // เรียก API จริง
        const result = await callApi('login', { email, password });
        if (result && result.success) {
            loginSuccess(result); // result มี role, username, position, dept, email
            return;
        }
        // fallback to mock
        const user = MOCK_USERS.find(u => u.email === email && u.pass === pass);
        if (user) loginSuccess(user);
        else alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
    }

    async function loginGuest() {
        const email = prompt("กรุณากรอกอีเมลของคุณ:");
        if (!email) return;
        const result = await callApi('guestLogin', { email });
        if (result && result.success) {
            loginSuccess({ ...result, email }); // guest มี role, name
        } else {
            // fallback mock
            loginSuccess({ email, role: 'guest', name: 'ผู้เยี่ยมชม', dept: '-', position: '-' });
        }
    }

    // ... ฟังก์ชัน loginSuccess, logout, checkAuthSession เหมือนเดิม

    // ========== ดึงข้อมูลจาก API ==========
    async function fetchRegisterData(filters = {}) {
        const res = await callApi('getRegisterData', { filters });
        if (res && res.success) return res.data;
        // fallback mock
        return MOCK_DATA; // ส่ง mock เมื่อไม่เชื่อมต่อ
    }

    async function fetchDashboardData() {
        const res = await callApi('getDashboardData');
        if (res && res.success) return res.data;
        return null; // fallback จะใช้คำนวณจาก MOCK_DATA
    }

    // ... ปรับฟังก์ชัน renderRegistryTable, renderDashboard ให้ใช้ fetch แทน
    // ตัวอย่าง:
    async function renderRegistryTable() {
        const limit = parseInt(document.getElementById('reg-limit').value);
        const fMoney = document.getElementById('filter-money').value;
        const fStatus = document.getElementById('filter-status').value;
        const search = document.getElementById('reg-search').value.toLowerCase();

        const filters = { moneyType: fMoney, status: fStatus, search };
        let data = await fetchRegisterData(filters);
        
        // ถ้าไม่เจอข้อมูลจาก API ให้ใช้ mock
        if (!data) {
            data = MOCK_DATA.filter(r => {
                if (fMoney && r.moneyType !== fMoney) return false;
                if (fStatus && r.status !== fStatus) return false;
                if (search && !Object.values(r).some(v => String(v).toLowerCase().includes(search))) return false;
                return true;
            });
        }

        // จำกัดจำนวน
        data = data.slice(0, limit);
        // ... สร้างแถวแบบเดิม
    }

    // ... ปรับฟังก์ชันอื่น ๆ ให้เรียก API เมื่อกดปุ่มจริง
    async function saveImportBatch() {
        // ...
        const result = await callApi('batchInsertRegister', {
            records: stagingItems.map(item => ({ ...item, registerDate: document.getElementById('imp-date').value })),
            batchId: batchId,
            userEmail: currentUser.email,
            userDept: currentUser.dept
        });
        if (result && result.success) {
            alert(`ลงทะเบียนสำเร็จ! เลขที่ลงทะเบียน: ${batchId}`);
            stagingItems = [];
            renderStaging();
            showView('registry');
        } else {
            alert('เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่');
        }
    }

    // สำหรับ Actions → updateReceiveInfo, updateFields
    async function confirmAction() {
        const actionType = document.getElementById('modal-action-type').value;
        const dateStr = document.getElementById('modal-action-date').value;
        const checkedIds = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
        const rowsIndices = checkedIds.map(id => MOCK_DATA.findIndex(r => r.id === id)); // mock index

        if (actionType === 'receive') {
            await callApi('updateReceiveInfo', { rowsIndices, receiveDate: dateStr, userEmail: currentUser.email });
        } else {
            // updateFields สำหรับ action อื่น
            const colMap = { edit: { R: dateStr }, propose: { U: dateStr }, pay: { W: dateStr } };
            const updates = colMap[actionType] || {};
            await callApi('updateFields', { rowsIndices, updates, userEmail: currentUser.email });
        }
        // รีเฟรช
        renderActionsTable();
        closeModal('modal-action');
    }
</script>
</body>
</html>
