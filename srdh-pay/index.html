<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทะเบียนฎีกาเบิกจ่ายเงิน รพส.</title>
  <link rel="manifest" href="manifest.json">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-lg flex flex-col hidden md:flex z-20">
    <div class="p-6 border-b border-gray-100 flex items-center gap-3">
      <div class="bg-purple-100 p-2 rounded-lg text-purple-600">
        <i class="ph ph-wallet text-2xl"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Srdh Pay</h1>
        <p class="text-xs text-gray-400">ทะเบียนฎีกาเบิกจ่าย</p>
      </div>
    </div>
    <nav class="flex-1 py-4">
      <div id="btn-dash" class="nav-item active flex items-center gap-3 px-6 py-3 cursor-pointer text-gray-600" onclick="changePage('dashboard')">
        <i class="ph ph-squares-four text-xl"></i>
        <span>Dashboard</span>
      </div>
      <div id="btn-list" class="nav-item flex items-center gap-3 px-6 py-3 cursor-pointer text-gray-600 mt-2" onclick="changePage('list')">
        <i class="ph ph-list-dashes text-xl"></i>
        <span>ทะเบียนฎีกา</span>
      </div>
    </nav>
  </aside>

  <!-- Mobile Header -->
  <div class="md:hidden fixed w-full bg-white shadow-sm z-30 flex justify-between items-center p-4">
    <div class="font-bold text-purple-600">Srdh Pay</div>
    <div class="flex gap-4">
      <i class="ph ph-squares-four text-2xl cursor-pointer" onclick="changePage('dashboard')"></i>
      <i class="ph ph-list-dashes text-2xl cursor-pointer" onclick="changePage('list')"></i>
    </div>
  </div>

  <!-- Main Content -->
  <main class="flex-1 h-full overflow-y-auto bg-[#fcf9fc] pt-16 md:pt-0 pb-10">
    <div id="view-container" class="p-4 md:p-8">
      <!-- Loading State -->
      <div class="flex flex-col items-center justify-center h-[60vh]">
        <div class="loader border-4 border-gray-200 rounded-full w-12 h-12 mb-4"></div>
        <p class="text-gray-500 font-light text-lg">กำลังโหลดข้อมูลระบบ...</p>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/api-config.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/register-list.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
