<div class="max-w-full animate-fade-in pb-10">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
    <h2 class="text-2xl font-bold text-gray-800">ทะเบียนฎีกาเบิกจ่ายเงิน</h2>
    
    <!-- Search Box -->
    <div class="relative w-full md:w-80">
      <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
      <input type="text" id="tb-search" oninput="applyFilters()" placeholder="ค้นหาข้อมูล (เลขรับ, เจ้าหนี้, รายการ...)" class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-purple-400 focus:ring-1 focus:ring-purple-400 shadow-sm text-sm transition">
    </div>
  </div>

  <!-- Filters Area -->
  <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-wrap items-center gap-3">
    <select id="filter-type" onchange="applyFilters()" class="border border-gray-200 text-sm rounded-lg px-3 py-2 bg-gray-50 focus:outline-none focus:border-purple-400">
      <option value="">-- ทุกประเภทเงิน --</option>
      <option value="เงินงบประมาณ">เงินงบประมาณ</option>
      <option value="เงินบำรุง">เงินบำรุง</option>
      <option value="เงินประกันสุขภาพ">เงินประกันสุขภาพ</option>
      <option value="เงินอุดหนุน">เงินอุดหนุน</option>
      <option value="เงินอื่น">เงินอื่น</option>
    </select>

    <select id="filter-dept" onchange="applyFilters()" class="border border-gray-200 text-sm rounded-lg px-3 py-2 bg-gray-50 focus:outline-none focus:border-purple-400">
      <option value="">-- ทุกหน่วยงาน --</option>
      <!-- Option render via JS -->
    </select>

    <select id="filter-status" onchange="applyFilters()" class="border border-gray-200 text-sm rounded-lg px-3 py-2 bg-gray-50 focus:outline-none focus:border-purple-400">
      <option value="">-- ทุกสถานะ --</option>
      <option value="รับเข้าระบบ">รับเข้าระบบ</option>
      <option value="ตรวจสอบ">ตรวจสอบ</option>
      <option value="ส่งแก้ไข">ส่งแก้ไข</option>
      <option value="ผ่านการตรวจ">ผ่านการตรวจ</option>
      <option value="ส่งเสนอ">ส่งเสนอ</option>
      <option value="อนุมัติจ่าย">อนุมัติจ่าย</option>
      <option value="รอจ่าย">รอจ่าย</option>
      <option value="จ่ายแล้ว">จ่ายแล้ว</option>
      <option value="ยกเลิก">ยกเลิก</option>
    </select>

    <button onclick="clearFilters()" class="px-3 py-2 text-sm text-purple-600 bg-purple-50 hover:bg-purple-100 rounded-lg transition"><i class="ph ph-arrows-counter-clockwise mr-1"></i>ล้างตัวกรอง</button>
    
    <div class="ml-auto flex items-center gap-2 text-sm text-gray-500">
      <span>แสดง</span>
      <select id="tb-limit" onchange="changeLimit()" class="border border-gray-200 rounded-lg px-2 py-1 bg-gray-50 focus:outline-none">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
      <span>รายการ</span>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm whitespace-nowrap">
        <thead class="bg-purple-600 text-white font-medium">
          <tr>
            <th class="px-4 py-3">ลำดับ</th>
            <th class="px-4 py-3">สถานะ</th>
            <th class="px-4 py-3">เลขที่ใบขอเบิก/เลขที่ฎีกา</th>
            <th class="px-4 py-3">ชื่อเจ้าหนี้/ชื่อบริษัท</th>
            <th class="px-4 py-3 w-1/3">รายการ</th>
            <th class="px-4 py-3 text-right">จำนวนเงินขอเบิก</th>
            <th class="px-4 py-3">ประเภทเงิน/หน่วยงาน</th>
          </tr>
        </thead>
        <tbody id="tb-body" class="divide-y divide-gray-100 text-gray-700">
          <!-- Rows render via JS -->
        </tbody>
      </table>
    </div>
    
    <!-- Pagination -->
    <div class="p-4 border-t border-gray-100 flex justify-between items-center bg-gray-50">
      <div id="tb-info" class="text-sm text-gray-500"></div>
      <div class="flex gap-1" id="tb-pagination"></div>
    </div>
  </div>
</div>

<!-- Modal Popup (Hidden by default) -->
<div id="detail-modal" class="fixed inset-0 bg-black bg-opacity-40 z-50 hidden flex justify-center items-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col transform scale-95 transition-transform" id="detail-modal-content">
    <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-purple-50 rounded-t-xl">
      <h3 class="text-lg font-bold text-purple-800">รายละเอียดฎีกาเบิกจ่าย</h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="ph ph-x text-2xl"></i></button>
    </div>
    <div class="p-6 overflow-y-auto" id="modal-body">
      <!-- Detail render via JS -->
    </div>
  </div>
</div>
