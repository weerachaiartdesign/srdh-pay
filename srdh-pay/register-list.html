<div class="space-y-6 fade-in">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <h2 class="text-2xl font-bold text-purple-800">ทะเบียนฎีกาเบิกจ่ายเงิน</h2>
    <div class="relative w-full md:w-96">
      <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input type="text" id="searchInput" onkeyup="handleFilter()" class="block w-full pl-10 pr-3 py-2 border border-purple-200 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 sm:text-sm" placeholder="ค้นหา เลขที่ฎีกา, เจ้าหนี้, รายการ...">
    </div>
  </div>

  <div class="bg-white p-4 rounded-2xl shadow-sm border border-purple-100 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">ประเภทเงิน</label>
      <select id="filterMoneyType" onchange="handleFilter()" class="block w-full py-2 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-purple-500 text-sm">
        <option value="">ทั้งหมด</option>
        <option value="เงินงบประมาณ">เงินงบประมาณ</option>
        <option value="เงินบำรุง">เงินบำรุง</option>
        <option value="เงินประกันสุขภาพ">เงินประกันสุขภาพ</option>
        <option value="เงินอุดหนุน">เงินอุดหนุน</option>
        <option value="อื่นๆ">เงินอื่น</option>
      </select>
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">หน่วยงาน</label>
      <select id="filterDept" onchange="handleFilter()" class="block w-full py-2 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-purple-500 text-sm">
        <option value="">ทั้งหมด</option>
      </select>
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">สถานะ</label>
      <select id="filterStatus" onchange="handleFilter()" class="block w-full py-2 px-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-purple-500 text-sm">
        <option value="">ทั้งหมด</option>
        <option value="รับเข้าระบบ">รับเข้าระบบ</option>
        <option value="ตรวจสอบ">ตรวจสอบ</option>
        <option value="ส่งแก้ไข">ส่งแก้ไข</option>
        <option value="ผ่านการตรวจ">ผ่านการตรวจ</option>
        <option value="ส่งเสนอ">ส่งเสนอ</option>
        <option value="อนุมัติจ่าย">อนุมัติจ่าย</option>
        <option value="รอจ่าย">รอจ่าย</option>
        <option value="จ่ายแล้ว">จ่ายแล้ว</option>
        <option value="ยกเลิก">ยกเลิก</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button onclick="resetFilters()" class="flex-1 py-2 px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm font-medium transition-colors">ล้างการกรอง</button>
      <select id="pageSize" onchange="handleFilter()" class="w-24 py-2 px-3 border border-gray-200 rounded-lg text-sm">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-purple-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-purple-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-purple-700 uppercase tracking-wider">ลำดับ</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-purple-700 uppercase tracking-wider">สถานะ</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-purple-700 uppercase tracking-wider">ใบขอเบิก/เลขที่ฎีกา</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-purple-700 uppercase tracking-wider">ชื่อเจ้าหนี้/บริษัท</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-purple-700 uppercase tracking-wider w-1/4">รายการ</th>
            <th class="px-4 py-3 text-right text-xs font-semibold text-purple-700 uppercase tracking-wider">จำนวนเงินขอเบิก</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-purple-700 uppercase tracking-wider">ประเภทเงิน/หน่วยงาน</th>
          </tr>
        </thead>
        <tbody id="registerTableBody" class="bg-white divide-y divide-gray-100">
          </tbody>
      </table>
    </div>
  </div>
</div>

<div id="detailModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
  <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
    <div class="fixed inset-0 transition-opacity" onclick="closeModal()">
      <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
    </div>
    <span class="hidden sm:inline-block sm:align-middle sm:h-screen"></span>
    <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
      <div class="bg-purple-600 px-6 py-4 flex justify-between items-center">
        <h3 class="text-lg font-bold text-white">รายละเอียดฎีกาเบิกจ่าย</h3>
        <button onclick="closeModal()" class="text-white hover:text-purple-200 text-2xl">&times;</button>
      </div>
      <div class="px-6 py-6" id="modalContent">
        </div>
    </div>
  </div>
</div>
