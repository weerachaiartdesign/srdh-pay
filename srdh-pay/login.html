            z-10

                    text-center
                    mb-6
                "

                    class="
                        inline-flex
                        items-center
                        justify-center
                        w-20
                        h-20
                        rounded-3xl
                        bg-blue-600
                        text-white
                        text-3xl
                        font-bold
                        shadow-xl
                        mb-4
                    "
                >
                    ฿
                </div>

                <h1
                    class="
                        text-3xl
                        font-bold

                    "
                >
                    SRDH PAY
                </h1>

                <p

                    ระบบทะเบียนเบิกจ่ายเงิน

            <!-- Card -->

    <!-- Script -->
    <script>

        'use strict';

        // ============================================================
        // INIT
        // ============================================================

        document.addEventListener('DOMContentLoaded', initLoginPage);

        async function initLoginPage() {

            // ถ้า login อยู่แล้ว redirect เลย
            if (SessionManager.isLoggedIn()) {
                redirectByRole();
                return;
            }

            restoreRememberedEmail();
            bindEvents();
        }

        // ============================================================
        // EVENTS
        // ============================================================

        function bindEvents() {

            document.getElementById('loginForm')
                .addEventListener('submit', handleLogin);

            document.getElementById('guestButton')
                .addEventListener('click', handleGuestAccess);

            document.getElementById('togglePassword')
                .addEventListener('click', togglePassword);

            document.getElementById('password')
                .addEventListener('keyup',  detectCapslock);

            document.getElementById('password')
                .addEventListener('keydown', detectCapslock);
        }

        // ============================================================
        // LOGIN
        // ============================================================

        async function handleLogin(event) {

            event.preventDefault();
            clearErrors();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!validateForm(email, password)) return;

            setLoading(true);

            try {

                const result = await AuthAPI.login(email, password);

                saveRememberEmail();

                UI.showToast('เข้าสู่ระบบสำเร็จ ยินดีต้อนรับ ' + (result.user?.username || ''));

                setTimeout(() => redirectByRole(), 700);

            } catch (error) {

                console.error('login error:', error);
                UI.showToast(error.message, 'error');

            } finally {

                setLoading(false);
            }
        }

        // ============================================================
        // GUEST ACCESS
        // ============================================================

        async function handleGuestAccess() {

            setLoading(true);

            try {

                await AuthAPI.guestAccess();

                UI.showToast('เข้าสู่โหมดผู้เยี่ยมชม');

                setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);

            } catch (error) {

                console.error('guest error:', error);
                UI.showToast(error.message, 'error');

            } finally {

                setLoading(false);
            }
        }

        // ============================================================
        // REDIRECT BY ROLE
        // ============================================================

        function redirectByRole() {

            const user = SessionManager.getUser();
            if (!user) return;

            const routes = {
                admin  : 'dashboard.html',
                editor : 'approve.html',
                checker: 'report.html',
                staff  : 'import.html',
                guest  : 'dashboard.html'
            };

            window.location.href = routes[user.role] || 'dashboard.html';
        }

        // ============================================================
        // FORM VALIDATION
        // ============================================================

        function validateForm(email, password) {

            let valid = true;

            if (!email) {
                showFieldError('emailError', 'กรุณากรอกอีเมล');
                valid = false;
            }

            if (!password) {
                showFieldError('passwordError', 'กรุณากรอกรหัสผ่าน');
                valid = false;
            }

            return valid;
        }

        function showFieldError(id, message) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function clearErrors() {
            document.querySelectorAll('#emailError, #passwordError')
                .forEach(el => el.classList.add('hidden'));
        }

        // ============================================================
        // PASSWORD TOGGLE
        // ============================================================

        function togglePassword() {

            const input  = document.getElementById('password');
            const btn    = document.getElementById('togglePassword');
            const isPass = input.type === 'password';

            input.type       = isPass ? 'text' : 'password';
            btn.textContent  = isPass ? 'ซ่อน' : 'แสดง';
        }

        // ============================================================
        // CAPSLOCK DETECTION
        // ============================================================

        function detectCapslock(event) {

            const warning = document.getElementById('capslockWarning');
            if (!warning) return;

            const isOn = event.getModifierState && event.getModifierState('CapsLock');

            warning.classList.toggle('hidden', !isOn);
        }

        // ============================================================
        // REMEMBER EMAIL
        // ============================================================

        function saveRememberEmail() {

            const remember = document.getElementById('rememberEmail')?.checked;
            const email    = document.getElementById('email')?.value.trim();

            if (remember) {
                localStorage.setItem('srdh_remember_email', email);
            } else {
                localStorage.removeItem('srdh_remember_email');
            }
        }

        function restoreRememberedEmail() {

            const email = localStorage.getItem('srdh_remember_email');
            if (!email) return;

            const emailInput    = document.getElementById('email');
            const rememberCheck = document.getElementById('rememberEmail');

            if (emailInput)    emailInput.value   = email;
            if (rememberCheck) rememberCheck.checked = true;
        }

        // ============================================================
        // LOADING STATE
        // ============================================================

        function setLoading(state) {

            const loginBtn = document.getElementById('loginButton');
            const guestBtn = document.getElementById('guestButton');

            if (loginBtn) {
                loginBtn.disabled = state;
                loginBtn.innerHTML = state
                    ? '<span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>กำลังเข้าสู่ระบบ...</span>'
                    : 'เข้าสู่ระบบ';
            }

            if (guestBtn) guestBtn.disabled = state;
        }

    </script>

</body>
