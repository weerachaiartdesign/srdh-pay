    <!-- Script -->
    <script>

        'use strict';

        // ======================
        // INIT
        // ======================

        document.addEventListener(
            'DOMContentLoaded',
            initializeLoginPage
        );

        async function initializeLoginPage() {

            restoreRememberedEmail();

            bindEvents();

            await checkExistingSession();
        }

        // ======================
        // SESSION CHECK
        // ======================

        async function checkExistingSession() {

            if (
                SessionManager.isLoggedIn()
            ) {

                redirectByRole();
            }
        }

        // ======================
        // EVENTS
        // ======================

        function bindEvents() {

            document
                .getElementById('loginForm')
                .addEventListener(
                    'submit',
                    handleLogin
                );

            document
                .getElementById('guestButton')
                .addEventListener(
                    'click',
                    handleGuestAccess
                );

            document
                .getElementById('togglePassword')
                .addEventListener(
                    'click',
                    togglePassword
                );

            document
                .getElementById('password')
                .addEventListener(
                    'keyup',
                    detectCapslock
                );

            document
                .getElementById('password')
                .addEventListener(
                    'keydown',
                    detectCapslock
                );
        }

        // ======================
        // LOGIN
        // ======================

        async function handleLogin(event) {

            event.preventDefault();

            clearErrors();

            const email =
                document
                    .getElementById('email')
                    .value
                    .trim();

            const password =
                document
                    .getElementById('password')
                    .value
                    .trim();

            if (
                !validateForm(
                    email,
                    password
                )
            ) {

                return;
            }

            setLoading(true);

            try {

                const result =
                    await AuthAPI.login(
                        email,
                        password
                    );

                if (
                    !result.success
                ) {

                    UI.showToast(
                        result.message,
                        'error'
                    );

                    return;
                }

                saveRememberEmail();

                UI.showToast(
                    'เข้าสู่ระบบสำเร็จ'
                );

                setTimeout(() => {

                    redirectByRole();

                }, 700);

            } catch (error) {

                console.error(error);

                UI.showToast(
                    error.message,
                    'error'
                );

            } finally {

                setLoading(false);
            }
        }

        // ======================
        // GUEST ACCESS
        // ======================

        async function handleGuestAccess() {

            setLoading(true);

            try {

                const result =
                    await AuthAPI
                        .guestLogin();

                if (
                    !result.success
                ) {

                    UI.showToast(
                        result.message,
                        'error'
                    );

                    return;
                }

                UI.showToast(
                    'เข้าสู่โหมดผู้เยี่ยมชม'
                );

                setTimeout(() => {

                    window.location.href =
                        'dashboard.html';

                }, 700);

            } catch (error) {

                console.error(error);

                UI.showToast(
                    error.message,
                    'error'
                );

            } finally {

                setLoading(false);
            }
        }

        // ======================
        // REDIRECT
        // ======================

        function redirectByRole() {

            const user =
                SessionManager.getUser();

            if (!user) {

                return;
            }

            const role =
                user.role;

            const routes = {

                admin:
                    'dashboard.html',

                editor:
                    'approve.html',

                checker:
                    'report.html',

                staff:
                    'import.html',

                guest:
                    'dashboard.html'
            };

            window.location.href =
                routes[role] ||
                'dashboard.html';
        }

        // ======================
        // VALIDATION
        // ======================

        function validateForm(
            email,
            password
        ) {

            let valid = true;

            if (!email) {

                showFieldError(
                    'emailError',
                    'กรุณากรอกอีเมล'
                );

                valid = false;
            }

            if (!password) {

                showFieldError(
                    'passwordError',
                    'กรุณากรอกรหัสผ่าน'
                );

                valid = false;
            }

            return valid;
        }

        function showFieldError(
            elementId,
            message
        ) {

            const element =
                document
                    .getElementById(
                        elementId
                    );

            element.textContent =
                message;

            element.classList.remove(
                'hidden'
            );
        }

        function clearErrors() {

            document
                .querySelectorAll(
                    '#emailError, #passwordError'
                )
                .forEach(element => {

                    element.classList.add(
                        'hidden'
                    );
                });
        }

        // ======================
        // PASSWORD
        // ======================

        function togglePassword() {

            const passwordInput =
                document
                    .getElementById(
                        'password'
                    );

            const toggleButton =
                document
                    .getElementById(
                        'togglePassword'
                    );

            if (
                passwordInput.type ===
                'password'
            ) {

                passwordInput.type =
                    'text';

                toggleButton.textContent =
                    'ซ่อน';

            } else {

                passwordInput.type =
                    'password';

                toggleButton.textContent =
                    'แสดง';
            }
        }

        // ======================
        // CAPSLOCK
        // ======================

        function detectCapslock(
            event
        ) {

            const warning =
                document
                    .getElementById(
                        'capslockWarning'
                    );

            if (
                event.getModifierState &&
                event.getModifierState(
                    'CapsLock'
                )
            ) {

                warning.classList
                    .remove('hidden');

            } else {

                warning.classList
                    .add('hidden');
            }
        }

        // ======================
        // REMEMBER EMAIL
        // ======================

        function saveRememberEmail() {

            const remember =
                document
                    .getElementById(
                        'rememberEmail'
                    )
                    .checked;

            const email =
                document
                    .getElementById(
                        'email'
                    )
                    .value
                    .trim();

            if (remember) {

                localStorage.setItem(
                    'remember_email',
                    email
                );

            } else {

                localStorage.removeItem(
                    'remember_email'
                );
            }
        }

        function restoreRememberedEmail() {

            const email =
                localStorage.getItem(
                    'remember_email'
                );

            if (!email) {

                return;
            }

            document
                .getElementById(
                    'email'
                )
                .value = email;

            document
                .getElementById(
                    'rememberEmail'
                )
                .checked = true;
        }

        // ======================
        // LOADING
        // ======================

        function setLoading(state) {

            const loginButton =
                document
                    .getElementById(
                        'loginButton'
                    );

            const guestButton =
                document
                    .getElementById(
                        'guestButton'
                    );

            loginButton.disabled =
                state;

            guestButton.disabled =
                state;

            if (state) {

                loginButton.innerHTML =
                    'กำลังเข้าสู่ระบบ...';

            } else {

                loginButton.innerHTML =
                    'เข้าสู่ระบบ';
            }
        }

        // ======================
        // SOFT SECURITY
        // ======================

        document.addEventListener(
            'keydown',
            function(event) {

                if (
                    event.key === 'F12'
                ) {

                    event.preventDefault();
                }

                if (
                    event.ctrlKey &&
                    event.shiftKey &&
                    (
                        event.key === 'I' ||
                        event.key === 'J'
                    )
                ) {

                    event.preventDefault();
                }
            }
        );

    </script>
