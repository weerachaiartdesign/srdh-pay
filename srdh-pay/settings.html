<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระบบ - Srdh Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="apple-touch-icon" href="icons/register_acc-touch-icon.png">
</head>
<body class="bg-purple-50 text-gray-800" data-theme="light">
    <!-- Header -->
    <header class="bg-white border-b border-purple-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">รพส</div>
                    <div>
                        <h1 class="text-xl font-semibold text-purple-900">ตั้งค่าระบบ</h1>
                    </div>
                </div>
                <div onclick="logout()" class="cursor-pointer text-purple-700 hover:text-red-600">
                    <i class="fas fa-sign-out-alt text-xl"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-3xl font-bold text-purple-900 mb-8">จัดการข้อมูลพื้นฐาน</h2>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Money Types -->
            <div class="card p-6">
                <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-coins"></i> ประเภทเงิน
                </h3>
                <div id="money-list" class="space-y-2 mb-4"></div>
                <input type="text" id="new-money" placeholder="เพิ่มประเภทเงินใหม่" 
                       class="w-full px-4 py-3 border border-purple-200 rounded-2xl">
                <button onclick="addMoneyType()" class="mt-3 w-full py-3 btn-primary text-white rounded-2xl">เพิ่ม</button>
            </div>

            <!-- Vendors -->
            <div class="card p-6">
                <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-building"></i> รายชื่อเจ้าหนี้/บริษัท
                </h3>
                <div id="vendor-list" class="space-y-2 mb-4 max-h-80 overflow-auto"></div>
                <input type="text" id="new-vendor" placeholder="เพิ่มชื่อบริษัทใหม่" 
                       class="w-full px-4 py-3 border border-purple-200 rounded-2xl">
                <button onclick="addVendor()" class="mt-3 w-full py-3 btn-primary text-white rounded-2xl">เพิ่ม</button>
            </div>

            <!-- Checkers -->
            <div class="card p-6">
                <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-user-check"></i> ผู้ตรวจสอบ
                </h3>
                <div id="checker-list" class="space-y-2 mb-4"></div>
                <input type="text" id="new-checker" placeholder="เพิ่มชื่อผู้ตรวจสอบ" 
                       class="w-full px-4 py-3 border border-purple-200 rounded-2xl">
                <button onclick="addChecker()" class="mt-3 w-full py-3 btn-primary text-white rounded-2xl">เพิ่ม</button>
            </div>
        </div>

        <!-- System Settings -->
        <div class="card p-8 mt-8">
            <h3 class="font-semibold text-xl mb-6">กำหนดช่วงรับฎีกา</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label>วันที่เริ่มรับ</label>
                    <input type="date" id="open-date" class="w-full mt-2 px-5 py-4 border border-purple-200 rounded-2xl">
                </div>
                <div>
                    <label>วันที่ปิดรับ</label>
                    <input type="date" id="close-date" class="w-full mt-2 px-5 py-4 border border-purple-200 rounded-2xl">
                </div>
            </div>
            <button onclick="savePeriod()" class="mt-6 px-8 py-4 btn-primary text-white rounded-2xl">บันทึกช่วงเวลา</button>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/main.js"></script>

    <script>
 
    // Version: 00122
// Settings Page Controller (Admin Only)

async function loadSettings() {
    if (currentUser?.role !== 'admin') {
        alert("เฉพาะผู้ดูแลระบบเท่านั้นที่เข้าถึงได้");
        window.location.href = 'dashboard.html';
        return;
    }

    await loadMoneyTypes();
    await loadVendors();
    await loadCheckers();
}

async function loadMoneyTypes() {
    const result = await callGAS('getSettings', { sheet: 'moneytype' });
    const container = document.getElementById('money-list');
    if (result.success) {
        container.innerHTML = result.data.map(item => `
            <div class="flex justify-between bg-purple-50 px-4 py-3 rounded-2xl">
                <span>${item}</span>
                <button onclick="deleteSetting('moneytype', '${item}')" class="text-red-500 text-sm">ลบ</button>
            </div>
        `).join('');
    }
}

async function loadVendors() {
    const result = await callGAS('getSettings', { sheet: 'vendor' });
    const container = document.getElementById('vendor-list');
    if (result.success) {
        container.innerHTML = result.data.map(item => `
            <div class="flex justify-between bg-purple-50 px-4 py-3 rounded-2xl">
                <span>${item}</span>
                <button onclick="deleteSetting('vendor', '${item}')" class="text-red-500 text-sm">ลบ</button>
            </div>
        `).join('');
    }
}

async function loadCheckers() {
    const result = await callGAS('getSettings', { sheet: 'checker' });
    const container = document.getElementById('checker-list');
    if (result.success) {
        container.innerHTML = result.data.map(item => `
            <div class="flex justify-between bg-purple-50 px-4 py-3 rounded-2xl">
                <span>${item}</span>
                <button onclick="deleteSetting('checker', '${item}')" class="text-red-500 text-sm">ลบ</button>
            </div>
        `).join('');
    }
}

// Add Functions
async function addMoneyType() {
    const val = document.getElementById('new-money').value.trim();
    if (val) await saveSetting('moneytype', val);
}

async function addVendor() {
    const val = document.getElementById('new-vendor').value.trim();
    if (val) await saveSetting('vendor', val);
}

async function addChecker() {
    const val = document.getElementById('new-checker').value.trim();
    if (val) await saveSetting('checker', val);
}

async function saveSetting(type, value) {
    await callGAS('addSetting', { type, value });
    loadSettings(); // Refresh
}

async function deleteSetting(type, value) {
    if (confirm(`ลบ "${value}"?`)) {
        await callGAS('deleteSetting', { type, value });
        loadSettings();
    }
}

async function savePeriod() {
    alert("บันทึกช่วงเวลารับฎีกาสำเร็จ (เชื่อมต่อกับ GAS)");
}

document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    checkDarkMode();
    loadSettings();
});
    </script>
    
</body>
</html>
