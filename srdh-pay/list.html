    <script>

        'use strict';

        // ======================
        // STATE
        // ======================

        let registerData = [];

        let filteredData = [];

        let currentPage = 1;

        const CACHE_KEY =
            'register_cache_v1';

        const CACHE_TIME =
            5 * 60 * 1000;

        // ======================
        // INIT
        // ======================

        document.addEventListener(
            'DOMContentLoaded',
            initializePage
        );

        async function initializePage() {

            bindEvents();

            await loadRegisterData();
        }

        // ======================
        // EVENTS
        // ======================

        function bindEvents() {

            document
                .getElementById(
                    'refreshButton'
                )
                .addEventListener(
                    'click',
                    async () => {

                        await loadRegisterData(
                            true
                        );
                    }
                );

            document
                .getElementById(
                    'printButton'
                )
                .addEventListener(
                    'click',
                    () => {

                        window.print();
                    }
                );

            document
                .getElementById(
                    'searchInput'
                )
                .addEventListener(
                    'input',
                    debounce(
                        applyFilters,
                        300
                    )
                );

            document
                .getElementById(
                    'statusFilter'
                )
                .addEventListener(
                    'change',
                    applyFilters
                );

            document
                .getElementById(
                    'moneyTypeFilter'
                )
                .addEventListener(
                    'change',
                    applyFilters
                );

            document
                .getElementById(
                    'pageSize'
                )
                .addEventListener(
                    'change',
                    () => {

                        currentPage = 1;

                        renderTable();
                    }
                );

            document
                .getElementById(
                    'prevPage'
                )
                .addEventListener(
                    'click',
                    previousPage
                );

            document
                .getElementById(
                    'nextPage'
                )
                .addEventListener(
                    'click',
                    nextPage
                );

            document
                .getElementById(
                    'closeModal'
                )
                .addEventListener(
                    'click',
                    closeModal
                );
        }

        // ======================
        // LOAD
        // ======================

        async function loadRegisterData(
            forceRefresh = false
        ) {

            try {

                UI.showLoading();

                const cached =
                    getCache();

                if (
                    cached &&
                    !forceRefresh
                ) {

                    registerData =
                        cached;

                    initializeData();

                    return;
                }

                const result =
                    await RegisterAPI
                        .getRegisterData();

                if (
                    !result.success
                ) {

                    throw new Error(
                        result.message
                    );
                }

                registerData =
                    result.data || [];

                sortByRegisterNumber();

                saveCache(
                    registerData
                );

                initializeData();

            } catch (error) {

                console.error(error);

                UI.showToast(
                    error.message,
                    'error'
                );

            } finally {

                UI.hideLoading();
            }
        }

        // ======================
        // INIT DATA
        // ======================

        function initializeData() {

            populateMoneyTypes();

            applyFilters();
        }

        // ======================
        // FILTER
        // ======================

        function applyFilters() {

            const keyword =
                document
                    .getElementById(
                        'searchInput'
                    )
                    .value
                    .trim()
                    .toLowerCase();

            const status =
                document
                    .getElementById(
                        'statusFilter'
                    )
                    .value;

            const moneyType =
                document
                    .getElementById(
                        'moneyTypeFilter'
                    )
                    .value;

            filteredData =
                registerData.filter(
                    row => {

                        const text =
                            row.join(' ')
                                .toLowerCase();

                        const rowStatus =
                            getStatus(row);

                        const keywordMatch =
                            !keyword ||
                            text.includes(
                                keyword
                            );

                        const statusMatch =
                            !status ||
                            rowStatus ===
                            status;

                        const moneyMatch =
                            !moneyType ||
                            row[0] ===
                            moneyType;

                        return (
                            keywordMatch &&
                            statusMatch &&
                            moneyMatch
                        );
                    }
                );

            currentPage = 1;

            renderTable();
        }

        // ======================
        // RENDER
        // ======================

        function renderTable() {

            renderDesktopTable();

            renderMobileCards();

            renderPagination();
        }

        // ======================
        // DESKTOP
        // ======================

        function renderDesktopTable() {

            const body =
                document
                    .getElementById(
                        'tableBody'
                    );

            body.innerHTML = '';

            const rows =
                getCurrentPageData();

            rows.forEach(
                (row, index) => {

                    const status =
                        getStatus(row);

                    const tr =
                        document
                            .createElement(
                                'tr'
                            );

                    tr.className =
                        `
                        table-row
                        border-b
                        border-slate-200
                        dark:border-slate-800
                        `;

                    tr.innerHTML =
                        `
                        <td class="px-5 py-4">
                            ${index + 1}
                        </td>

                        <td class="px-5 py-4 font-medium">
                            ${row[9] || '-'}
                        </td>

                        <td class="px-5 py-4">
                            ${row[10] || '-'}
                        </td>

                        <td class="px-5 py-4">
                            ${row[4] || '-'}
                        </td>

                        <td class="px-5 py-4">
                            ${Formatter.currency(
                                row[5]
                            )}
                        </td>

                        <td class="px-5 py-4">

                        </td>

                        <td class="px-5 py-4">
                            ${row[1] || '-'}
                        </td>

                        <td class="px-5 py-4">

                                px-3

                                rounded-full
                                text-xs

                            ">

                        </td>

                        <td class="px-5 py-4">

                            <button
                                onclick="openDetail(${getRowIndex(row)})"

                                    px-3

                                    hover:bg-blue-700

                                "

                                Detail
                            </button>

                        </td>
                        `;

                    body.appendChild(tr);
                });
        }

        // ======================

                card.innerHTML =

                    <div class="

                    ">

                                    row[5]
                                )}

                        </div>

                        <div>

                            <div class="
                                text-slate-500

                                ประเภทเงิน
                            </div>

                            <div class="
                                font-medium
                            ">
                                ${row[0] || '-'}
                            </div>

                        </div>

                    </div>

                    <button
                        onclick="openDetail(${getRowIndex(row)})"
                        class="
                            mt-4
                            w-full
                            px-4
                            py-3
                            rounded-xl
                            bg-blue-600
                            hover:bg-blue-700
                            text-white
                        "

                    `;

            });
        }

        // ======================
        // DETAIL
        // ======================

        function openDetail(index) {

            const row =
                filteredData[index];

            if (!row) {

                return;
            }

            const modal =
                document
                    .getElementById(
                        'detailModal'
                    );

            const content =
                document
                    .getElementById(
                        'modalContent'
                    );

            content.innerHTML =
                `
                <div class="
                    grid
                    grid-cols-1
                    md:grid-cols-2
                    gap-5
                ">

                    ${renderDetailItem(
                        'ประเภทเงิน',
                        row[0]
                    )}

                    ${renderDetailItem(
                        'หน่วยงาน',
                        row[1]
                    )}

                    ${renderDetailItem(
                        'ผู้ส่งเอกสาร',
                        row[2]
                    )}

                    ${renderDetailItem(
                        'Invoice',
                        row[3]
                    )}

                    ${renderDetailItem(
                        'เจ้าหนี้',
                        row[4]
                    )}

                    ${renderDetailItem(
                        'จำนวนเงิน',
                        Formatter.currency(
                            row[5]
                        )
                    )}

                    ${renderDetailItem(
                        'รายการ',
                        row[6]
                    )}

                    ${renderDetailItem(
                        'เลขทะเบียน',
                        row[9]
                    )}

                    ${renderDetailItem(
                        'เลขรับ',
                        row[10]
                    )}

                    ${renderDetailItem(
                        'เลขใบขอเบิก',
                        row[12]
                    )}

                    ${renderDetailItem(
                        'เลขฎีกา',
                        row[13]
                    )}

                    ${renderDetailItem(
                        'สถานะ',
                        getStatus(row)
                    )}

                </div>
                `;

            modal.classList.remove(
                'hidden'
            );
        }

        function closeModal() {

            document
                .getElementById(

                .classList.add(
                    'hidden'
                );
        }

        function renderDetailItem(
            label,
            value
        ) {

            return `
            <div>

                <div class="
                    text-sm
                    text-slate-500
                    mb-1
                ">
                    ${label}
                </div>

                <div class="
                    font-medium
                    break-words
                ">
                    ${value || '-'}
                </div>

            </div>
            `;
        }

        // ======================
        // STATUS
        // ======================

        function getStatus(row) {

            if (row[23]) {

                return 'ยกเลิก';
            }

            if (row[22]) {

                return 'จ่ายแล้ว';
            }

            if (row[21]) {

                return 'อนุมัติ';
            }

            return 'รออนุมัติ';
        }

        function getStatusClass(
            status
        ) {

            switch (status) {

                case 'จ่ายแล้ว':

                    return 'status-paid';

                case 'ยกเลิก':

                    return 'status-cancel';

                case 'อนุมัติ':

                    return 'status-default';

                default:

                    return 'status-wait';
            }
        }

        // ======================
        // PAGINATION
        // ======================

        function getCurrentPageData() {

            const size =
                Number(
                    document
                        .getElementById(
                            'pageSize'
                        )
                        .value
                );

            const start =
                (
                    currentPage - 1
                ) * size;

            return filteredData.slice(
                start,
                start + size
            );
        }

        function renderPagination() {

            const size =
                Number(
                    document
                        .getElementById(
                            'pageSize'
                        )
                        .value
                );

            const totalPages =
                Math.ceil(
                    filteredData.length /
                    size
                );

            document
                .getElementById(
                    'pageNumber'
                )
                .textContent =
                    `
                    ${currentPage}
                    /
                    ${totalPages || 1}
                    `;

            document
                .getElementById(
                    'paginationInfo'
                )
                .textContent =
                    `
                    ${filteredData.length}
                    รายการ
                    `;
        }

        function previousPage() {

            if (
                currentPage <= 1
            ) {

                return;
            }

            currentPage--;

            renderTable();
        }

        function nextPage() {

            const size =
                Number(
                    document
                        .getElementById(
                            'pageSize'
                        )
                        .value
                );

            const totalPages =
                Math.ceil(
                    filteredData.length /
                    size
                );

            if (
                currentPage >= totalPages
            ) {

                return;
            }

            currentPage++;

            renderTable();
        }

        // ======================
        // UTIL
        // ======================

        function populateMoneyTypes() {

            const select =
                document
                    .getElementById(
                        'moneyTypeFilter'
                    );

            const unique =
                [
                    ...new Set(
                        registerData.map(
                            row => row[0]
                        )
                    )
                ];

            unique.forEach(type => {

                if (!type) {

                    return;
                }

                const option =
                    document
                        .createElement(
                            'option'
                        );

                option.value =
                    type;

                option.textContent =
                    type;

                select.appendChild(
                    option
                );
            });
        }

        function sortByRegisterNumber() {

            registerData.sort(
                (a, b) => {

                    return (
                        String(
                            b[9] || ''
                        )
                    ).localeCompare(
                        String(
                            a[9] || ''
                        )
                    );
                }
            );
        }

        function getRowIndex(row) {

            return filteredData.indexOf(
                row
            );
        }

        // ======================
        // CACHE
        // ======================

        function saveCache(data) {

            localStorage.setItem(
                CACHE_KEY,
                JSON.stringify({

                    timestamp:
                        Date.now(),

                    data
                })
            );
        }

        function getCache() {

            const raw =
                localStorage.getItem(
                    CACHE_KEY
                );

            if (!raw) {

                return null;
            }

            try {

                const parsed =
                    JSON.parse(raw);

                const expired =
                    (
                        Date.now() -
                        parsed.timestamp
                    ) >
                    CACHE_TIME;

                if (expired) {

                    localStorage.removeItem(
                        CACHE_KEY
                    );

                    return null;
                }

                return parsed.data;

            } catch {

                return null;
            }
        }

        // ======================
        // AUTO REFRESH
        // ======================

        setInterval(
            async () => {

                await loadRegisterData(
                    true
                );

            },
            5 * 60 * 1000
        );

    </script>

</body>

</html>
