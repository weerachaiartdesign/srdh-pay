<div class="max-w-full">
  <h2 class="text-2xl font-bold mb-4">ทะเบียนฎีกาเบิกจ่ายเงิน</h2>
  <div class="flex flex-col md:flex-row gap-3 mb-4">
    <input type="text" id="list-search" placeholder="ค้นหา..." class="w-full md:w-64 px-3 py-2 border rounded-lg text-sm" oninput="applyFilters()">
    <select id="list-limit" class="border rounded-lg px-2 py-2 text-sm bg-white" onchange="applyFilters()">
      <option value="50">50</option><option value="100">100</option><option value="200">200</option><option value="500">500</option>
    </select>
    <select id="list-filter-type" class="border rounded-lg px-2 py-2 text-sm bg-white" onchange="applyFilters()">
      <option value="">ทุกประเภท</option>
    </select>
    <select id="list-filter-dept" class="border rounded-lg px-2 py-2 text-sm bg-white" onchange="applyFilters()">
      <option value="">ทุกหน่วยงาน</option>
    </select>
    <select id="list-filter-status" class="border rounded-lg px-2 py-2 text-sm bg-white" onchange="applyFilters()">
      <option value="">ทุกสถานะ</option>
      <option value="รอเอกสาร">รอเอกสาร</option>
      <option value="รับเข้าหน่วยงาน">รับเข้าหน่วยงาน</option>
      <option value="ตรวจสอบ">ตรวจสอบ</option>
      <option value="ส่งแก้ไข">ส่งแก้ไข</option>
      <option value="ตรวจผ่าน">ตรวจผ่าน</option>
      <option value="ส่งเสนอ">ส่งเสนอ</option>
      <option value="อนุมัติ">อนุมัติ</option>
      <option value="จ่ายแล้ว">จ่ายแล้ว</option>
      <option value="ยกเลิก">ยกเลิก</option>
    </select>
    <button onclick="clearFilters()" class="px-3 py-2 bg-purple-100 text-purple-600 rounded-lg text-sm">ล้างตัวกรอง</button>
  </div>
  <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
    <table class="w-full text-left text-sm mobile-card-table">
      <thead class="bg-purple-600 text-white">
        <tr>
          <th class="px-4 py-3">ลำดับ</th><th class="px-4 py-3">สถานะ</th><th class="px-4 py-3">ฎีกา/ใบขอเบิก</th>
          <th class="px-4 py-3">เจ้าหนี้</th><th class="px-4 py-3">รายการ</th><th class="px-4 py-3 text-right">จำนวนเงิน</th>
          <th class="px-4 py-3">ประเภท/หน่วยงาน</th>
        </tr>
      </thead>
      <tbody id="list-tbody" class="divide-y divide-gray-100"></tbody>
    </table>
  </div>
  <div class="flex justify-between items-center mt-3 text-sm text-gray-500" id="list-pagination"></div>
</div>
