    <!-- Script -->
    <script>

        'use strict';

        // ============================================================
        // STATE
        // ============================================================

        let currentPage  = 1;
        let pageSize     = 20;
        let totalPages   = 1;
        let totalRows    = 0;
        let currentRows  = [];   // rows ในหน้าปัจจุบัน (objects จาก server)
        let masterData   = null; // moneyTypes, statuses

        // ============================================================
        // INIT
        // ============================================================

        document.addEventListener('DOMContentLoaded', initializePage);

        async function initializePage() {
            bindEvents();
            await loadMasterData();
            await loadRegisterData();
        }

        // ============================================================
        // MASTER DATA (moneyTypes สำหรับ dropdown)
        // ============================================================

        async function loadMasterData() {
            try {
                const result = await RegisterAPI.getMasterData();
                masterData   = result.data || {};
                populateMoneyTypeFilter(masterData.moneyTypes || []);
            } catch (e) {
                console.warn('loadMasterData error:', e);
            }
        }

        function populateMoneyTypeFilter(types) {
            const select = document.getElementById('moneyTypeFilter');
            if (!select) return;
            // เก็บ option แรก (ทั้งหมด) ไว้
            const first = select.options[0];
            select.innerHTML = '';
            select.appendChild(first);
            types.forEach(t => {
                const opt   = document.createElement('option');
                opt.value   = t;
                opt.textContent = t;
                select.appendChild(opt);
            });
        }

        // ============================================================
        // EVENTS
        // ============================================================

        function bindEvents() {

            _on('refreshButton', 'click', () => loadRegisterData(true));
            _on('printButton',   'click', () => window.print());
            _on('exportButton',  'click', handleExport);
            _on('closeModal',    'click', closeModal);
            _on('prevPage',      'click', () => goToPage(currentPage - 1));
            _on('nextPage',      'click', () => goToPage(currentPage + 1));

            // Search — debounce แล้ว reset page
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', debounce(() => {
                    currentPage = 1;
                    loadRegisterData();
                }, 400));
            }

            // Filters — reset page แล้วโหลดใหม่ทันที
            ['statusFilter', 'moneyTypeFilter'].forEach(id => {
                _on(id, 'change', () => { currentPage = 1; loadRegisterData(); });
            });

            // Page size
            _on('pageSize', 'change', () => {
                pageSize    = Number(document.getElementById('pageSize').value) || 20;
                currentPage = 1;
                loadRegisterData();
            });

            // ปิด modal เมื่อคลิก backdrop
            const modal = document.getElementById('detailModal');
            if (modal) {
                modal.addEventListener('click', e => {
                    if (e.target === modal) closeModal();
                });
            }
        }

        // ============================================================
        // LOAD DATA (server-side filter + pagination)
        // ============================================================

        async function loadRegisterData(forceRefresh = false) {

            try {

                UI.showLoading();

                const params = _buildParams();

                const result = await RegisterAPI.getList(params);

                currentRows = result.data || [];

                const pagination = result.pagination || {};
                currentPage  = pagination.page       || 1;
                pageSize     = pagination.pageSize    || 20;
                totalPages   = pagination.totalPages  || 1;
                totalRows    = pagination.total       || 0;

                renderTable();
                renderPaginationInfo();
                Pagination.render(
                    document.getElementById('paginationContainer'),
                    currentPage,
                    totalPages,
                    goToPage
                );

            } catch (error) {

                console.error('loadRegisterData error:', error);
                UI.showToast(error.message, 'error');

            } finally {

                UI.hideLoading();
            }
        }

        function _buildParams() {
            return {
                page      : currentPage,
                pageSize  : pageSize,
                keyword   : document.getElementById('searchInput')?.value.trim()    || '',
                status    : document.getElementById('statusFilter')?.value          || '',
                moneyType : document.getElementById('moneyTypeFilter')?.value       || '',
                sortDir   : 'desc'
            };
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadRegisterData();
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================

        function renderTable() {
            renderDesktopTable();
            renderMobileCards();
            RegisterResponsive.render();
        }

        function renderDesktopTable() {

            const body = document.getElementById('tableBody');
            if (!body) return;

            if (!currentRows.length) {
                body.innerHTML = `
                    <tr>
                        <td colspan="9" class="text-center py-10 text-slate-400 text-sm">
                            ไม่พบข้อมูล
                        </td>
                    </tr>`;
                return;
            }

            const startNo = (currentPage - 1) * pageSize + 1;

            body.innerHTML = currentRows.map((row, i) => `
                <tr class="table-row border-b border-slate-200 text-sm cursor-pointer hover:bg-violet-50"
                    onclick="openDetail('${escapeHtml(row.uuid)}')">
                    <td class="px-5 py-3 text-slate-400">${startNo + i}</td>
                    <td class="px-5 py-3 font-medium font-mono text-xs">${escapeHtml(row.registerNo || '-')}</td>
                    <td class="px-5 py-3 font-mono text-xs">${escapeHtml(Formatter.runningNo(row.receiveNo) || '-')}</td>
                    <td class="px-5 py-3">${escapeHtml(row.vendor || '-')}</td>
                    <td class="px-5 py-3 text-right font-medium">${Formatter.currency(row.amount)}</td>
                    <td class="px-5 py-3">
                        <span class="px-2 py-0.5 rounded text-xs ${_moneyTypeBg(row.moneyType)}">
                            ${escapeHtml(row.moneyType || '-')}
                        </span>
                    </td>
                    <td class="px-5 py-3 text-slate-500 text-xs">${escapeHtml(row.dept || '-')}</td>
                    <td class="px-5 py-3">${StatusHelper.badge(row.status)}</td>
                    <td class="px-5 py-3">
                        <button onclick="event.stopPropagation(); openDetail('${escapeHtml(row.uuid)}')"
                            class="px-3 py-1.5 rounded-lg bg-violet-600 hover:bg-violet-700 text-white text-xs">
                            รายละเอียด
                        </button>
                    </td>
                </tr>`
            ).join('');
        }

        function renderMobileCards() {

            const container = document.getElementById('registerMobileCard');
            if (!container) return;

            if (!currentRows.length) {
                container.innerHTML = `
                    <div class="text-center py-10 text-slate-400 text-sm">ไม่พบข้อมูล</div>`;
                return;
            }

            container.innerHTML = currentRows.map(row => `
                <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm"
                     onclick="openDetail('${escapeHtml(row.uuid)}')">
                    <div class="flex items-start justify-between gap-3 mb-3">
                        <div>
                            <div class="font-semibold">${escapeHtml(row.vendor || '-')}</div>
                            <div class="text-xs text-slate-400 mt-0.5 font-mono">${escapeHtml(row.registerNo || '-')}</div>
                        </div>
                        ${StatusHelper.badge(row.status)}
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div>
                            <div class="text-slate-400 text-xs">จำนวนเงิน</div>
                            <div class="font-medium">${Formatter.currency(row.amount)}</div>
                        </div>
                        <div>
                            <div class="text-slate-400 text-xs">ประเภทเงิน</div>
                            <div class="font-medium text-xs">${escapeHtml(row.moneyType || '-')}</div>
                        </div>
                    </div>
                </div>`
            ).join('');
        }

        // ============================================================
        // PAGINATION INFO
        // ============================================================

        function renderPaginationInfo() {

            const el = document.getElementById('paginationInfo');
            if (!el) return;

            const start = totalRows === 0 ? 0 : (currentPage - 1) * pageSize + 1;
            const end   = Math.min(currentPage * pageSize, totalRows);

            el.textContent = `แสดง ${start}–${end} จาก ${totalRows.toLocaleString('th-TH')} รายการ`;
        }

        // ============================================================
        // DETAIL MODAL
        // ============================================================

        async function openDetail(uuid) {

            if (!uuid) return;

            const modal   = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');

            if (!modal || !content) return;

            content.innerHTML = `<div class="text-center py-6 text-slate-400">กำลังโหลด...</div>`;
            modal.classList.remove('hidden');

            try {

                const result = await RegisterAPI.getDetail(uuid);
                const row    = result.data;

                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        ${_detailItem('ประเภทเงิน',     row.moneyType)}
                        ${_detailItem('หน่วยงาน',        row.dept)}
                        ${_detailItem('ผู้ส่งเอกสาร',    row.sender)}
                        ${_detailItem('Invoice',          row.invoice)}
                        ${_detailItem('เจ้าหนี้/บริษัท', row.vendor)}
                        ${_detailItem('จำนวนเงิน',       Formatter.currency(row.amount) + ' บาท')}
                        ${_detailItem('รายการ',           row.description)}
                        ${_detailItem('งวด/เดือน',        row.period)}
                        ${_detailItem('เลขทะเบียน',       row.registerNo)}
                        ${_detailItem('เลขที่รับ',         Formatter.runningNo(row.receiveNo))}
                        ${_detailItem('เลขใบขอเบิก',      row.requestNo)}
                        ${_detailItem('เลขที่ฎีกา',        row.dkNo)}
                        ${_detailItem('เลข e-GP',          row.egpNo)}
                        ${_detailItem('ผู้ตรวจ',           row.checker)}
                        ${_detailItem('สถานะ',             StatusHelper.badge(row.status))}
                        ${_detailItem('วันที่ลงทะเบียน',  Formatter.thaiDate(row.registerDate))}
                        ${_detailItem('วันที่รับเอกสาร',   Formatter.thaiDate(row.receiveDate))}
                        ${_detailItem('วันที่ตรวจผ่าน',    Formatter.thaiDate(row.passDate))}
                        ${_detailItem('วันที่เสนอ',         Formatter.thaiDate(row.proposeDate))}
                        ${_detailItem('วันที่อนุมัติ',      Formatter.thaiDate(row.approveDate))}
                        ${_detailItem('วันที่จ่ายเช็ค',    Formatter.thaiDate(row.payDate))}
                        ${row.cancelDate ? _detailItem('วันที่ยกเลิก', Formatter.thaiDate(row.cancelDate)) : ''}
                        ${row.cancelNote ? _detailItem('หมายเหตุยกเลิก', row.cancelNote) : ''}
                        ${_detailItem('ปีงบประมาณ',        row.fiscalYear)}
                        ${_detailItem('สร้างโดย',           row.createdBy)}
                        ${_detailItem('สร้างเมื่อ',         Formatter.thaiDate(row.createdAt))}
                    </div>

                    <!-- Timeline -->
                    <div class="mt-5 border-t pt-4">
                        <h3 class="text-sm font-semibold text-slate-600 mb-3">Timeline</h3>
                        <div id="timelineContainer" class="text-center text-slate-400 text-sm py-2">
                            กำลังโหลด...
                        </div>
                    </div>

                    <!-- Actions -->
                    ${_renderDetailActions(row)}
                `;

                // โหลด timeline
                _loadTimeline(uuid);

            } catch (error) {
                content.innerHTML = `
                    <div class="text-center py-6 text-red-400 text-sm">${error.message}</div>`;
            }
        }

        async function _loadTimeline(uuid) {
            try {
                const result = await RegisterAPI.getTimeline(uuid);
                const items  = result.data || [];
                const el     = document.getElementById('timelineContainer');
                if (!el) return;

                if (!items.length) {
                    el.textContent = 'ไม่มีประวัติ';
                    return;
                }

                el.innerHTML = items.map(item => `
                    <div class="flex gap-3 mb-2">
                        <div class="w-2 h-2 rounded-full bg-violet-400 mt-1.5 flex-shrink-0"></div>
                        <div>
                            <span class="text-xs font-medium">${escapeHtml(item.action)}</span>
                            <span class="text-xs text-slate-400 ml-2">${escapeHtml(item.user)}</span>
                            <div class="text-xs text-slate-400">${Formatter.thaiDate(item.timestamp)}</div>
                            ${item.note ? `<div class="text-xs text-slate-500 mt-0.5">${escapeHtml(item.note)}</div>` : ''}
                        </div>
                    </div>`
                ).join('');
            } catch (e) {
                console.warn('timeline error:', e);
            }
        }

        function _renderDetailActions(row) {

            const user = SessionManager.getUser();
            if (!user) return '';

            const canEdit   = ['admin','editor'].includes(user.role);
            const canDelete = user.role === 'admin';

            if (!canEdit && !canDelete) return '';

            return `
                <div class="mt-4 pt-4 border-t flex gap-2 justify-end">
                    ${canDelete ? `
                        <button onclick="handleDelete('${escapeHtml(row.uuid)}')"
                            class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm">
                            ลบรายการ
                        </button>` : ''}
                </div>`;
        }

        async function handleDelete(uuid) {

            const ok = await UI.confirmWithInput(
                'ลบรายการ',
                'การลบไม่สามารถกู้คืนได้ กรุณายืนยัน',
                'DELETE'
            );

            if (!ok) return;

            try {
                UI.showLoading();
                await RegisterAPI.delete(uuid);
                UI.showToast('ลบรายการสำเร็จ');
                closeModal();
                await loadRegisterData(true);
            } catch (error) {
                UI.showToast(error.message, 'error');
            } finally {
                UI.hideLoading();
            }
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            if (modal) modal.classList.add('hidden');
        }

        // ============================================================
        // EXPORT
        // ============================================================

        async function handleExport() {
            try {
                UI.showLoading();
                const params = _buildParams();
                const result = await ReportAPI.export('excel', {
                    keyword  : params.keyword,
                    status   : params.status,
                    moneyType: params.moneyType
                });
                UI.showToast('ส่งออกข้อมูลสำเร็จ ' + (result.data?.length || 0) + ' รายการ');
            } catch (error) {
                UI.showToast(error.message, 'error');
            } finally {
                UI.hideLoading();
            }
        }

        // ============================================================
        // HELPERS
        // ============================================================

        function _detailItem(label, value) {
            return `
                <div>
                    <div class="text-slate-400 text-xs mb-0.5">${label}</div>
                    <div class="font-medium break-words">${value || '-'}</div>
                </div>`;
        }

        function _moneyTypeBg(type) {
            const map = {
                'เงินงบประมาณ'    : 'money-type-เงินงบประมาณ',
                'เงินบำรุง'       : 'money-type-เงินบำรุง',
                'เงินประกันสุขภาพ': 'money-type-เงินประกันสุขภาพ',
                'เงินอุดหนุน'     : 'money-type-เงินอุดหนุน',
                'เงินแพทยศาสตร์'  : 'money-type-เงินแพทยศาสตร์'
            };
            return map[type] || 'money-type-เงินอื่น';
        }

        function _on(id, event, handler) {
            const el = document.getElementById(id);
            if (el) el.addEventListener(event, handler);
        }

    </script>

</body>

</html>
