<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงาน - Srdh Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&amp;family=Prompt:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <link rel="apple-touch-icon" href="icons/register_acc-touch-icon.png">
</head>
<body class="bg-purple-50 text-gray-800" data-theme="light">
    <!-- Header -->
    <header class="bg-white border-b border-purple-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">รพส</div>
                    <div>
                        <h1 class="text-xl font-semibold text-purple-900">รายงานระบบ</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-3 rounded-2xl hover:bg-purple-100">
                        <i id="theme-icon" class="fas fa-moon text-xl"></i>
                    </button>
                    <button onclick="exportToExcel()" 
                            class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center gap-2">
                        <i class="fas fa-file-excel"></i> ส่งออก Excel
                    </button>
                    <div onclick="logout()" class="cursor-pointer text-purple-700 hover:text-red-600">
                        <i class="fas fa-sign-out-alt text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-3xl font-bold text-purple-900 mb-8 flex items-center gap-3">
            <i class="fas fa-chart-bar"></i> รายงานการเบิกจ่ายเงิน
        </h2>

        <!-- Period Selector -->
        <div class="bg-white rounded-3xl p-6 shadow-sm mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium text-purple-700 mb-2">เดือน</label>
                    <select id="report-month" class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-purple-700 mb-2">ปีงบประมาณ</label>
                    <select id="report-year" class="w-full px-5 py-4 border border-purple-200 rounded-2xl">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="loadReport()" 
                            class="w-full py-4 btn-primary text-white rounded-2xl font-semibold">
                        แสดงรายงาน
                    </button>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10" id="report-summary">
            <!-- Generated by JS -->
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card p-6">
                <h3 class="font-semibold text-purple-800 mb-4">สรุปตามประเภทเงิน</h3>
                <canvas id="reportMoneyChart" height="140"></canvas>
            </div>
            <div class="card p-6">
                <h3 class="font-semibold text-purple-800 mb-4">สรุปตามหน่วยงาน</h3>
                <canvas id="reportDeptChart" height="140"></canvas>
            </div>
        </div>

        <!-- Pending Items -->
        <div class="mt-8 card p-6">
            <h3 class="font-semibold text-purple-800 mb-4">รายการค้างดำเนินการ</h3>
            <div id="pending-list" class="space-y-3">
                <!-- Dynamic -->
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>

    <script>

// Version: 00122
// Report Page Controller

let reportMoneyChart, reportDeptChart;

async function loadReport() {
    try {
        const result = await callGAS('getReportData', {
            month: document.getElementById('report-month').value,
            year: document.getElementById('report-year').value
        });

        if (result.success) {
            renderReportSummary(result.summary);
            renderMoneyChart(result.moneyData);
            renderDeptChart(result.deptData);
            renderPendingItems(result.pending);
        }
    } catch (e) {
        alert("ไม่สามารถโหลดรายงานได้");
    }
}

function renderReportSummary(summary) {
    const container = document.getElementById('report-summary');
    container.innerHTML = `
        <div class="card p-6">
            <p class="text-purple-600">ยอดเบิกทั้งหมด</p>
            <p class="text-4xl font-bold text-purple-900">${formatCurrency(summary.totalAmount)}</p>
        </div>
        <div class="card p-6">
            <p class="text-emerald-600">จ่ายแล้ว</p>
            <p class="text-4xl font-bold text-emerald-600">${formatCurrency(summary.paidAmount)}</p>
        </div>
        <div class="card p-6">
            <p class="text-amber-600">รอตรวจสอบ</p>
            <p class="text-4xl font-bold text-amber-600">${formatCurrency(summary.waitingAmount)}</p>
        </div>
        <div class="card p-6">
            <p class="text-purple-600">จำนวนฎีกา</p>
            <p class="text-4xl font-bold text-purple-900">${summary.count.toLocaleString()}</p>
        </div>
    `;
}

function renderMoneyChart(data) {
    if (reportMoneyChart) reportMoneyChart.destroy();
    reportMoneyChart = new Chart(document.getElementById('reportMoneyChart'), {
        type: 'pie',
        data: {
            labels: data.labels,
            datasets: [{ data: data.values, backgroundColor: ['#7C3AED','#C026D3','#F59E0B','#10B981'] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function renderDeptChart(data) {
    if (reportDeptChart) reportDeptChart.destroy();
    reportDeptChart = new Chart(document.getElementById('reportDeptChart'), {
        type: 'bar',
        data: {
            labels: data.labels,
            datasets: [{ label: 'จำนวนเงิน', data: data.values, backgroundColor: '#7C3AED' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function renderPendingItems(pending) {
    const container = document.getElementById('pending-list');
    container.innerHTML = pending.map(item => `
        <div class="flex justify-between items-center p-4 bg-purple-50 rounded-2xl">
            <div>
                <span class="font-medium">${item.vendor}</span>
                <span class="text-sm text-gray-500 ml-3">${item.moneyType}</span>
            </div>
            <div class="text-right">
                <div class="font-bold">${formatCurrency(item.amount)}</div>
                <div class="text-xs text-amber-600">${item.status}</div>
            </div>
        </div>
    `).join('');
}

async function exportToExcel() {
    alert("กำลังส่งออกไฟล์ Excel (CSV)...\nฟังก์ชันจะเชื่อมต่อกับ Google Apps Script");
    // TODO: callGAS('exportExcel')
}

document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    checkDarkMode();
    
    // Populate year and month
    const yearSelect = document.getElementById('report-year');
    const currentYear = new Date().getFullYear() + 543;
    for (let y = currentYear - 2; y <= currentYear + 1; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === currentYear) opt.selected = true;
        yearSelect.appendChild(opt);
    }
    
    loadReport();
});
    </script>
    
</body>
</html>
